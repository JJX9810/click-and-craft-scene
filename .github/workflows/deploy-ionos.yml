name: Website bauen & auf GitHub Pages veröffentlichen

# Baut die statische Website (ionos-export) und veröffentlicht sie über
# GitHub Pages unter https://verlegt-verschraubt.de – kostenlos, mit SSL.
# Läuft bei jedem Push auf main sowie manuell (Actions-Tab → Run workflow).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Node 22 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ionos-export/package-lock.json

      - name: Abhängigkeiten installieren
        working-directory: ionos-export
        run: npm ci

      - name: Website bauen (33 Seiten prerendern)
        working-directory: ionos-export
        run: npm run build

      - name: Für GitHub Pages vorbereiten
        run: |
          # SPA-Fallback: unbekannte Pfade liefern die Startseite aus
          cp ionos-export/dist/index.html ionos-export/dist/404.html
          # Custom Domain für Pages
          echo "verlegt-verschraubt.de" > ionos-export/dist/CNAME
          # Kein Jekyll-Processing
          touch ionos-export/dist/.nojekyll
          echo "Seiten im Build: $(find ionos-export/dist -name index.html | wc -l)"

      - name: Build-Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: ionos-export/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Auf GitHub Pages veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
