<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verlegt &amp; Verschraubt – Cockpit 2026</title>
<style>
/* ============================================================
   V&V COCKPIT 2026 – 4-Bereich-Sidebar
   Speicher: localStorage. Kein Server, kein Internet nötig.
   ============================================================ */
:root{
  --bg:#0c0907; --panel:#15100d; --panel2:#1d1511; --panel3:#0f0b08;
  --line:#4c3728; --line2:rgba(202,160,106,.25);
  --text:#f4ede4; --muted:#b89d83; --muted2:#7a6050;
  --gold:#d4a15a; --gold2:#edc48b; --gold3:#9a7247;
  --red:#8f2d22; --red2:#d67b70; --green:#5e9c72; --green2:#a0c890;
  --blue:#b07a45; --orange:#c98747;
  --shadow:0 14px 34px rgba(0,0,0,.5);
  --r:16px; --r2:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:radial-gradient(circle at top left,rgba(162,100,42,.14),transparent 26%),
            radial-gradient(circle at 80% 30%,rgba(212,161,90,.08),transparent 22%),
            linear-gradient(180deg,#120d09 0%,#090705 100%);
  color:var(--text);font-family:Arial,Helvetica,sans-serif;min-height:100vh;
  font-size:14px;
}
button,input,select,textarea{font-family:inherit}
a{color:var(--gold);text-decoration:none}

/* ── TOPBAR ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  padding:14px 20px;
  background:linear-gradient(135deg,rgba(101,63,31,.65) 0%,rgba(34,24,17,.97) 42%,rgba(12,9,7,1) 100%);
  border-bottom:1px solid var(--line2);position:sticky;top:0;z-index:30;
  backdrop-filter:blur(12px);
}
.brand{display:flex;align-items:center;gap:12px}
.brand-mark{width:46px;height:46px;border-radius:12px;background:rgba(212,161,90,.12);
  border:1px solid var(--line2);display:grid;place-items:center;
  font-size:13px;font-weight:900;color:var(--gold);letter-spacing:.5px;line-height:1.1;text-align:center}
.brand-text h1{font-size:20px;font-weight:900;color:#f8efe3;letter-spacing:.2px}
.brand-text p{font-size:11.5px;color:var(--muted);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:10px}
.top-save-info{font-size:11px;color:var(--muted2)}

/* ── LAYOUT ── */
.shell{display:grid;grid-template-columns:252px 1fr;min-height:calc(100vh - 74px)}

/* ── SIDEBAR ── */
.sidebar{
  background:rgba(12,9,7,.96);border-right:1px solid var(--line);
  padding:12px 10px 24px;position:sticky;top:74px;height:calc(100vh - 74px);
  overflow-y:auto;
}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px}

.nav-group{margin-bottom:6px;border-radius:var(--r2);overflow:hidden;border:1px solid rgba(202,160,106,.12)}
.nav-group-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 12px;cursor:pointer;
  font-size:11px;font-weight:900;letter-spacing:.8px;text-transform:uppercase;
  transition:.15s;user-select:none;
}
.nav-group-header:hover{background:rgba(212,161,90,.07)}
.nav-group-header .grp-icon{font-size:15px;margin-right:6px}
.nav-group-header .grp-label{flex:1;color:var(--gold2)}
.nav-group-header .grp-arrow{font-size:10px;color:var(--muted2);transition:.2s}
.nav-group-header.open .grp-arrow{transform:rotate(90deg)}
.nav-group-header.group-kunden{border-left:3px solid #d4a15a}
.nav-group-header.group-personal{border-left:3px solid #5e9c72}
.nav-group-header.group-buchhaltung{border-left:3px solid #b07a45}
.nav-group-header.group-baustelle{border-left:3px solid #8f2d22}
.nav-items{display:none;padding:4px 0;background:rgba(0,0,0,.18)}
.nav-items.open{display:block}

.navbtn{
  width:100%;text-align:left;display:flex;align-items:center;justify-content:space-between;
  padding:9px 14px 9px 18px;border:none;background:transparent;
  color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;
  border-left:3px solid transparent;transition:.12s;
}
.navbtn:hover{background:rgba(212,161,90,.07);color:var(--text)}
.navbtn.active{background:rgba(212,161,90,.13);color:var(--gold2);border-left-color:var(--gold)}
.navbtn .badge{font-size:10.5px;background:rgba(139,94,52,.25);padding:2px 7px;
  border-radius:999px;color:var(--gold2);border:1px solid rgba(212,161,90,.2)}

/* ── CONTENT ── */
.content{padding:18px;min-width:0}

/* KPI-Leiste oben */
.kpi-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.kpi{background:rgba(22,16,13,.92);border:1px solid var(--line);border-radius:var(--r);
  padding:14px 16px;box-shadow:var(--shadow)}
.kpi .k{font-size:11px;color:var(--muted);font-weight:800;margin-bottom:6px}
.kpi .v{font-size:22px;font-weight:900}
.kpi .v.gr{color:var(--green)} .kpi .v.rd{color:var(--red2)} .kpi .v.gd{color:var(--gold)}

/* PANELS */
.panel{
  background:rgba(22,16,13,.9);border:1px solid var(--line);border-radius:var(--r);
  padding:20px;box-shadow:var(--shadow);margin-bottom:14px;
}
.panel h2{font-size:22px;font-weight:900;color:#f8efe3;margin-bottom:3px}
.panel .sub{color:var(--muted);font-size:13px;margin-bottom:14px}
.panel h3{font-size:16px;font-weight:900;color:var(--gold2);margin:14px 0 8px}

/* FORMULAR */
.fg{display:grid;gap:10px;margin:10px 0}
.fg.c2{grid-template-columns:1fr 1fr}
.fg.c3{grid-template-columns:1fr 1fr 1fr}
.fg.c4{grid-template-columns:1fr 1fr 1fr 1fr}
.fg.full{grid-column:1/-1}
label.lbl{display:block;font-size:11.5px;font-weight:900;color:#ddd;margin-bottom:5px}
input,select,textarea{
  width:100%;background:#110d0a;color:var(--text);
  border:1px solid #5a4030;border-radius:var(--r2);
  padding:10px 12px;outline:none;font-size:13.5px;
}
textarea{min-height:90px;resize:vertical}
input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(212,161,90,.14)}

/* BUTTONS */
.btn{
  border:1px solid var(--line);background:#201611;color:var(--text);
  border-radius:var(--r2);padding:9px 14px;font-weight:800;cursor:pointer;
  transition:.15s;font-size:13px;display:inline-flex;align-items:center;gap:6px;
}
.btn:hover{border-color:var(--gold3);background:#2a1d15;transform:translateY(-1px)}
.btn.primary{background:linear-gradient(135deg,#b07a45,#7a5525);border-color:var(--gold2)}
.btn.green{background:linear-gradient(135deg,#4a7a3a,#335526);border-color:#7ab870}
.btn.red{background:linear-gradient(135deg,#8f2d22,#5e1a14);border-color:#d67b70}
.btn.ghost{background:transparent}
.btn.sm{padding:6px 10px;font-size:12px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}

/* TABELLEN */
.tablewrap{overflow:auto;border:1px solid var(--line);border-radius:14px;margin-top:10px}
table{width:100%;border-collapse:collapse;min-width:500px;background:#130f0c}
th,td{border-bottom:1px solid #34251b;padding:9px 10px;text-align:left;font-size:13px;vertical-align:top}
th{background:#1d1510;color:#fff;position:sticky;top:0;z-index:1;font-size:12px;font-weight:800}
tr:hover td{background:#1c140f}

/* PILLS */
.pill{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:800}
.pill.gr{background:rgba(94,156,114,.18);color:var(--green2);border:1px solid rgba(94,156,114,.4)}
.pill.rd{background:rgba(214,123,112,.15);color:#ff8070;border:1px solid rgba(214,123,112,.4)}
.pill.gd{background:rgba(212,161,90,.15);color:var(--gold);border:1px solid rgba(212,161,90,.35)}
.pill.gy{background:rgba(255,255,255,.08);color:#ccc;border:1px solid rgba(255,255,255,.15)}
.pill.bl{background:rgba(176,122,69,.15);color:var(--blue);border:1px solid rgba(176,122,69,.35)}

/* CUSTOMER CARDS */
.cust-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-top:12px}
.cust-card{
  border:1px solid var(--line);border-radius:var(--r);background:#101010;
  padding:14px;box-shadow:var(--shadow);position:relative;overflow:hidden;cursor:pointer;
  transition:.14s;
}
.cust-card:hover{border-color:var(--gold3);background:#161010}
.cust-card::before{content:"";position:absolute;left:0;top:0;width:5px;height:100%;background:#555}
.cust-card.neu::before{background:#888}
.cust-card.aktiv::before{background:var(--gold)}
.cust-card.abgeschlossen::before{background:var(--green)}
.cust-card.problem::before{background:var(--red2)}
.cust-card h3{font-size:14.5px;font-weight:900;color:#f4ede4;padding-left:6px;margin-bottom:5px}
.cust-meta{font-size:12px;color:var(--muted);line-height:1.5;padding-left:6px}

/* AUFMASS */
.room-block{border:1px solid var(--line);border-radius:var(--r2);padding:13px;margin:8px 0;background:#0d0a07}
.room-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
.thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.thumb{position:relative;width:90px;height:90px;border-radius:10px;overflow:hidden;border:1px solid var(--line);cursor:pointer;transition:.14s}
.thumb:hover{border-color:var(--gold);transform:scale(1.04)}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb .del-btn{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.75);color:#fff;
  border:none;border-radius:5px;width:20px;height:20px;cursor:pointer;font-size:12px;line-height:1;z-index:2}
.thumb .zoom-hint{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.55);
  color:#fff;font-size:10px;text-align:center;padding:2px;opacity:0;transition:.2s;pointer-events:none}
.thumb:hover .zoom-hint{opacity:1}
.cam-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}

/* ── LIGHTBOX ── */
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:1000;display:none;
  align-items:center;justify-content:center;flex-direction:column}
#lightbox.open{display:flex}
#lb-img{max-width:92vw;max-height:80vh;border-radius:10px;object-fit:contain;box-shadow:0 0 60px rgba(0,0,0,.8)}
#lb-toolbar{display:flex;align-items:center;gap:14px;margin-top:14px}
#lb-counter{color:var(--muted);font-size:13px;min-width:60px;text-align:center}
#lb-caption{color:var(--sand-200,#e8dcc8);font-size:12px;margin-top:6px;text-align:center}
.lb-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;
  padding:9px 16px;border-radius:10px;cursor:pointer;font-size:14px;transition:.15s}
.lb-btn:hover{background:rgba(212,161,90,.25);border-color:var(--gold)}
#lb-close{position:absolute;top:16px;right:20px;background:transparent;border:none;color:#fff;
  font-size:28px;cursor:pointer;opacity:.7;line-height:1}
#lb-close:hover{opacity:1}

/* Leistungs-Bereich Aufmaß */
.svc-panel{border:1px solid var(--gold3);border-radius:var(--r);padding:16px;margin-bottom:14px;
  background:rgba(212,161,90,.04)}
.svc-panel h3{color:var(--gold2);margin-bottom:10px}
.svc-badge{display:inline-block;padding:3px 10px;border-radius:8px;font-size:12px;font-weight:800;
  background:rgba(212,161,90,.18);color:var(--gold2);border:1px solid var(--gold3);margin-bottom:10px}
.geraet-row{display:flex;gap:8px;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.geraet-row label{flex:1;font-size:13px;color:var(--text)}
.geraet-row input[type=number]{width:70px;flex:0 0 70px;padding:6px 8px}

/* PRINTABLE DOC */
.doc-preview{background:#fff;color:#111;border-radius:var(--r2);padding:26px;margin-top:12px}
.doc-preview h1,.doc-preview h2,.doc-preview h3{color:#111}
.doc-preview table{background:#fff;color:#111;min-width:auto}
.doc-preview th{background:#f0f0f0;color:#111;position:static}
.doc-preview td,.doc-preview th{border:1px solid #ddd}

/* MISC */
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--line),transparent);margin:14px 0}
.out-box{white-space:pre-wrap;background:#0a0706;border:1px solid var(--line);border-radius:var(--r2);
  padding:13px;color:#f4f4f4;line-height:1.5;min-height:80px}
.warn-list{list-style:none;padding:0}
.warn-list li{padding:7px 10px;border-radius:8px;margin:4px 0;font-size:13px;
  background:rgba(212,161,90,.07);border-left:3px solid var(--gold)}
.warn-list li.red-warn{background:rgba(214,123,112,.08);border-left-color:var(--red2)}
.info-row{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.info-row .lk{color:var(--muted);font-weight:800;min-width:140px}
.bank-rule{display:flex;justify-content:space-between;padding:7px 10px;border-radius:8px;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);margin:4px 0;font-size:12px}
.bank-rule b{color:var(--gold2)}
.bank-rule span{color:var(--muted)}
.drop-zone{border:2px dashed var(--gold3);border-radius:var(--r);padding:30px;text-align:center;
  color:var(--muted);cursor:pointer;transition:.15s;background:rgba(212,161,90,.03)}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--gold);background:rgba(212,161,90,.07);color:var(--text)}
.item-row{display:grid;grid-template-columns:2fr 80px 80px 110px 130px 36px;gap:8px;align-items:end;
  border-bottom:1px solid rgba(255,255,255,.05);padding:7px 0}
.item-row:last-child{border-bottom:none}
.tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:800}
.tag.kunden{background:rgba(212,161,90,.2);color:var(--gold2)}
.tag.personal{background:rgba(94,156,114,.2);color:var(--green2)}
.tag.buch{background:rgba(176,122,69,.2);color:var(--blue)}
.tag.bau{background:rgba(143,45,34,.2);color:var(--red2)}

@media(max-width:900px){
  .shell{grid-template-columns:1fr}
  .sidebar{position:fixed;left:-260px;top:74px;height:calc(100vh - 74px);z-index:25;transition:.25s}
  .sidebar.mobile-open{left:0}
  .kpi-bar{grid-template-columns:1fr 1fr}
  .fg.c4{grid-template-columns:1fr 1fr}
  .fg.c3{grid-template-columns:1fr 1fr}
}
@media print{.sidebar,.topbar,.btn,.btn-row,.no-print{display:none!important}.content{padding:0}}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand">
    <div class="brand-mark">V&amp;V</div>
    <div class="brand-text">
      <h1>Verlegt &amp; Verschraubt</h1>
      <p>Lokales Firmen-Cockpit 2026 · Z.O.Z – Zuverlässig. Ordentlich. Zügig.</p>
    </div>
  </div>
  <div class="topbar-right">
    <button class="btn sm" id="backBtn" onclick="goBack()" title="Zur vorherigen Ansicht">← Zurück</button>
    <span class="top-save-info" id="saveInfo">–</span>
    <button class="btn sm" onclick="doExport()">📦 Backup</button>
    <button class="btn sm" onclick="document.getElementById('importFile').click()">📥 Import</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="doImport(event)">
    <button class="btn sm no-print" id="mobileMenu" onclick="document.querySelector('.sidebar').classList.toggle('mobile-open')" style="display:none">☰</button>
  </div>
</div>

<div class="shell">
<!-- ═══════════════════ SIDEBAR ═══════════════════ -->
<aside class="sidebar">

  <!-- ① KUNDENBEREICH -->
  <div class="nav-group">
    <div class="nav-group-header group-kunden" onclick="toggleGroup(this)">
      <span class="grp-icon">👥</span><span class="grp-label">Kundenbereich</span><span class="grp-arrow">›</span>
    </div>
    <div class="nav-items open">
      <button class="navbtn active" data-sec="dashboard">Dashboard <span class="badge" id="badgeDash">Start</span></button>
      <button class="navbtn" data-sec="crm">Kunden-CRM <span class="badge" id="badgeCrm">0</span></button>
      <button class="navbtn" data-sec="akte">Kundenkartei</button>
      <button class="navbtn" data-sec="aufmass">Aufmaß-Tool <span class="badge" id="badgeAufmass">0</span></button>
      <button class="navbtn" data-sec="angebote">Angebote <span class="badge" id="badgeOffers">0</span></button>
      <button class="navbtn" data-sec="leads">Kundenanfragen <span class="badge" id="badgeLeads">0</span></button>
      <button class="navbtn" data-sec="marketing">Marketing / KI</button>
      <button class="navbtn" data-sec="mkagents">📣 Marketing &amp; KI-Agenten</button>
      <button class="navbtn" data-sec="agents">Agents / KI</button>
      <button class="navbtn" data-sec="nexus">🔮 NEXUS Deck</button>
    </div>
  </div>

  <!-- ② PERSONALBEREICH -->
  <div class="nav-group">
    <div class="nav-group-header group-personal" onclick="toggleGroup(this)">
      <span class="grp-icon">🧑‍💼</span><span class="grp-label">Personalbereich</span><span class="grp-arrow">›</span>
    </div>
    <div class="nav-items">
      <button class="navbtn" data-sec="calculator">Preisrechner</button>
      <button class="navbtn" data-sec="materialcalc">Materialrechner</button>
      <button class="navbtn" data-sec="materials">Material &amp; Werkzeug</button>
      <button class="navbtn" data-sec="recurring">Fixkosten / Abos</button>
      <button class="navbtn" data-sec="mileage">Fahrtenbuch</button>
      <button class="navbtn" data-sec="personal">👷 Personalwesen <span class="badge" id="badgeStaff">0</span></button>
      <button class="navbtn" data-sec="settings">Firmendaten</button>
      <button class="navbtn" data-sec="backup">Backup</button>
    </div>
  </div>

  <!-- ③ BUCHHALTUNGSBEREICH -->
  <div class="nav-group">
    <div class="nav-group-header group-buchhaltung" onclick="toggleGroup(this)">
      <span class="grp-icon">📊</span><span class="grp-label">Buchhaltungsbereich</span><span class="grp-arrow">›</span>
    </div>
    <div class="nav-items">
      <button class="navbtn" data-sec="rechnungen">Rechnungen <span class="badge" id="badgeInv">0</span></button>
      <button class="navbtn" data-sec="openitems">Offene Posten <span class="badge" id="badgeOpen">0</span></button>
      <button class="navbtn" data-sec="bookkeeping">Buchhaltung</button>
      <button class="navbtn" data-sec="belegscanner">📷 Belegscanner</button>
      <button class="navbtn" data-sec="banksync">Bank-CSV / Sync</button>
    </div>
  </div>

  <!-- ④ BAUSTELLENBEREICH -->
  <div class="nav-group">
    <div class="nav-group-header group-baustelle" onclick="toggleGroup(this)">
      <span class="grp-icon">🏗️</span><span class="grp-label">Baustellenbereich</span><span class="grp-arrow">›</span>
    </div>
    <div class="nav-items">
      <button class="navbtn" data-sec="projekte">Baustellenplaner <span class="badge" id="badgeProj">0</span></button>
      <button class="navbtn" data-sec="checkliste">Checkliste</button>
    </div>
  </div>

</aside>

<!-- ═══════════════════ CONTENT ═══════════════════ -->
<main class="content" id="main">
  <div class="panel"><p style="color:var(--muted)">Lade…</p></div>
</main>
</div>

<script>
"use strict";
/* ==========================================================
   DATEN & SPEICHER

  leads:[], customers:[], measurements:[], projects:[], mileage:[],
  offers:[], invoices:[], bookings:[], openItems:[], materials:[], recurring:[],

function uid(){ return "id_" + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function today(){ return new Date().toISOString().slice(0,10); }
function nowISO(){ return new Date().toISOString(); }
function money(n){ return Number(n||0).toFixed(2).replace(".",",")+"\u00a0€"; }
function r2(n){ return Math.round((Number(n)+Number.EPSILON)*100)/100; }
function fmtDate(iso){ if(!iso)return"–"; try{return new Date(iso).toLocaleDateString("de-DE");}catch{return iso;} }
function fmtDT(iso){ if(!iso)return"–"; try{return new Date(iso).toLocaleString("de-DE");}catch{return iso;} }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function val(id){ const e=document.getElementById(id); return e?e.value.trim():""; }
function setVal(id,v){ const e=document.getElementById(id); if(e) e.value=v||""; }
function byId(id){ return document.getElementById(id); }
function parseNum(s){ const n=parseFloat(String(s).replace(",",".")); return isNaN(n)?0:n; }

function normalizeData(){
  ["leads","customers","measurements","projects","mileage","offers","invoices",
   "bookings","openItems","materials","recurring","marketingAssets","materialCalcs",
   "priceCalculations","payments","timeline","documents",
   "marketingCampaigns","contentDrafts","publishLog","approvalRequests","staff"].forEach(k=>{
    if(!Array.isArray(data[k])) data[k]=[];
  });
  if(!data.openItemOverrides || typeof data.openItemOverrides!=="object" || Array.isArray(data.openItemOverrides)) data.openItemOverrides={};
  if(!data.counters || typeof data.counters!=="object" || Array.isArray(data.counters)) data.counters={};
  if(!data.meta || typeof data.meta!=="object" || Array.isArray(data.meta)) data.meta={};
}

/* ══════════════════════════════════════════════════════════════
   MIGRATION: Altes Backup-Format → neues Cockpit-Format
   ══════════════════════════════════════════════════════════════ */
function migrateOldData(d){
  if(!d) return d;

  // --- Kunden: Feldnamen + verschachtelte Daten extrahieren ---
  const seenM=new Set((d.measurements||[]).map(m=>m.id));
  const seenO=new Set((d.offers||[]).map(o=>o.id));
  const seenI=new Set((d.invoices||[]).map(i=>i.id));
  const seenOI=new Set((d.openItems||[]).map(o=>o.id));

  (d.customers||[]).forEach(c=>{
    // Felder mappen
    if(c.contact && !c.phone) c.phone = c.contact;
    if(c.place && !c.address) c.address = c.place;
    if(c.next && !c.nextStep) c.nextStep = c.next;
    if(c.currentStage && !c.nextStep) c.nextStep = c.currentStage;
    if(c.status==="active") c.status="aktiv";
    if(c.status==="done") c.status="abgeschlossen";
    if(c.status==="problem") c.status="aktiv";
    if(!c.createdAt && c.created) c.createdAt = c.created;
    if(!c.updatedAt) c.updatedAt = c.createdAt || nowISO();

    // Verschachtelte Aufmaße → Top-Level
    (c.measurements||[]).forEach(m=>{
      migrateRooms(m);
      m.customerId = m.customerId || c.id;
      m.customerName = m.customerName || c.name;
      m.totalSkirting = m.totalPerimeter || m.totalSkirting || 0;
      if(!m.createdAt && m.created) m.createdAt = m.created;
      if(!seenM.has(m.id)){ d.measurements=d.measurements||[]; d.measurements.push(m); seenM.add(m.id); }
    });

    // Verschachtelte Angebote → Top-Level
    (c.offers||[]).forEach(o=>{
      o.customerId = o.customerId || c.id;
      o.customerName = o.customer || o.customerName || c.name;
      o.number = o.no || o.number;
      o.address = o.address || o.place || c.address;
      if(!seenO.has(o.id)){ d.offers=d.offers||[]; d.offers.push(o); seenO.add(o.id); }
    });

    // Verschachtelte Rechnungen → Top-Level
    (c.invoices||[]).forEach(inv=>{
      inv.customerId = inv.customerId || c.id;
      inv.customerName = inv.customer || inv.customerName || c.name;
      inv.number = inv.no || inv.number;
      inv.address = inv.address || c.address;
      inv.depositPaid = inv.depositPaid ?? inv.paid ?? 0;
      inv.remaining = inv.remaining ?? (Number(inv.total||0) - Number(inv.depositPaid||0));
      if(!seenI.has(inv.id)){ d.invoices=d.invoices||[]; d.invoices.push(inv); seenI.add(inv.id); }
    });

    // Verschachtelte offene Posten → Top-Level
    (c.openItems||[]).forEach(oi=>{
      migrateOpenItem(oi, c);
      if(!seenOI.has(oi.id)){ d.openItems=d.openItems||[]; d.openItems.push(oi); seenOI.add(oi.id); }
    });
  });

  // --- Top-Level Aufmaße: Räume/Fotos normalisieren ---
  (d.measurements||[]).forEach(m=>{ migrateRooms(m); m.totalSkirting = m.totalPerimeter || m.totalSkirting || 0; });

  // --- Top-Level Angebote ---
  (d.offers||[]).forEach(o=>{
    if(o.no && !o.number) o.number = o.no;
    if(o.customer && !o.customerName) o.customerName = o.customer;
    if(o.place && !o.address) o.address = o.place;
  });

  // --- Top-Level Rechnungen ---
  (d.invoices||[]).forEach(inv=>{
    if(inv.no && !inv.number) inv.number = inv.no;
    if(inv.customer && !inv.customerName) inv.customerName = inv.customer;
    inv.depositPaid = inv.depositPaid ?? inv.paid ?? 0;
    inv.remaining = inv.remaining ?? (Number(inv.total||0) - Number(inv.depositPaid||0));
  });

  // --- Top-Level offene Posten ---
  (d.openItems||[]).forEach(oi=>migrateOpenItem(oi));

  // --- Buchungen ---
  (d.bookings||[]).forEach(b=>{
    if(b.amountSigned!==undefined && b.signedAmount===undefined) b.signedAmount = b.amountSigned;
  });

  return d;
}

function migrateRooms(m){
  (m.rooms||[]).forEach(r=>{
    // Fläche
    if(r.manualArea!==undefined && r.areaOverride===undefined) r.areaOverride = r.manualArea || null;
    if(r.area!==undefined && r.areaAuto===undefined) r.areaAuto = r.area || 0;
    // Sockelleisten
    if(r.perimeter!==undefined && r.skirtingLfm===undefined) r.skirtingLfm = r.perimeter;
    if(r.manualSockel!==undefined && r.skirtingLfm===undefined) r.skirtingLfm = r.manualSockel;
    // Fotos: data → dataUrl
    (r.photos||[]).forEach(p=>{
      if(p.data && !p.dataUrl) p.dataUrl = p.data;
      if(p.name && !p.fileName) p.fileName = p.name;
    });
  });
}

function migrateOpenItem(oi, customer){
  if(oi.customer && !oi.customerName) oi.customerName = oi.customer;
  if(customer){ oi.customerId = oi.customerId || customer.id; oi.customerName = oi.customerName || customer.name; }
  if(oi.offerId && !oi.sourceId){ oi.sourceType = "offer"; oi.sourceId = oi.offerId; }
  if(oi.offerNo && !oi.reference) oi.reference = oi.offerNo;
  if(oi.job && !oi.note) oi.note = oi.job;
  if(oi.due && !oi.dueDate) oi.dueDate = oi.due;
  oi.open = oi.open || r2(Number(oi.total||0) - Number(oi.paid||0));
}

function migrateSettings(s){
  if(!s) return;
  // Altes Format: flach {company:"...", mail:"..."} → sichern für loadSettingsFields
  if(s.mail && !s.email) s.email = s.mail;
  localStorage.setItem("VV_SETTINGS_2026", JSON.stringify(s));
}

  }catch(e){ ok=false; err=e; console.warn("saveAll: Speichern fehlgeschlagen:", e); }
  updateBadges(); updateKPIs();
  const si=byId("saveInfo");
  if(si) si.textContent = ok ? ("Gespeichert: " + new Date().toLocaleTimeString("de-DE"))
                             : "⚠ Nicht gespeichert – Speicher voll. Backup exportieren!";
  if(alert_){
    if(ok) alert("Gespeichert.");
    else alert("Speichern fehlgeschlagen: Der lokale Speicher (localStorage) ist voll.\n\nBitte ein Backup exportieren und ggf. alte/große Fotos reduzieren.\n\nDetails: "+((err&&err.name)||err));
  }
  return ok;
}

function loadAll(){
  const raw = localStorage.getItem(STORE_KEY);
  if(!raw){ normalizeData(); return; }

    const p = JSON.parse(raw);

/* Importmodus: "merge" (Standard) oder "replace" */

/* Export: vollständiges Backup inkl. Settings */
function doExport(){
  try{
    normalizeData();
    saveAll(false);
    const settings = getSettings(); // enthält company, owner, address, phone, email, web, tax, iban, legal, taxReserve, optional api
    const payload = { version:"VV_COCKPIT_2026", exportedAt:nowISO(), data, settings };
    const json = JSON.stringify(payload, null, 2);
    const d = new Date(), pad = n => String(n).padStart(2,"0");
    const fn = `vv-cockpit-backup-${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}-${pad(d.getHours())}${pad(d.getMinutes())}.json`;
    const blob = new Blob([json], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = fn; a.style.display = "none";
    document.body.appendChild(a);   // im DOM verankern (nötig u. a. für Firefox)
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>{ try{ URL.revokeObjectURL(url); }catch{} }, 4000); // erst nach Download freigeben
    try{ localStorage.setItem("VV_LAST_BACKUP", nowISO()); }catch{}
    const info = byId("backupLastInfo"); if(info) info.textContent = "Letztes Backup: " + fmtDT(nowISO()) + " · " + fn;
    const si = byId("saveInfo"); if(si) si.textContent = "Backup exportiert: " + fn;
  }catch(err){
    console.error("doExport:", err);
    alert("Backup-Export fehlgeschlagen:\n\n" + (err && err.message ? err.message : String(err)) + "\n\nBitte erneut versuchen. Falls der Fehler bestehen bleibt, bitte die Browser-Konsole prüfen.");
  }
}

/* Einen Array von Datensätzen mergen (nach id).
   - neue id → hinzufügen
   - gleiche id → nur aktualisieren, wenn imported.updatedAt neuer ist
   - kein updatedAt im Import → vorhandenen Datensatz behalten */
function mergeArray(target, incoming){
  const map = new Map(target.map(r => [r.id, r]));
  let added=0, updated=0, skipped=0; const touched=[];
  (incoming||[]).forEach(item=>{
    if(!item || typeof item!=="object") return;
    if(!item.id) item.id = uid();
    const ex = map.get(item.id);
    if(!ex){ target.push(item); map.set(item.id,item); added++; touched.push(item.id); return; }
    const exU = String(ex.updatedAt || ex.createdAt || "");
    const inU = String(item.updatedAt || item.createdAt || "");
    if(inU && inU > exU){ Object.assign(ex, item); updated++; touched.push(item.id); }
    else { skipped++; }
  });
  return {added, updated, skipped, touched};
}

/* Offene-Posten-Overrides mergen (nach sourceKey, neuere updatedAt gewinnt).
   Dürfen beim Merge nicht verloren gehen – Ausblendungen/Bearbeitungen bleiben erhalten. */
function mergeOverrides(incOv){
  ensureOpenItemOverrides();
  if(!incOv || typeof incOv!=="object" || Array.isArray(incOv)) return;
  Object.entries(incOv).forEach(([k,v])=>{
    if(!v || typeof v!=="object") return;
    const cur = data.openItemOverrides[k];
    if(!cur){ data.openItemOverrides[k]=v; return; }
    const inU=String(v.updatedAt||""), exU=String(cur.updatedAt||"");
    if(inU && inU>exU) data.openItemOverrides[k]=v; // neuere gewinnt, sonst lokal behalten
  });
}

/* Settings mergen: vorhandene (lokale) Werte gewinnen, fehlende aus Import ergänzt */
function mergeSettings(incoming){
  if(!incoming) return;
  if(incoming.mail && !incoming.email) incoming.email = incoming.mail;
  let cur = {};
  try{ cur = JSON.parse(localStorage.getItem("VV_SETTINGS_2026")||"{}") || {}; }catch{ cur = {}; }
  const merged = Object.assign({}, incoming, cur); // lokale Werte gewinnen
  localStorage.setItem("VV_SETTINGS_2026", JSON.stringify(merged));
  loadSettingsFields();
}

function doImport(ev){
  const file = ev.target.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = e => {
    let parsed;
    try{ parsed = JSON.parse(e.target.result); }
    catch(err){ alert("Ungültiges Backup: "+err.message); ev.target.value=""; return; }
    runImport(parsed, _importMode);
    ev.target.value="";
  };
  r.readAsText(file);
}

/* Zentrale Importlogik – Merge oder Alles ersetzen */
function runImport(parsed, mode){
  // Eingehende Daten ins neue Format bringen (Altbackups: verschachtelte Daten → Top-Level)
  let inc = (parsed && parsed.data) ? parsed.data : (parsed || {});
  COLLECTION_KEYS.forEach(k=>{ if(!Array.isArray(inc[k])) inc[k]=[]; });
  if(!Array.isArray(inc.bookings)) inc.bookings=[];
  try{ migrateOldData(inc); }catch(err){ console.warn("Migration:",err); }

  if(mode==="replace"){
    if(!confirm("⚠️ ALLES ERSETZEN\n\nDer komplette aktuelle Bestand (Kunden, Aufmaße, Fotos, Angebote, Rechnungen, Buchungen …) wird ÜBERSCHRIEBEN und kann nicht wiederhergestellt werden.\n\nWirklich fortfahren?")){ return; }
    if(!confirm("Letzte Sicherheitsabfrage:\n\nAlle vorhandenen Daten dieses Geräts werden durch das Backup ERSETZT.\n\nFortfahren?")){ return; }
    data = inc;
    normalizeData();
    try{ migrateOldData(data); }catch{}
    if(!data.openItemOverrides || typeof data.openItemOverrides!=="object" || Array.isArray(data.openItemOverrides)) data.openItemOverrides = inc.openItemOverrides && typeof inc.openItemOverrides==="object" ? inc.openItemOverrides : {};
    migrateOpenItemsCleanup();
    if(parsed.settings) migrateSettings(parsed.settings);
    saveAll(false);
    _lastImportLog = { mode:"replace", at:nowISO(),
      customers:(data.customers||[]).length, measurements:(data.measurements||[]).length,
      rooms:(data.measurements||[]).reduce((s,m)=>s+(m.rooms||[]).length,0),
      photos:(data.measurements||[]).reduce((s,m)=>(m.rooms||[]).reduce((s2,r)=>s2+(r.photos||[]).length,s),0),
      offers:(data.offers||[]).length, invoices:(data.invoices||[]).length,
      bookings:(data.bookings||[]).length, updated:0, skipped:0 };
    showImportResult();
    return;
  }

  // ── MERGE ──
  normalizeData();
  const res = {};
  COLLECTION_KEYS.forEach(k=>{ if(!Array.isArray(data[k])) data[k]=[]; res[k] = mergeArray(data[k], inc[k]||[]); });

  // Räume + Fotos aus berührten (neuen/aktualisierten) Aufmaßen zählen
  let roomsImp=0, photosImp=0;
  const touchedM = new Set(res.measurements.touched);
  (inc.measurements||[]).forEach(m=>{
    if(touchedM.has(m.id)){ (m.rooms||[]).forEach(rm=>{ roomsImp++; photosImp += (rm.photos||[]).length; }); }
  });

  mergeOverrides(inc.openItemOverrides);
  if(inc.counters && typeof inc.counters==="object"){ data.counters = Object.assign({}, inc.counters, data.counters||{}); }
  mergeSettings(parsed.settings);
  migrateOpenItemsCleanup();
  saveAll(false);

  const sum = (f)=> COLLECTION_KEYS.reduce((s,k)=>s+(res[k]?res[k][f]:0),0);
  _lastImportLog = {
    mode:"merge", at:nowISO(),
    customers: res.customers.added, measurements: res.measurements.added,
    rooms: roomsImp, photos: photosImp,
    offers: res.offers.added, invoices: res.invoices.added,
    bookings: res.bookings.added, openItems: res.openItems.added,
    updated: sum("updated"), skipped: sum("skipped")
  };
  showImportResult();
}

function showImportResult(){
  const l = _lastImportLog; if(!l) return;
  const title = l.mode==="replace" ? "Import (Alles ersetzt)" : "Import (Zusammengeführt)";
  alert(`${title} erfolgreich!\n\n`+
    `Kunden importiert: ${l.customers}\n`+
    `Aufmaße importiert: ${l.measurements}\n`+
    `Räume importiert: ${l.rooms}\n`+
    `Fotos importiert: ${l.photos}\n`+
    `Angebote importiert: ${l.offers}\n`+
    `Rechnungen importiert: ${l.invoices}\n`+
    `Buchungen importiert: ${l.bookings}\n`+
    (l.mode==="merge" ? `\nAktualisiert: ${l.updated}\nÜbersprungen: ${l.skipped}\n` : "") );
  if(currentSection==="backup") showSection("backup");
  else showSection("dashboard");
}

const TX_TYPES = ["Einnahme","Ausgabe","Privateinlage","Privatentnahme","Umbuchung","Storno/Widerruf","Autorisierung"];

function classifyBooking(b){
  const p = String(b.partner||b.name||"").toLowerCase();
  const ref = String(b.reference||b.note||"").toLowerCase();
  const blob = p + " " + ref;
  const amt = Number(b.signedAmount||b.amount||0);

  if(/autorisierung|vorgemerkt|pending/.test(blob)){
    return {...b, type:"Autorisierung", dashboardRelevant:false, status:"geprüft"};
  }
  if(/justus(\s+jonas)?\s+brosch/.test(p) && amt>0){
    return {...b, type:"Privateinlage", dashboardRelevant:false, status:"geprüft"};
  }
  if(/justus(\s+jonas)?\s+brosch/.test(p)){
    return {...b, type:"Umbuchung", dashboardRelevant:false, status:"geprüft"};
  }
  if(/storno|widerruf|rücklastschrift|rückzahlung|erstattung|refund|chargeback/.test(blob)){
    return {...b, type:"Storno/Widerruf", dashboardRelevant:false, status:"geprüft"};
  }
  if(/hagebau/.test(p)) return {...b, type:"Ausgabe", category:"Material", dashboardRelevant:true, status:"geprüft"};
  if(/myhammer/.test(p)) return {...b, type:"Ausgabe", category:"Vermittlungsgebühr", dashboardRelevant:true, status:"geprüft"};
  if(/check24/.test(p)) return {...b, type:"Ausgabe", category:"Vermittlungsgebühr", dashboardRelevant:true, status:"geprüft"};
  if(/lidl|aldi|rewe|edeka/.test(p)) return {...b, type:"Privatentnahme", dashboardRelevant:false, status:"geprüft"};
  if(/birgit\s+schmidt/.test(p)) return {...b, type:"Einnahme", category:"Kundenzahlung", dashboardRelevant:true, status:"geprüft"};

  if(amt > 0) return {...b, type:"Einnahme", category:b.category||"Kundenzahlung prüfen", dashboardRelevant:true, status:"offen prüfen"};
  return {...b, type:"Ausgabe", category:b.category||"Betriebsausgabe prüfen", dashboardRelevant:true, status:"offen prüfen"};
}

function computeFinance(){
  const taxPct = Number(getSettings().taxReserve||35);
  let income=0, expenses=0;
  (data.bookings||[]).forEach(b=>{
    if(!b.dashboardRelevant) return;
    if(b.type==="Einnahme") income += Math.abs(Number(b.signedAmount||b.amount||0));
    else if(b.type==="Ausgabe") expenses += Math.abs(Number(b.signedAmount||b.amount||0));
  });
  const profit = r2(income - expenses);
  const tax = r2(profit>0 ? profit*taxPct/100 : 0);
  const openSum = r2((data.openItems||[]).filter(o=>Number(o.open||0)>0).reduce((s,o)=>s+Number(o.open||0),0));
  return {income:r2(income), expenses:r2(expenses), profit, tax, taxPct, profitAfterTax:r2(profit-tax), openSum};
}

/* ── OFFENE POSTEN: Anzahlung + Restzahlung als getrennte Zahlungspositionen ──
   Jede Position hat einen eindeutigen sourceKey = sourceType:sourceId:paymentPart.
   Pro Beleg (angenommenes Angebot ohne Rechnung, bzw. Rechnung) werden Anzahlung
   ("deposit") und Restzahlung ("rest") erzeugt. Manuelle Eingriffe + Löschungen
   liegen in data.openItemOverrides[sourceKey] und überleben den Neuaufbau. */
const OI_DEPOSIT_LABEL = "Anzahlung vor Arbeitsbeginn";
const OI_REST_LABEL    = "Restzahlung nach Fertigstellung";
const OI_STATUS_OPTS   = ["offen","teilweise bezahlt","bezahlt","zurückgestellt","storniert","erledigt"];
const OI_DONE_STATUS   = ["bezahlt","storniert","erledigt"];
let _oiDedupeRemoved = 0;

function ensureOpenItemOverrides(){
  if(!data.openItemOverrides || typeof data.openItemOverrides!=="object" || Array.isArray(data.openItemOverrides)) data.openItemOverrides={};
  return data.openItemOverrides;
}
function oiSourceKey(sourceType, sourceId, part){ return sourceType+":"+sourceId+":"+part; }

/* Anzahlungs-Soll bestimmen: konkreter Betrag > Prozent am Beleg > Standard aus Settings */
function getDepositDue(src, total){
  if(src.depositAmount!=null && src.depositAmount!=="" && isFinite(Number(src.depositAmount))) return r2(Number(src.depositAmount));
  if(src.depositDue!=null && src.depositDue!=="" && isFinite(Number(src.depositDue))) return r2(Number(src.depositDue));
  if(src.depositPercent!=null && src.depositPercent!=="" && isFinite(Number(src.depositPercent))) return r2(total*Number(src.depositPercent)/100);
  const pct = Number(getSettings().defaultDepositPercent);
  return r2(total * (isFinite(pct)?pct:40) / 100);
}

/* Zwei Zahlungspositionen (Anzahlung/Rest) für einen Beleg berechnen.
   depositPaid (Gesamt bereits gezahlt) wird zuerst auf die Anzahlung, der Rest auf die Restzahlung angerechnet. */
function makeOpenItemPositions(src, sourceType){
  const total = r2(Number(src.total||0));
  let depositDue = getDepositDue(src, total);
  if(depositDue > total) depositDue = total;
  const restDue = r2(total - depositDue);
  const paid    = r2(Number(src.depositPaid||0));
  const depPaid = r2(Math.min(paid, depositDue));
  const restPaid= r2(Math.max(0, paid - depositDue));
  const base = { sourceType, sourceId:src.id, customerId:src.customerId,
    customerName:src.customerName||"", reference:src.number||"", total };
  return [
    {...base, paymentPart:"deposit", sourceKey:oiSourceKey(sourceType,src.id,"deposit"),
      label:OI_DEPOSIT_LABEL, due:depositDue, paid:depPaid, open:r2(depositDue-depPaid)},
    {...base, paymentPart:"rest", sourceKey:oiSourceKey(sourceType,src.id,"rest"),
      label:OI_REST_LABEL, due:restDue, paid:restPaid, open:r2(restDue-restPaid)}
  ];
}

/* Offene Posten vollständig neu aufbauen.
   Nur angenommene Angebote (ohne Rechnung) und nicht-bezahlte Rechnungen.
   Overrides (manuelle Bearbeitung / Ausblenden) werden angewandt. */
function rebuildOpenItems(){
  const ov = ensureOpenItemOverrides();
  const out = [];
  const pushSrc = (src, type)=>{
    makeOpenItemPositions(src, type).forEach(pos=>{
      const o = ov[pos.sourceKey];
      if(o){
        if(o.hidden) return; // gelöscht/ausgeblendet
        if(o.manualOverride){
          if(o.label!=null && o.label!=="") pos.label = o.label;
          if(o.amountOverride!=null && o.amountOverride!=="" && isFinite(Number(o.amountOverride))) pos.due = r2(Number(o.amountOverride));
          if(o.paidOverride!=null && o.paidOverride!=="" && isFinite(Number(o.paidOverride))) pos.paid = r2(Number(o.paidOverride));
          pos.open = r2(pos.due - pos.paid);
          pos.dueDate = o.dueDate||"";
          pos.note = o.note||"";
          pos.status = o.status||"";
          pos.manualOverride = true;
          pos.updatedAt = o.updatedAt||"";
        }
      }
      if(pos.due<=0 && pos.paid<=0) return; // sinnlose Nullposition
      // Auto-Status, wenn nicht manuell gesetzt
      if(!pos.status){ pos.status = pos.open<=0 ? "bezahlt" : (pos.paid>0 ? "teilweise bezahlt" : "offen"); }
      pos.id = "oi_"+pos.sourceKey;
      out.push(pos);
    });
  };
  (data.offers||[]).forEach(o=>{
    if(o.suppressOpenItems) return;                              // Altbestand ohne offene Posten
    if(o.status!=="Angenommen") return;
    if((data.invoices||[]).some(i=>i.offerId===o.id)) return; // Rechnung existiert → kein Doppelposten
    pushSrc(o,"offer");
  });
  (data.invoices||[]).forEach(inv=>{
    if(inv.suppressOpenItems) return;
    if(inv.status==="bezahlt") return;
    pushSrc(inv,"invoice");
  });
  data.openItems = out;
  dedupeOpenItems();
}

/* Doppelte offene Posten entfernen (eindeutig per sourceKey bzw. logischem Schlüssel).
   Behält den sinnvollsten Datensatz: manuell > mit updatedAt > mit Fälligkeit/Notiz. */
function dedupeOpenItems(){
  const items = data.openItems||[];
  const score = o => (o.manualOverride?4:0) + (o.updatedAt?2:0) + ((o.dueDate||o.note)?1:0);
  const map = new Map(); let removed = 0;
  items.forEach(o=>{
    if(!o.sourceKey) o.sourceKey = oiSourceKey(o.sourceType||"", o.sourceId||"", o.paymentPart||"rest");
    // Logischer Schlüssel fängt auch doppelte Quellen mit gleicher Belegnummer ab
    const lk = [o.customerId||"", String(o.reference||"").trim().toLowerCase(), o.sourceType||"", o.paymentPart||""].join("|");
    if(map.has(lk)){ removed++; const cur=map.get(lk); map.set(lk, score(o)>score(cur)?o:cur); }
    else map.set(lk, o);
  });
  if(removed>0){ data.openItems = [...map.values()]; }
  _oiDedupeRemoved = removed;
  return removed;
}

/* Einmalige Bereinigung bestehender Altdaten (bekannte Fälle, defensiv & nur einmal). */
function migrateOpenItemsCleanup(){
  try{ if(localStorage.getItem("VV_OI_MIGRATED_R3")==="1") return; }catch{}
  const hasData = (data.offers||[]).length + (data.invoices||[]).length > 0;
  if(!hasData) return; // erst markieren, wenn überhaupt Belege vorhanden sind
  ensureOpenItemOverrides();
  const findSrc = frag => {
    const off=(data.offers||[]).find(o=>String(o.number||"").includes(frag));
    if(off) return {src:off,type:"offer"};
    const inv=(data.invoices||[]).find(i=>String(i.number||"").includes(frag));
    if(inv) return {src:inv,type:"invoice"};
    return null;
  };
  // 1) Birgit Schmidt / VV-2026-054: Anzahlung 500 € erfassen → Rest offen 725,06 €
  const b=findSrc("054");
  if(b && /birgit/i.test(b.src.customerName||"")){
    if(Number(b.src.depositPaid||0)<500) b.src.depositPaid=500;
    if(b.src.depositAmount==null||b.src.depositAmount==="") b.src.depositAmount=500;
    b.src.updatedAt=nowISO();
  }
  // 2) Farnung / 051: vollständig bezahlt → keine offenen Posten
  const f=findSrc("051");
  if(f && /farnung/i.test(f.src.customerName||"")){
    const tot=Number(f.src.total||0);
    f.src.depositPaid=tot;
    if(f.type==="invoice"){ f.src.status="bezahlt"; f.src.remaining=0; }
    f.src.updatedAt=nowISO();
  }
  // 3) Nadine Manhold / 2026-001: kein offener Posten → ausblenden
  const n=findSrc("2026-001");
  if(n && /nadine|manhold/i.test(n.src.customerName||"")){
    ["deposit","rest"].forEach(part=>{
      data.openItemOverrides[oiSourceKey(n.type,n.src.id,part)] =
        {hidden:true, manualOverride:true, note:"Altdaten-Bereinigung: kein offener Posten", updatedAt:nowISO()};
    });
  }
  try{ localStorage.setItem("VV_OI_MIGRATED_R3","1"); }catch{}
}

/* ==========================================================
   WORKFLOW-VERBINDUNG: Timeline, Zahlungen, Stage, Abschluss
   ========================================================== */
/* Verlaufseintrag */
function addTimeline(customerId, action, desc, ref){
  if(!Array.isArray(data.timeline)) data.timeline=[];
  data.timeline.push({id:uid(), customerId:customerId||"", date:nowISO(), action:action||"", desc:desc||"", ref:ref||null});
}
function customerTimeline(cid){ return (data.timeline||[]).filter(t=>t.customerId===cid).sort((a,b)=>String(b.date).localeCompare(String(a.date))); }
function lastAction(cid){ const t=customerTimeline(cid)[0]; return t?(fmtDT(t.date)+" · "+t.action):"–"; }

/* Nächster sinnvoller Schritt im Workflow */
function computeNextStep(cid){
  const ms=(data.measurements||[]).filter(m=>m.customerId===cid);
  const mc=(data.materialCalcs||[]).filter(m=>m.customerId===cid);
  const pc=(data.priceCalculations||[]).filter(p=>p.customerId===cid);
  const os=(data.offers||[]).filter(o=>o.customerId===cid);
  const is=(data.invoices||[]).filter(i=>i.customerId===cid);
  const accepted=os.filter(o=>o.status==="Angenommen");
  const openOI=(data.openItems||[]).filter(o=>o.customerId===cid && Number(o.open)>0 && !OI_DONE_STATUS.includes(o.status));
  if(is.length){ return openOI.length>0 ? "Zahlung erfassen" : "Auftrag abschließen"; }
  if(accepted.length) return "Rechnung erstellen";
  if(os.length) return "Angebot nachfassen";
  if(pc.length) return "Angebot erstellen";
  if(mc.length) return "Preiskalkulation erstellen";
  if(ms.length) return "Materialberechnung erstellen";
  return "Aufmaß erstellen";
}
/* Kundenstatus/nächsten Schritt nach Aktionen aktualisieren */
function refreshCustomerStage(cid){
  const c=(data.customers||[]).find(x=>x.id===cid); if(!c) return;
  rebuildOpenItems();
  if(c.status==="abgeschlossen"){ c.nextStep="abgeschlossen"; return; }
  c.nextStep=computeNextStep(cid); c.updatedAt=nowISO();
}

/* Zahlungen */
function recordPayment(p){
  if(!Array.isArray(data.payments)) data.payments=[];
  const rec=Object.assign({id:uid(), date:today(), createdAt:nowISO(), updatedAt:nowISO()}, p);
  data.payments.push(rec); return rec;
}
function customerPayments(cid){ return (data.payments||[]).filter(p=>p.customerId===cid).sort((a,b)=>String(b.date).localeCompare(String(a.date))); }
/* Zahlung auf Beleg anrechnen (Anzahlung zuerst, Überschuss auf Rest) */
function applyPaymentToSource(sourceType, sourceId, amount){
  const src = sourceType==="offer" ? (data.offers||[]).find(o=>o.id===sourceId)
                                    : (data.invoices||[]).find(i=>i.id===sourceId);
  if(!src) return null;
  src.depositPaid = r2(Number(src.depositPaid||0) + Number(amount||0));
  if(sourceType==="invoice"){
    src.remaining = r2(Number(src.total||0) - Number(src.depositPaid||0));
    if(src.remaining<=0){ src.remaining=0; src.status="bezahlt"; }
  }
  src.updatedAt=nowISO();
  return src;
}
/* zentrale Zahlungslogik */
function applyPayment(opts){
  const {sourceType, sourceId, customerId, amount, part, method, note, date} = opts;
  const amt=r2(Number(amount||0));
  if(amt<=0){ alert("Bitte einen Betrag > 0 eingeben."); return false; }
  applyPaymentToSource(sourceType, sourceId, amt);
  recordPayment({customerId:customerId||"", amount:amt, method:method||"Überweisung",
    appliesTo:part||"Rechnung allgemein", sourceType:sourceType||"", sourceId:sourceId||"", note:note||"", date:date||today()});
  addTimeline(customerId, "Zahlung erfasst", money(amt)+" ("+(part||"Zahlung")+", "+(method||"Überweisung")+")", {type:sourceType,id:sourceId});
  refreshCustomerStage(customerId);
  saveAll(false);
  return true;
}

/* Kunde abschließen */
function closeCustomer(cid){
  const c=(data.customers||[]).find(x=>x.id===cid); if(!c) return;
  rebuildOpenItems();
  const inv=(data.invoices||[]).filter(i=>i.customerId===cid);
  const openOI=(data.openItems||[]).filter(o=>o.customerId===cid && Number(o.open)>0 && !OI_DONE_STATUS.includes(o.status));
  if(!inv.length){ alert("Abschluss nicht möglich: Es ist noch keine Rechnung vorhanden."); return; }
  if(openOI.length){
    if(!confirm("Achtung: Es sind noch offene Posten vorhanden ("+money(openOI.reduce((s,o)=>s+Number(o.open||0),0))+").\n\nTrotzdem abschließen?")) return;
  }
  c.status="abgeschlossen"; c.nextStep="abgeschlossen"; c.updatedAt=nowISO();
  addTimeline(cid, "Kunde abgeschlossen", openOI.length?"mit offenen Posten":"vollständig bezahlt");
  saveAll(false); showSection("crm_detail");
}

/* Preiskalkulation speichern (aus Preisrechner) */
let _calcContext = { customerId:"", measurementId:"", materialCalcId:"" };
const CALC_SERVICES = ["Bodenverlegung","Küchenmontage","Entrümpelung & Entsorgung","Umzugshilfe","Küchenfolierung","Sonstiges"];
/* Positionsbasierter, dienstleistungsabhängiger Rechner-Zustand */
let _calcState = { serviceType:"Bodenverlegung", customerId:"", measurementId:"", materialCalcId:"", vals:{}, positions:[], computed:false, _serviceLocked:false, editingId:null };
function calcSetVal(k,v){ _calcState.vals[k]=v; }
function calcV(k,def){ const v=_calcState.vals[k]; return (v===undefined||v===null)?(def!==undefined?def:""):v; }
function calcChk(k){ return _calcState.vals[k]===true || _calcState.vals[k]==="true"; }
function calcNum(k,def){ return parseNum(calcV(k, def!==undefined?def:0)); }
function calcPos(category, description, qty, unit, unitPrice, opts){
  opts=opts||{};
  const pm=opts.priceMode||"betrag";
  const lt = ["nicht_enthalten","auf_anfrage"].includes(pm)?0:r2(Number(qty||0)*Number(unitPrice||0));
  return {id:uid(), category, description, qty:(qty===""||qty==null)?"":qty, unit:unit||"Pausch.",
    unitPrice:r2(unitPrice||0), lineTotal:lt, visibleInOffer:opts.visibleInOffer!==false, priceMode:pm, source:opts.source||"calc"};
}
function calcCountable(p){ return !["nicht_enthalten","auf_anfrage"].includes(p.priceMode); }
function calcPositionsSubtotal(pos){ return r2((pos||[]).filter(calcCountable).reduce((s,p)=>s+Number(p.lineTotal||0),0)); }
function calcTotals(){
  const pos=_calcState.positions||[];
  const sumCat=cat=>r2(pos.filter(p=>p.category===cat&&calcCountable(p)).reduce((s,p)=>s+Number(p.lineTotal||0),0));
  const labor=sumCat("Arbeit"),material=sumCat("Material"),disposal=sumCat("Entsorgung"),travel=sumCat("Anfahrt"),express=sumCat("Express"),sonst=sumCat("Sonstiges");
  const total=r2(labor+material+disposal+travel+express+sonst);
  const s=getSettings(); const taxPct=Number(s.taxReserve)||35;
  return {laborTotal:labor, materialTotal:material, disposalTotal:disposal, travelTotal:travel, expressTotal:express, sonstTotal:sonst,
    total, taxReserve:taxPct, profitAfterReserve:r2(total-(total*taxPct/100))};
}

function savePriceCalc(){
  if(!_calcState.computed || !_calcState.positions.length){ alert("Bitte zuerst berechnen."); return; }
  const cid = val("calcCustomer") || _calcState.customerId || _calcContext.customerId || "";
  const cust = (data.customers||[]).find(x=>x.id===cid);
  const t = calcTotals();
  const positions = JSON.parse(JSON.stringify(_calcState.positions));
  if(_calcState.editingId){
    const rec=(data.priceCalculations||[]).find(p=>p.id===_calcState.editingId);
    if(rec){
      Object.assign(rec, { customerId:cid, customerName:cust?cust.name:rec.customerName, serviceType:_calcState.serviceType,
        calculationPositions:positions, totals:t,
        laborTotal:t.laborTotal, materialTotal:t.materialTotal, disposalTotal:t.disposalTotal, travelTotal:t.travelTotal, expressTotal:t.expressTotal,
        laborCost:t.laborTotal, materialCost:t.materialTotal, disposalCost:t.disposalTotal, travelCost:t.travelTotal, expressCost:t.expressTotal,
        total:t.total, taxReserve:t.taxReserve, profitAfterReserve:t.profitAfterReserve, notes:val("calcNotes")||rec.notes||"", updatedAt:nowISO() });
      _calcContext.priceCalcId=rec.id;
      if(cid){ addTimeline(cid,"Preiskalkulation aktualisiert", _calcState.serviceType+" · "+money(t.total)); refreshCustomerStage(cid); }
      saveAll(false);
      if(confirm("Kalkulation aktualisiert ("+money(t.total)+").\n\nJetzt Angebot daraus erstellen?")) saveCalcToOffer();
      else showSection(currentSection==="crm_detail"?"crm_detail":"calculator");
      return;
    }
  }
  const rec={ id:uid(), customerId:cid, customerName:cust?cust.name:"",
    measurementId:_calcState.measurementId||_calcContext.measurementId||"",
    materialCalcId:_calcState.materialCalcId||_calcContext.materialCalcId||"",
    serviceType:_calcState.serviceType, calculationPositions:positions, totals:t,
    laborTotal:t.laborTotal, materialTotal:t.materialTotal, disposalTotal:t.disposalTotal, travelTotal:t.travelTotal, expressTotal:t.expressTotal,
    laborCost:t.laborTotal, materialCost:t.materialTotal, disposalCost:t.disposalTotal, travelCost:t.travelTotal, expressCost:t.expressTotal,
    total:t.total, taxReserve:t.taxReserve, profitAfterReserve:t.profitAfterReserve,
    notes:val("calcNotes")||"", date:today(), createdAt:nowISO(), updatedAt:nowISO() };
  data.priceCalculations.push(rec);
  _calcState.editingId=rec.id; _calcContext.priceCalcId=rec.id;
  if(cid){ addTimeline(cid, "Preiskalkulation gespeichert", _calcState.serviceType+" · "+money(rec.total)); refreshCustomerStage(cid); }
  saveAll(false);
  if(confirm("Preiskalkulation gespeichert ("+money(rec.total)+").\n\nJetzt Angebot daraus erstellen?")) saveCalcToOffer();
  else showSection(currentSection==="crm_detail"?"crm_detail":"calculator");
}

function buildWarnings(){
  const w = [];
  (data.measurements||[]).forEach(m=>{
    if(!(data.offers||[]).some(o=>o.customerId===m.customerId))
      w.push({t:"Aufmaß ohne Angebot: "+esc(m.customerName||""),c:"gd"});
  });
  (data.offers||[]).forEach(o=>{
    if(o.status==="Angenommen"&&!(data.invoices||[]).some(i=>i.offerId===o.id))
      w.push({t:"Angenommenes Angebot ohne Rechnung: "+esc(o.number),c:"rd"});
  });
  (data.invoices||[]).forEach(inv=>{
    const open=Number(inv.remaining??(Number(inv.total||0)-Number(inv.depositPaid||0)));
    if(open>0&&inv.status!=="bezahlt") w.push({t:"Rechnung offen: "+esc(inv.number)+" ("+money(open)+")",c:"rd"});
  });
  const pruefen=(data.bookings||[]).filter(b=>String(b.status||"").includes("prüfen")).length;
  if(pruefen) w.push({t:pruefen+" Buchung(en) zu prüfen",c:"gd"});
  return w;
}

function nextOfferNumber(){
  const y = new Date().getFullYear();
  const nums = (data.offers||[]).map(o=>{
    const m=String(o.number||"").match(/VV-\d{4}-(\d+)/); return m?parseInt(m[1]):0;
  });
  const n = (nums.length?Math.max(...nums):0)+1;
  return `VV-${y}-${String(n).padStart(3,"0")}`;
}
function nextInvoiceNumber(){
  const y = new Date().getFullYear();
  const nums = (data.invoices||[]).map(i=>{
    const m=String(i.number||"").match(/\d{4}-(\d+)/); return m?parseInt(m[1]):0;
  });
  const n = (nums.length?Math.max(...nums):0)+1;
  return `${y}-${String(n).padStart(3,"0")}`;
}

/* getSettings():
   1) feste Defaults
   2) gespeicherte Settings aus localStorage VV_SETTINGS_2026
   3) falls Einstellungsfelder im DOM existieren → deren aktuelle (nicht-leeren) Werte
   Funktioniert auch, wenn die Einstellungsseite vorher NIE geöffnet wurde. */
function getSettings(){
  let stored = {};
  try{ stored = JSON.parse(localStorage.getItem("VV_SETTINGS_2026")||"{}") || {}; }catch{ stored = {}; }
  if(stored.mail && !stored.email) stored.email = stored.mail; // Altformat
  const s = Object.assign({}, SETTINGS_DEFAULTS, stored);
  // DOM-Felder nur übernehmen, wenn vorhanden UND nicht leer
  Object.entries(SETTINGS_FIELDMAP).forEach(([id,k])=>{
    const e = byId(id);
    if(e){ const v = (e.value||"").trim(); if(v!=="") s[k] = v; }
  });
  s.taxReserve = Number(s.taxReserve);
  if(!isFinite(s.taxReserve)) s.taxReserve = SETTINGS_DEFAULTS.taxReserve;
  s.defaultDepositPercent = Number(s.defaultDepositPercent);
  if(!isFinite(s.defaultDepositPercent)) s.defaultDepositPercent = SETTINGS_DEFAULTS.defaultDepositPercent;
  if(stored.api) s.api = stored.api; // optionale API-Einstellungen erhalten
  if(stored.ai) s.ai = stored.ai;   // KI-/Ollama-Einstellungen
  if(stored.publishing) s.publishing = stored.publishing; // Social-/Publishing-Provider (keine Secrets)
  if(stored.logo) s.logo = stored.logo;
  return s;
}
function loadSettingsFields(){
  const raw = localStorage.getItem("VV_SETTINGS_2026");
  if(!raw) return;
  try{
    const s = JSON.parse(raw);
    if(s.mail && s.email===undefined) s.email = s.mail;
    Object.entries(SETTINGS_FIELDMAP).forEach(([id,k])=>{ if(s[k]!==undefined) setVal(id,s[k]); });
  }catch{}
}
function saveSettings(){
  localStorage.setItem("VV_SETTINGS_2026", JSON.stringify(getSettings()));
  alert("Firmendaten gespeichert.");
}

/* ==========================================================
   PREISKALKULATION
   ========================================================== */
const FLOOR_PRICES = {
  "Laminat schwimmend":16,"PVC schwimmend":12,"PVC verklebt":15,
  "Vinyl schwimmend":18,"Vinyl verklebt":22,"Teppich lose":10,"Teppich vollflächig":12
};
const REMOVAL_PRICES = {
  "schwimmend":4,"Teppich lose":{p:7,min:120},"Teppich verklebt":{p:12,min:180}
};

/* Anfahrt-Konstanten */
const ANFAHRT_FREI = 35, ANFAHRT_RATE = 0.7;
function calcTravelPos(km){ return km>ANFAHRT_FREI ? calcPos("Anfahrt","Anfahrt / Fahrtkosten",1,"Pausch.",r2((km-ANFAHRT_FREI)*ANFAHRT_RATE)) : null; }
function calcSonstPos(){ const so=calcNum('sonstAmount',0), sod=calcV('sonstDesc',''); return so>0?calcPos("Sonstiges", sod||"Zusatzposition",1,"Pausch.",so):null; }

function calcComputeBoden(){
  const area=calcNum('area'), skirt=calcNum('skirt'), km=calcNum('km'), express=calcNum('express',0);
  const floor=calcV('floor', Object.keys(FLOOR_PRICES)[0]);
  const pr=FLOOR_PRICES[floor]||0;
  const skirtRate=calcV('skirtType')==="gehrung"?7:5;
  const pos=[];
  if(area>0&&pr>0) pos.push(calcPos("Arbeit","Bodenverlegung "+floor, area,"m²",pr));
  if(skirt>0) pos.push(calcPos("Arbeit","Sockelleisten montieren", skirt,"lfm",skirtRate));
  const rem=calcV('removal','');
  if(rem){ let rate=0,min=0; if(rem==="schwimmend")rate=4; else if(rem==="Teppich lose"){rate=7;min=120;} else if(rem==="Teppich verklebt"){rate=12;min=180;}
    if(rate>0){ if(min>0 && area*rate<min) pos.push(calcPos("Arbeit","Altbelag entfernen ("+rem+")",1,"Pausch.",min)); else pos.push(calcPos("Arbeit","Altbelag entfernen ("+rem+")",area,"m²",rate)); } }
  if(calcChk('spachtel')){
    const sArt=calcV('spachtelArt',"kleine Unebenheiten ausgleichen");
    const sArea=calcNum('spachtelArea', area);
    const sPrice=calcNum('spachtelPrice', 8);
    const pm = sArt==="nach Besichtigung / auf Anfrage" ? "auf_anfrage":"betrag";
    pos.push(calcPos("Arbeit","Untergrund spachteln / ausgleichen zur Vorbereitung der Bodenverlegung", sArea,"m²",sPrice,{priceMode:pm}));
    const sMat=calcNum('spachtelMat',0); if(sMat>0) pos.push(calcPos("Material","Spachtelmasse / Grundierung",1,"Pausch.",sMat));
  }
  if(calcChk('daemmung')){ const dp=calcNum('daemmPrice',1.5); if(area>0) pos.push(calcPos("Material","Dämmung / Unterlage verlegen", area,"m²",dp)); }
  const mat=calcNum('mat',0);
  if(mat>0) pos.push(calcPos("Material","Material und Beschaffung (Bodenbelag, Zubehör)",1,"Pausch.",mat));
  if(calcChk('matservice') && mat>0) pos.push(calcPos("Material","Materialservice / Beschaffung",1,"Pausch.",r2(Math.max(mat*0.15,150))));
  const ents=calcNum('entsorg',0); if(ents>0) pos.push(calcPos("Entsorgung","Entsorgungskosten",1,"Pausch.",ents));
  const tp=calcTravelPos(km); if(tp) pos.push(tp);
  const sp=calcSonstPos(); if(sp) pos.push(sp);
  return {pos, express};
}
function calcComputeKueche(){
  const klfm=calcNum('klfm'), km=calcNum('km'), express=calcNum('express',0);
  const pos=[];
  if(calcChk('kmont')) pos.push(calcPos("Arbeit","Küchenmontage nach laufendem Meter", klfm||1, klfm>0?"lfm":"Pausch.", 189));
  if(calcChk('kdem')) pos.push(calcPos("Arbeit","Küchen-Demontage", klfm||1, klfm>0?"lfm":"Pausch.", 100));
  if(calcChk('kplatte')) pos.push(calcPos("Arbeit","Arbeitsplatte austauschen / anpassen", klfm||1, klfm>0?"lfm":"Pausch.", 119));
  const ger=calcNum('geraete',0); if(ger>0) pos.push(calcPos("Arbeit","Geräte einsetzen / anschließen (vorbereiten)", ger,"Stk.", calcNum('geraetePreis',45)));
  if(calcChk('kents')) pos.push(calcPos("Entsorgung","Alte Küche zur Entsorgung vorbereiten / entsorgen",1,"Pausch.",350));
  const tp=calcTravelPos(km); if(tp) pos.push(tp);
  const sp=calcSonstPos(); if(sp) pos.push(sp);
  return {pos, express};
}
function calcComputeEntruemp(){
  const km=calcNum('km'), express=calcNum('express',0);
  const pos=[];
  const stunden=calcNum('stunden',0), stdSatz=calcNum('stdSatz',45), vol=calcNum('volumen',0);
  if(stunden>0) pos.push(calcPos("Arbeit","Entrümpelung / Räumung nach Aufwand", stunden,"Std.", stdSatz));
  else if(vol>0) pos.push(calcPos("Arbeit","Entrümpelung / Räumung nach Aufwand", vol,"m³", calcNum('volPreis',40)));
  const trage=calcNum('trage',0); if(trage>0) pos.push(calcPos("Arbeit","Trage- und Transportaufwand",1,"Pausch.", trage));
  if(calcChk('demontage')){ const dm=calcNum('demontagePreis',0); pos.push(calcPos("Arbeit","Demontagearbeiten",1,"Pausch.", dm)); }
  const ents=calcNum('entsorg',0); if(ents>0) pos.push(calcPos("Entsorgung","Entsorgungskosten",1,"Pausch.", ents));
  if(calcChk('sondermuell')) pos.push(calcPos("Entsorgung","Sondermüll / Gefahrstoffe (nach Prüfung)",1,"Pausch.",0,{priceMode:"auf_anfrage"}));
  const tp=calcTravelPos(km); if(tp) pos.push(tp);
  const sp=calcSonstPos(); if(sp) pos.push(sp);
  return {pos, express};
}
function calcComputeUmzug(){
  const std=calcNum('stunden',0), satz=calcNum('stdSatz',45), helfer=calcNum('helfer',1), km=calcNum('km'), express=calcNum('express',0);
  const pos=[];
  if(std>0) pos.push(calcPos("Arbeit","Umzugshilfe ("+helfer+" Helfer)", r2(std*helfer),"Std.", satz));
  const tp=calcTravelPos(km); if(tp) pos.push(tp);
  const sp=calcSonstPos(); if(sp) pos.push(sp);
  return {pos, express};
}
function calcComputeFolierung(){
  const flaeche=calcNum('flaeche',0), preis=calcNum('preis',60), mat=calcNum('mat',0), km=calcNum('km'), express=calcNum('express',0);
  const pos=[];
  if(flaeche>0) pos.push(calcPos("Arbeit","Küchenfolierung", flaeche, calcV('einheit',"m²"), preis));
  if(mat>0) pos.push(calcPos("Material","Folie / Material",1,"Pausch.", mat));
  const tp=calcTravelPos(km); if(tp) pos.push(tp);
  const sp=calcSonstPos(); if(sp) pos.push(sp);
  return {pos, express};
}
function calcComputeSonstiges(){
  const km=calcNum('km'), express=calcNum('express',0);
  const pos=[];
  const d=calcV('sonstDesc',"Leistung"), q=calcNum('sonstQty',1), u=calcV('sonstUnit',"Pausch."), pz=calcNum('sonstPrice',0);
  if(pz>0||d) pos.push(calcPos("Arbeit", d||"Leistung", q, u, pz));
  const tp=calcTravelPos(km); if(tp) pos.push(tp);
  return {pos, express};
}
/* „Berechnen“: erzeugt Positionen je Dienstleistung + Express auf Zwischensumme */
function runCalculator(){
  const svc=_calcState.serviceType;
  let res;
  if(svc==="Bodenverlegung") res=calcComputeBoden();
  else if(svc==="Küchenmontage") res=calcComputeKueche();
  else if(svc==="Entrümpelung & Entsorgung") res=calcComputeEntruemp();
  else if(svc==="Umzugshilfe") res=calcComputeUmzug();
  else if(svc==="Küchenfolierung") res=calcComputeFolierung();
  else res=calcComputeSonstiges();
  const pos=res.pos;
  const sub=calcPositionsSubtotal(pos);
  if(res.express>0 && sub>0) pos.push(calcPos("Express","Expresszuschlag (+"+res.express+" %)",1,"Pausch.", r2(sub*res.express/100)));
  _calcState.positions=pos; _calcState.computed=true;
  renderCalcOutput();
}
/* Übernimmt die sichtbaren Berechnungspositionen 1:1 als einzelne Angebotspositionen. */
function saveCalcToOffer(){
  if(!_calcState.positions.length){ alert("Bitte zuerst berechnen."); return; }
  const visible=_calcState.positions.filter(p=>p.visibleInOffer!==false);
  const items=visible.map(p=>({description:p.description, qty:p.qty, unit:p.unit||"Pausch.",
    unitPrice:r2(p.unitPrice||0), priceMode:p.priceMode||"betrag", lineTotal:p.lineTotal||0}));
  const total=calcPositionsSubtotal(visible);
  const cid = val("calcCustomer") || _calcState.customerId || _calcContext.customerId || "";
  window._offerDraftFromCalc = {total, items,
    customerId:cid, measurementId:_calcState.measurementId||_calcContext.measurementId||"",
    materialCalcId:_calcState.materialCalcId||_calcContext.materialCalcId||"", priceCalcId:_calcContext.priceCalcId||""};
  showSection("angebote");
}

function detectDelim(line){ const c={";":0,",":0,"\t":0};[...line].forEach(ch=>{if(c[ch]!==undefined)c[ch]++;}); return Object.entries(c).sort((a,b)=>b[1]-a[1])[0][0]||";"; }
function parseAmt(s){ s=String(s||"").trim().replace(/€|\s/g,""); if(!s)return 0; const neg=s.startsWith("-")||(/\(.*\)/.test(s)); s=s.replace(/[()-]/g,""); if(s.includes(",")&&s.includes(".")){ if(s.lastIndexOf(",")>s.lastIndexOf(".")) s=s.replace(/\./g,"").replace(",","."); else s=s.replace(/,/g,""); } else if(s.includes(",")) s=s.replace(/\./g,"").replace(",","."); const n=parseFloat(s); return isNaN(n)?0:(neg?-n:n); }
function parseCSVText(text, filename){
  text = text.replace(/^\uFEFF/,"");
  const lines = text.split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length) return {count:0,skipped:0,duplicates:0};
  const delim = detectDelim(lines[0]);
  const splitLine = l => { const out=[]; let cur="",q=false; for(const ch of l){ if(ch==='"'){if(q&&l[l.indexOf(ch)+1]==='"'){cur+='"';}else q=!q;}else if(ch===delim&&!q){out.push(cur.trim());cur="";}else cur+=ch;} out.push(cur.trim()); return out; };
  const headers = splitLine(lines[0]).map(h=>h.toLowerCase());
  const gi = cands => { const idx=headers.findIndex(h=>cands.some(c=>h.includes(c))); return idx; };
  const iDate=gi(["buchungstag","datum","date","valuta"]), iPartner=gi(["auftragg","empfänger","empfaenger","name","beguenstig"]);
  const iRef=gi(["verwendungszweck","reference","zweck","buchungstext"]), iAmt=gi(["betrag","amount","umsatz","wert"]);
  const iType=gi(["umsatzart","buchungstext","art","type"]);
  const existing = new Set((data.bookings||[]).map(b=>b._hash).filter(Boolean));
  let count=0, dup=0;
  const byType = {}; let toCheck=0;
  for(let i=1;i<lines.length;i++){
    const cols=splitLine(lines[i]); if(cols.every(c=>!c)) continue;
    const amt=parseAmt(iAmt>=0?cols[iAmt]:"");
    const b = {
      id:uid(), _hash:"", date: iDate>=0?cols[iDate]:"", partner: iPartner>=0?cols[iPartner]:"",
      reference: iRef>=0?cols[iRef]:"", amount:Math.abs(amt), signedAmount:amt,
      transactionType: iType>=0?cols[iType]:"", source:filename||"CSV",
      note:"", manual:false, dashboardRelevant:true, type:"Ausgabe", status:"offen prüfen"
    };
    b._hash = [b.date,b.signedAmount,(b.partner||"").toLowerCase(),(b.reference||"").slice(0,40)].join("|");
    if(existing.has(b._hash)){ dup++; continue; }
    existing.add(b._hash);
    const classified = classifyBooking(b);
    byType[classified.type] = (byType[classified.type]||0) + 1;
    if(String(classified.status||"").includes("prüfen")) toCheck++;
    data.bookings.push(classified); count++;
  }
  return {count, skipped:0, duplicates:dup, byType, toCheck};
}

function totalCell(it){ if(["nicht_enthalten","auf_anfrage"].includes(it.priceMode))return priceCell(it); return money(it.lineTotal!=null?it.lineTotal:(Number(it.qty||0)*Number(it.unitPrice||0))); }

function docSubtotal(doc){

}

function eur(n){ return deNum(n,2)+" EUR"; }
function invUnitCell(it){
  if(it.priceMode==="nicht_enthalten") return "nicht enthalten";
  if(it.priceMode==="auf_anfrage") return "auf Anfrage";
  if(it.priceMode==="inklusive_0") return "0,00 EUR";
  return eur(it.unitPrice||0);
}
function invLineCell(it){
  if(it.priceMode==="nicht_enthalten") return "nicht enthalten";
  if(it.priceMode==="auf_anfrage") return "auf Anfrage";
  if(it.priceMode==="inklusive_0") return "0,00 EUR";
  const lt=it.lineTotal!=null?it.lineTotal:(Number(it.qty||0)*Number(it.unitPrice||0));
  return eur(lt);
}
/* Anrede dynamisch: Frau/Herr falls bekannt, sonst neutral */
function formatCustomerSalutation(customer){
  customer=customer||{};
  const name=String(customer.name||"").trim();
  if(!name) return "Guten Tag";
  let anrede=(customer.anrede||customer.gender||"").trim();
  let work=name;
  const lead=name.match(/^(Frau|Herr)\s+(.+)$/i);
  if(!anrede && lead){ anrede=lead[1]; work=lead[2]; }
  // mehrere Personen ("… und …") -> neutral
  if(/\bund\b/i.test(work)) return "Guten Tag "+work;
  const parts=work.split(/\s+/).filter(Boolean);
  const nachname=parts.length?parts[parts.length-1]:work;
  if(/^frau$/i.test(anrede)) return "Sehr geehrte Frau "+nachname;
  if(/^herr$/i.test(anrede)) return "Sehr geehrter Herr "+nachname;
  return "Guten Tag "+work; // Geschlecht unbekannt -> neutral, kein „Sehr geehrte/r"
}
/* Dienstleistung aus Text erkennen */
function inferServiceType(text){
  const t=String(text||"").toLowerCase();
  if(/k(ü|u)che|montage/.test(t)) return "Küchenmontage";
  if(/entr(ü|u)mp|entsorg/.test(t)) return "Entrümpelung & Entsorgung";
  if(/folier/.test(t)) return "Küchenfolierung";
  if(/umzug/.test(t)) return "Umzugshilfe";
  if(/boden|laminat|vinyl|parkett|teppich|sockel|verleg/.test(t)) return "Bodenverlegung";
  return "";
}
/* Konkrete Leistungsbeschreibung für Sammelrechnungen */
function invoiceLineFromService(serviceType, offerNumber){
  const map={
    "Bodenverlegung":{t:"Bodenverlegung",d:"Ausführung der vereinbarten Bodenverlegungsarbeiten laut Angebot."},
    "Küchenmontage":{t:"Küchenmontage",d:"Ausführung der vereinbarten Küchenmontagearbeiten laut Angebot."},
    "Entrümpelung & Entsorgung":{t:"Entrümpelung & Entsorgung",d:"Durchführung der vereinbarten Entrümpelungs- und Entsorgungsarbeiten laut Angebot."},
    "Umzugshilfe":{t:"Umzugshilfe",d:"Durchführung der vereinbarten Umzugsarbeiten laut Angebot."},
    "Küchenfolierung":{t:"Küchenfolierung",d:"Ausführung der vereinbarten Folierungsarbeiten laut Angebot."}
  };
  const m=map[serviceType]||{t:(serviceType||"Handwerksleistung"),d:"Ausführung der vereinbarten Arbeiten laut Angebot."};
  const ref = offerNumber ? (" gemäß Angebot "+offerNumber) : "";
  const title = m.t + ref;
  return {title, desc:m.d, combined:title+" – "+m.d};
}

/* ── Foto-Handling ── */
function compressImage(file,max=1200,q=0.65){
  return new Promise(res=>{
    const rd=new FileReader();
    rd.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        let{width:w,height:h}=img;
        if(w>h&&w>max){h=Math.round(h*max/w);w=max;}
        else if(h>max){w=Math.round(w*max/h);h=max;}
        const cv=document.createElement("canvas");cv.width=w;cv.height=h;
        cv.getContext("2d").drawImage(img,0,0,w,h);
        res(cv.toDataURL("image/jpeg",q));
      };
      img.onerror=()=>res(rd.result);
      img.src=rd.result;
    };
    rd.readAsDataURL(file);
  });
}
async function handleRoomPhotos(idx,files){
  for(const f of Array.from(files||[])){
    const dataUrl=await compressImage(f);
    afmDraft.rooms[idx].photos.push({id:uid(),fileName:f.name||("foto-"+Date.now()+".jpg"),dataUrl});
  }
  const box=byId(`thumbs_${idx}`);
  if(box){box.innerHTML=thumbsHTML(idx);bindThumbClicks();}
  // Foto-Zähler updaten
  const btn=box&&box.parentElement&&box.parentElement.querySelector(".cam-btns span");
  if(btn) btn.textContent=afmDraft.rooms[idx].photos.length+" Foto(s)";
}
function delPhoto(ridx,pidx){
  afmDraft.rooms[ridx].photos.splice(pidx,1);
  const box=byId(`thumbs_${ridx}`);
  if(box){box.innerHTML=thumbsHTML(ridx);bindThumbClicks();}
}

function thumbsHTML(ridx){
  return (afmDraft.rooms[ridx].photos||[]).map((p,pi)=>`
    <div class="thumb" onclick="openLightbox(${ridx},${pi})">
      <img src="${esc(p.dataUrl)}" loading="lazy" alt="${esc(p.fileName||"")}">
      <button class="del-btn" type="button" data-ridx="${ridx}" data-pidx="${pi}" onclick="event.stopPropagation();delPhoto(${ridx},${pi})">×</button>
      <div class="zoom-hint">🔍 Vergrößern</div>
    </div>`).join("");
}
function bindThumbClicks(){
  // Löschen-Buttons (werden inline über onclick gebunden, aber hier absichern)
  document.querySelectorAll(".del-btn").forEach(b=>{
    b.addEventListener("click",e=>{ e.stopPropagation(); });

}

let _lbRidx=0, _lbPidx=0;
function openLightbox(ridx,pidx){
  _lbRidx=ridx; _lbPidx=pidx;
  const lb=byId("lightbox"); if(!lb)return;
  lb.classList.add("open");
  renderLightboxImage();
}
function renderLightboxImage(){
  const photos=afmDraft.rooms[_lbRidx]?.photos||[];
  if(!photos.length){closeLightbox();return;}
  _lbPidx=Math.max(0,Math.min(_lbPidx,photos.length-1));
  const p=photos[_lbPidx];
  const img=byId("lb-img");if(img){img.src=p.dataUrl;img.alt=p.fileName||"";}
  const ctr=byId("lb-counter");if(ctr)ctr.textContent=`${_lbPidx+1} / ${photos.length}`;
  const cap=byId("lb-caption");if(cap)cap.textContent=p.fileName||"";
  // Pfeile: alle Räume zusammen für Navigation innerhalb eines Raums
}
function lbPrev(){
  const photos=afmDraft.rooms[_lbRidx]?.photos||[];
  if(_lbPidx>0){_lbPidx--;renderLightboxImage();}
}
function lbNext(){
  const photos=afmDraft.rooms[_lbRidx]?.photos||[];
  if(_lbPidx<photos.length-1){_lbPidx++;renderLightboxImage();}
}
function closeLightbox(){ const lb=byId("lightbox");if(lb)lb.classList.remove("open"); }
function downloadCurrentPhoto(){
  const p=afmDraft.rooms[_lbRidx]?.photos[_lbPidx];
  if(!p)return;
  const a=document.createElement("a");
  a.href=p.dataUrl;
  a.download=p.fileName||("vv-foto-"+Date.now()+".jpg");
  a.click();
}

function saveAfmass(){
  const selCid=val("afmCustomer"), newName=val("afmNewName");
  const svc=afmDraft.serviceType;
  if(svc==="Bodenverlegung"&&!afmDraft.rooms.length){alert("Bitte mindestens einen Raum anlegen.");return;}
  let c;
  if(selCid){ c=data.customers.find(x=>x.id===selCid); }
  else if(newName){ c={id:uid(),name:newName,status:"aktiv",phone:"",email:"",address:"",note:"",service:svc,source:"",createdAt:nowISO(),updatedAt:nowISO()}; data.customers.push(c); }
  if(!c){alert("Bitte Kunden wählen oder neuen Namen eintragen.");return;}
  let ta=0,ts=0;
  const rooms=afmDraft.rooms.map(r=>{
    const a=(r.areaOverride!==""&&r.areaOverride!=null)?parseNum(r.areaOverride):r.areaAuto;
    ta+=a; ts+=parseNum(r.skirtingLfm);
    return {id:uid(),name:r.name||"Bereich",length:parseNum(r.length),width:parseNum(r.width),
      areaAuto:r.areaAuto,areaOverride:r.areaOverride===""?null:parseNum(r.areaOverride),
      skirtingLfm:parseNum(r.skirtingLfm),bodenbelag:r.bodenbelag||"",altbelag:r.altbelag||"",
      notes:r.notes,photos:r.photos};
  });
  const meas={id:uid(),customerId:c.id,customerName:c.name,
    serviceType:svc,serviceData:JSON.parse(JSON.stringify(afmDraft.serviceData)),
    rooms,totalArea:r2(ta),totalSkirting:r2(ts),createdAt:nowISO(),updatedAt:nowISO()};
  data.measurements.push(meas);
  addTimeline(c.id,"Aufmaß gespeichert", r2(ta)+" m² · "+r2(ts)+" lfm", {type:"measurement",id:meas.id});
  refreshCustomerStage(c.id);
  saveAll(false); resetAfmDraft();

let currentSection = "dashboard";
/* ── Navigations-Historie für den Zurück-Button ── */
let navHistory = [];
let _currentView = null;

function showSection(id, opts){
  opts = opts || {};
  const main = byId("main"); if(!main) return;
  // Historie pflegen (nur bei echtem Wechsel, nicht beim Zurückspringen)
  if(!opts.fromHistory){
    const newCust = (id==="crm_detail") ? currentDetailId : null;
    if(_currentView && (_currentView.section!==id || _currentView.customerId!==newCust)){
      navHistory.push(_currentView);
      if(navHistory.length>60) navHistory.shift();
    }
  }
  currentSection = id;
  _currentView = { section:id, customerId: (id==="crm_detail")?currentDetailId:null };
  const bb = byId("backBtn"); if(bb) bb.style.opacity = navHistory.length ? "1" : ".5";
  // nav badges update
  document.querySelectorAll(".navbtn").forEach(b=>{ b.classList.toggle("active", b.dataset.sec===id); });
  normalizeData(); rebuildOpenItems(); updateBadges(); updateKPIs();
  main.innerHTML = renderSection(id);
  afterRender(id);
}

  if(!navHistory.length){ const bb=byId("backBtn"); if(bb) bb.style.opacity=".5"; return; }
  const v = navHistory.pop();

/* Endgültiges Löschen inkl. zugehöriger Daten (doppelte Sicherheitsabfrage) */
function deleteCustomerHard(id){
  const c=data.customers.find(x=>x.id===id); if(!c) return;
  if(!confirm("Kunde „"+c.name+"“ und ALLE zugehörigen Daten (Aufmaße, Fotos, Materialberechnungen, Preiskalkulationen, Angebote, Rechnungen, Zahlungen, offene Posten, Verlauf) endgültig löschen?\n\n⚠️ Diese Aktion kann nicht rückgängig gemacht werden. Bitte vorher ein Backup exportieren!")) return;
  if(!confirm("Letzte Sicherheitsabfrage:\n\n„"+c.name+"“ wirklich ENDGÜLTIG löschen?")) return;
  const offerIds=(data.offers||[]).filter(o=>o.customerId===id).map(o=>o.id);
  const invIds=(data.invoices||[]).filter(i=>i.customerId===id).map(i=>i.id);
  ensureOpenItemOverrides();
  Object.keys(data.openItemOverrides).forEach(k=>{ const sid=k.split(":")[1]; if(offerIds.includes(sid)||invIds.includes(sid)) delete data.openItemOverrides[k]; });
  data.measurements=(data.measurements||[]).filter(m=>m.customerId!==id);
  data.materialCalcs=(data.materialCalcs||[]).filter(m=>m.customerId!==id);
  data.priceCalculations=(data.priceCalculations||[]).filter(p=>p.customerId!==id);
  data.offers=(data.offers||[]).filter(o=>o.customerId!==id);
  data.invoices=(data.invoices||[]).filter(i=>i.customerId!==id);
  data.payments=(data.payments||[]).filter(p=>p.customerId!==id);
  data.documents=(data.documents||[]).filter(d=>d.customerId!==id);
  data.timeline=(data.timeline||[]).filter(t=>t.customerId!==id);
  data.projects=(data.projects||[]).filter(p=>p.customerId!==id);
  data.customers=(data.customers||[]).filter(x=>x.id!==id);
  rebuildOpenItems();
  saveAll(false); updateKPIs(); updateBadges();
  alert("Kunde und zugehörige Daten wurden endgültig gelöscht.\nHinweis: Ein älteres Backup würde den Kunden bei Import wieder einspielen.");
  showSection("crm");
}
function saveCustomer(){
  const id=val("cf_id"); const name=val("cf_name");
  if(!name){alert("Name ist Pflicht.");return;}
  const fields={name,anrede:val("cf_anrede"),phone:val("cf_phone"),email:val("cf_email"),service:val("cf_service"),address:val("cf_address"),source:val("cf_source"),status:val("cf_status"),nextStep:val("cf_next"),note:val("cf_note"),updatedAt:nowISO()};

  else { const nc={id:uid(),createdAt:nowISO(),...fields}; data.customers.push(nc); addTimeline(nc.id,"Kunde angelegt",nc.name); }
  saveAll(false); showSection("crm");
}
