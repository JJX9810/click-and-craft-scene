/* Positionen + Summen rendern (nach „Berechnen“) */
function renderCalcOutput(){
  const el=byId("calcPositions"); if(!el) return;
  const pos=_calcState.positions||[];
  el.innerHTML = pos.length ? `<h3>Berechnungspositionen</h3>
    <div class="tablewrap"><table><thead><tr><th>Kategorie</th><th>Beschreibung</th><th>Menge</th><th>Einheit</th><th>Einzelpreis</th><th>Gesamt</th><th>Modus</th><th>Im Angebot</th><th></th></tr></thead><tbody>
    ${pos.map((p,i)=>calcPosRow(p,i)).join("")}
    </tbody></table></div>
    <div class="btn-row"><button class="btn sm" onclick="calcAddPos()">+ Position</button></div>` : `<p style="color:var(--muted)">Keine Positionen erzeugt. Felder ausfüllen und „Berechnen“ klicken.</p>`;
  renderCalcSummary();
}
function calcPosCellTotal(p){ if(p.priceMode==="nicht_enthalten")return"nicht enthalten"; if(p.priceMode==="auf_anfrage")return"auf Anfrage"; if(p.priceMode==="inklusive_0")return"0,00 €"; return money(p.lineTotal||0); }
function calcPosRow(p,i){
  return `<tr>
    <td><input value="${esc(p.category||"")}" style="min-width:95px" oninput="calcUpdatePos(${i},'category',this.value)"></td>
    <td><input value="${esc(p.description||"")}" style="min-width:210px" oninput="calcUpdatePos(${i},'description',this.value)"></td>
    <td><input value="${esc(p.qty)}" inputmode="decimal" style="width:64px" oninput="calcUpdatePos(${i},'qty',this.value)"></td>
    <td><input value="${esc(p.unit||"")}" style="width:64px" oninput="calcUpdatePos(${i},'unit',this.value)"></td>
    <td><input value="${esc(p.unitPrice)}" inputmode="decimal" style="width:84px" oninput="calcUpdatePos(${i},'unitPrice',this.value)"></td>
    <td><b id="cpTot_${i}">${calcPosCellTotal(p)}</b></td>
    <td><select onchange="calcUpdatePos(${i},'priceMode',this.value)">${[["betrag","Betrag"],["inklusive_0","0,00 €"],["nicht_enthalten","nicht enthalten"],["auf_anfrage","auf Anfrage"]].map(([v,l])=>`<option value="${v}" ${p.priceMode===v?"selected":""}>${l}</option>`).join("")}</select></td>
    <td style="text-align:center"><input type="checkbox" ${p.visibleInOffer!==false?"checked":""} style="width:auto" onchange="calcUpdatePos(${i},'visibleInOffer',this.checked)"></td>
    <td><button class="btn red sm" onclick="calcDelPos(${i})">×</button></td>
  </tr>`;
}
function calcUpdatePos(i,field,v){
  const p=_calcState.positions[i]; if(!p) return;
  if(field==="qty"||field==="unitPrice") p[field]=parseNum(v);
  else if(field==="visibleInOffer") p[field]=!!v;
  else p[field]=v;
  p.lineTotal = ["nicht_enthalten","auf_anfrage"].includes(p.priceMode)?0:r2(Number(p.qty||0)*Number(p.unitPrice||0));
  const tc=byId("cpTot_"+i); if(tc) tc.textContent=calcPosCellTotal(p);
  renderCalcSummary();
}
function calcAddPos(){ _calcState.positions.push(calcPos("Sonstiges","",1,"Pausch.",0,{source:"manual"})); _calcState.computed=true; renderCalcOutput(); }
function calcDelPos(i){ _calcState.positions.splice(i,1); renderCalcOutput(); }

function mcCustomerChanged(){
  const cid=val("mc_cust");
  const ms=(data.measurements||[]).filter(m=>m.customerId===cid);
  const sel=byId("mc_aufmass"); if(!sel)return;
  sel.innerHTML=`<option value="">– kein Aufmaß –</option>`+ms.map(m=>`<option value="${m.id}">Aufmaß ${fmtDate(m.createdAt)} · ${(m.totalArea||0).toFixed(2)} m²</option>`).join("");
  if(ms.length===1){ sel.value=ms[0].id; mcLoadFromMeasurement(); }
}
function mcLoadFromMeasurement(){
  const mid=val("mc_aufmass"); if(!mid)return;
  const m=(data.measurements||[]).find(x=>x.id===mid); if(!m)return;
  setVal("mc_area", String(r2(m.totalArea||0)).replace(".",","));
  setVal("mc_skirt", String(r2(m.totalSkirting||0)).replace(".",","));
  recalcMaterial();
}
function mcVals(){
  return {
    area:parseNum(val("mc_area")), waste:parseNum(val("mc_waste")),
    floorPrice:parseNum(val("mc_floorPrice")), insul:parseNum(val("mc_insul")),
    skirt:parseNum(val("mc_skirt")), skirtPrice:parseNum(val("mc_skirtPrice")),
    railQty:parseNum(val("mc_railQty")), railPrice:parseNum(val("mc_railPrice")),
    small:parseNum(val("mc_small")), other:parseNum(val("mc_other"))
  };
}
function mcCompute(v){
  const need=r2(v.area*(1+v.waste/100));
  const floorCost=r2(need*v.floorPrice);
  const insulCost=r2(v.area*v.insul);
  const skirtCost=r2(v.skirt*v.skirtPrice);
  const railCost=r2(v.railQty*v.railPrice);
  const total=r2(floorCost+insulCost+skirtCost+railCost+v.small+v.other);
  return {need,floorCost,insulCost,skirtCost,railCost,total};
}
function recalcMaterial(){
  const v=mcVals(), c=mcCompute(v);
  setVal("mc_need", c.need.toFixed(2).replace(".",","));
  const el=byId("mc_result"); if(!el)return;
  el.innerHTML=`<div class="fg c3">
    <div class="kpi"><div class="k">Bodenbelag inkl. Verschnitt</div><div class="v">${money(c.floorCost)}</div></div>
    <div class="kpi"><div class="k">Dämmung / Unterlage</div><div class="v">${money(c.insulCost)}</div></div>
    <div class="kpi"><div class="k">Sockelleisten</div><div class="v">${money(c.skirtCost)}</div></div>
    <div class="kpi"><div class="k">Übergangsschienen</div><div class="v">${money(c.railCost)}</div></div>
    <div class="kpi"><div class="k">Kleinteile / Sonstiges</div><div class="v">${money(r2(v.small+v.other))}</div></div>
    <div class="kpi"><div class="k" style="font-weight:900">Gesamtmaterialkosten</div><div class="v gd" style="font-size:26px">${money(c.total)}</div></div>
  </div>
  <p style="color:var(--muted);font-size:12px;margin-top:8px">ℹ️ Reine Materialkosten – Arbeitsleistung wird separat im Preisrechner kalkuliert.</p>`;
}
function materialToCalculator(){
  const v=mcVals(), c=mcCompute(v);
  const cid=val("mc_cust")||_calcContext.customerId||"";
  const mid=val("mc_aufmass")||_calcContext.measurementId||"";
  window._materialToCalc={area:v.area, skirt:v.skirt, mat:c.total};
  _calcContext = { customerId:cid, measurementId:mid, materialCalcId:_calcContext.materialCalcId||"" };
  showSection("calculator");
}
function saveMaterialCalc(){
  const v=mcVals(), c=mcCompute(v);
  const cid=val("mc_cust"), cust=data.customers.find(x=>x.id===cid);
  if(!cid){ alert("Bitte zuerst einen Kunden wählen, um die Berechnung in der Akte zu speichern."); return; }
  const mid=val("mc_aufmass")||"";
  const rec={id:uid(), customerId:cid, customerName:cust?cust.name:"", measurementId:mid, date:today(),
    // kanonische Felder
    totalArea:v.area, totalSkirting:v.skirt, wastePercent:v.waste, floorNeed:c.need,
    floorPrice:v.floorPrice, skirtingPrice:v.skirtPrice, underlayPrice:v.insul,
    transitionRailsCount:v.railQty, transitionRailsPrice:v.railPrice,
    smallParts:v.small, otherCosts:v.other, totalMaterialCosts:c.total, notes:"",
    // Kompatibilität (alte Kurznamen, von Akte/Liste genutzt)
    area:v.area, waste:v.waste, insul:v.insul, skirt:v.skirt, skirtPrice:v.skirtPrice,
    railQty:v.railQty, railPrice:v.railPrice, small:v.small, other:v.other, need:c.need, total:c.total,
    createdAt:nowISO(), updatedAt:nowISO()};
  data.materialCalcs.push(rec);
  addTimeline(cid,"Materialberechnung gespeichert", money(c.total)+" · "+v.area+" m²", {type:"materialCalc",id:rec.id});
  refreshCustomerStage(cid);
  // Kontext für direkte Übernahme in die Preiskalkulation
  _calcContext = { customerId:cid, measurementId:mid, materialCalcId:rec.id };
  saveAll(false);
  if(confirm("Materialberechnung gespeichert ("+money(c.total)+").\n\nJetzt direkt in die Preiskalkulation übernehmen?")){
    materialToCalculator();
  } else {
    showSection("materialcalc");
  }
}

/* Gemini testen: Direkt-Modus -> echte Klassifikation; Proxy-Modus -> GET /health */
function nxTestGemini(){
  const out=byId("nxGeminiTestStatus");
  saveNexusIntentSettings(true); // aktuelle Formularwerte übernehmen
  if(byId("nxGeminiDirect") && val("nxGeminiDirect")==="direct"){
    if(!(byId("nxGeminiKey").value||"").trim()){ if(out) out.innerHTML='<span style="color:#ffb070">⚠ Kein Gemini API-Key eingetragen.</span>'; return; }
    const q=val("nxOllamaTestPrompt")||"Nexus öffne Buchhaltung";
    if(out) out.innerHTML="⏳ Teste Gemini direkt …";
    classifyViaGeminiDirect(q, nxBuildContext("text","")).then(ir=>{
      if(out) out.innerHTML='<span style="color:var(--green2)">✓ Gemini direkt erreichbar.</span><pre style="white-space:pre-wrap;margin:4px 0 0">'+esc(JSON.stringify(ir,null,2))+'</pre>';
    }).catch(err=>{ if(out) out.innerHTML='<div style="white-space:pre-wrap;color:#ff8070">✗ '+esc(String(err&&err.message||err))+'</div>'; });
    return;
  }
  const url=(val("nxGeminiUrl")||getNexusOllamaCfg().geminiUrl).replace(/\/+$/,"");
  if(out) out.innerHTML="⏳ Teste Gemini-Proxy unter "+esc(url)+" …";
  const ctrl=new AbortController(); const to=setTimeout(()=>ctrl.abort(),8000);
  fetch(url+"/health",{signal:ctrl.signal}).then(r=>r.ok?r.json():Promise.reject(new Error("HTTP "+r.status))).then(j=>{
    clearTimeout(to);
    if(j && j.ok){
      if(out) out.innerHTML = j.hasKey
        ? '<span style="color:var(--green2)">✓ Proxy erreichbar. API-Key erkannt: ja'+(j.model?(" · Modell: "+esc(j.model)):"")+'.</span>'
        : '<span style="color:#ffb070">⚠ Proxy erreichbar, aber KEIN API-Key gesetzt. Key in tools/gemini-proxy/.env eintragen und Proxy neu starten.</span>';
    } else { if(out) out.innerHTML='<span style="color:#ff8070">✗ Unerwartete Antwort vom Proxy.</span>'; }
  }).catch(err=>{ clearTimeout(to); if(out) out.innerHTML='<div style="white-space:pre-wrap;color:#ff8070">✗ Proxy nicht erreichbar ('+esc(String(err&&err.message||err))+'). Läuft der Gemini-Proxy? Über start-vv-cockpit.bat starten.</div>'; });
}

function saveInvoice(){
  const id=_editingInvId; const cid=val("iv_cust"); const c=data.customers.find(x=>x.id===cid);
  const items=getItems("iv_items"); const total=sumItems(items); const dep=parseNum(val("iv_deposit"));
  const base={customerId:cid,customerName:c?c.name:"",date:val("iv_date"),serviceDate:val("iv_service"),project:val("iv_project"),notes:val("iv_notes"),items,total,depositPaid:dep,remaining:r2(total-dep),status:"erstellt",updatedAt:nowISO()};
  let newId=null;
  if(id){ Object.assign(data.invoices.find(i=>i.id===id)||{},base); }
  else { const ni={id:uid(),number:nextInvoiceNumber(),createdAt:nowISO(),...base}; data.invoices.push(ni); newId=ni.id;
    if(cid) addTimeline(cid,"Rechnung erstellt", ni.number+" · "+money(total), {type:"invoice",id:ni.id}); }
  if(cid) refreshCustomerStage(cid);
  _editingInvId=null; saveAll(false); showSection("rechnungen");
}
function invoiceFromOffer(offerId){
  const o=data.offers.find(x=>x.id===offerId); if(!o)return;
  const meas=(data.measurements||[]).find(m=>m.id===o.measurementId);
  const svc=(meas&&meas.serviceType)||inferServiceType(o.project||((o.items||[])[0]&&o.items[0].description)||"");
  // Anzahlung/Zahlungssituation aus Angebot übernehmen (depositAmount = vereinbarte Anzahlung)
  const inv={id:uid(),number:nextInvoiceNumber(),offerId:o.id,offerNumber:o.number,customerId:o.customerId,customerName:o.customerName,
    date:today(),serviceDate:"",project:o.project,serviceType:svc,siteAddress:o.siteAddress||"",notes:"",items:JSON.parse(JSON.stringify(o.items||[])),
    total:o.total, depositAmount:o.depositAmount||0, depositPaid:o.depositPaid||0,
    remaining:r2((o.total||0)-(o.depositPaid||0)), status:"erstellt",
    measurementId:o.measurementId||"", materialCalcId:o.materialCalcId||"", priceCalcId:o.priceCalcId||"",
    createdAt:nowISO(),updatedAt:nowISO()};
  data.invoices.push(inv);
  addTimeline(o.customerId,"Rechnung erstellt", inv.number+" aus "+o.number+" · "+money(inv.total), {type:"invoice",id:inv.id});
  refreshCustomerStage(o.customerId);
  saveAll(false); showSection(currentSection==="crm_detail"?"crm_detail":"rechnungen");
}
function markInvoicePaid(id){
  const inv=data.invoices.find(x=>x.id===id);if(!inv)return;
  inv.status="bezahlt"; inv.depositPaid=inv.total; inv.remaining=0; inv.updatedAt=nowISO();
  addTimeline(inv.customerId,"Rechnung bezahlt", inv.number+" · "+money(inv.total), {type:"invoice",id:inv.id});
  if(inv.customerId) refreshCustomerStage(inv.customerId);
  saveAll(false); showSection(currentSection==="crm_detail"?"crm_detail":"rechnungen");
}
function deleteInvoice(id){ if(!confirm("Rechnung löschen?"))return; const inv=data.invoices.find(i=>i.id===id); const cid=inv?inv.customerId:""; data.invoices=data.invoices.filter(i=>i.id!==id); if(cid) refreshCustomerStage(cid); saveAll(false); showSection(currentSection==="crm_detail"?"crm_detail":"rechnungen"); }
function printInvoice(id){
  const inv=data.invoices.find(x=>x.id===id);if(!inv)return;
  const c=data.customers.find(x=>x.id===inv.customerId)||{name:inv.customerName||""};

async function handleReceiptFiles(files){
  const f=(files||[])[0]; if(!f) return;
  let dataUrl;
  try{
    if(/^image\//.test(f.type)){ try{ dataUrl=await compressImage(f,1600,0.7); }catch{ dataUrl=await readAsDataURL(f); } }
    else dataUrl=await readAsDataURL(f);
  }catch(err){ alert("Beleg konnte nicht gelesen werden."); return; }
  const size=Math.round((String(dataUrl).length*3)/4);
  _receiptDraft={dataUrl, fileName:f.name||"Beleg", mime:f.type||"", size};
  const el=byId("receiptPreview");
  if(el){ el.innerHTML = /pdf/i.test(_receiptDraft.mime)
      ? `<div style="padding:10px;border:1px solid var(--line);border-radius:var(--r2)">📄 ${esc(_receiptDraft.fileName)} · ${fmtSize(size)} <button class="btn sm ghost" onclick="clearReceiptDraft()">×</button></div>`
      : `<div class="thumb" style="width:160px;height:200px"><img src="${esc(_receiptDraft.dataUrl)}" style="width:100%;height:100%;object-fit:cover"><button class="del-btn" type="button" onclick="clearReceiptDraft()">×</button></div>`; }
}
function clearReceiptDraft(){ _receiptDraft=null; const el=byId("receiptPreview"); if(el) el.innerHTML='<p style="color:var(--muted);font-size:12.5px">Noch kein Beleg aufgenommen.</p>'; }
function saveReceiptBooking(){
  const amount=parseNum(val("rcp_amount"));
  if(amount<=0){ alert("Bitte einen Betrag > 0 eingeben."); return; }
  const type=val("rcp_type")||"Ausgabe";
  const signed = type==="Einnahme" ? Math.abs(amount) : -Math.abs(amount);
  const b={ id:uid(), date:val("rcp_date")||today(), partner:val("rcp_partner"), reference:val("rcp_note"),
    amount:Math.abs(amount), signedAmount:r2(signed), type, category:val("rcp_category"),
    method:val("rcp_method"), note:val("rcp_note"), dashboardRelevant:true, status:"geprüft",
    manual:true, source:"Beleg",
    receipt:_receiptDraft?Object.assign({},_receiptDraft):null,
    createdAt:nowISO(), updatedAt:nowISO() };
  data.bookings.push(b);
  _receiptDraft=null;
  saveAll(false); updateKPIs(); updateBadges();
  alert("Beleg gespeichert und in die Buchhaltung übernommen ("+money(b.signedAmount)+").");
  showSection("belegscanner");
}
function openReceiptImage(bookingId){
  const b=(data.bookings||[]).find(x=>x.id===bookingId); if(!b||!b.receipt||!b.receipt.dataUrl){ alert("Kein Beleg hinterlegt."); return; }

  const d=b.receipt;
  if(/pdf/i.test(d.mime)) w.document.write('<title>Beleg</title><iframe src="'+d.dataUrl+'" style="border:0;position:fixed;inset:0;width:100%;height:100%"></iframe>');
  else w.document.write('<title>Beleg</title><img src="'+d.dataUrl+'" style="max-width:100%;height:auto">');
  w.document.close();
}

/* Buchung ⇄ Zahlung/Posten abgleichen (mit Reversal bei Änderung) */
function reconcileBookingPayment(b, sourceSel, payType){
  const prevKey=b.appliedSourceKey||"";
  if(prevKey && prevKey!==sourceSel){
    const [pt,pid]=prevKey.split(":");
    const src=pt==="invoice"?(data.invoices||[]).find(i=>i.id===pid):(data.offers||[]).find(o=>o.id===pid);
    if(src){
      src.depositPaid=r2(Math.max(0, Number(src.depositPaid||0)-Number(b.appliedAmount||0)));
      if(pt==="invoice"){ src.remaining=r2(Number(src.total||0)-Number(src.depositPaid||0)); if(src.remaining>0 && src.status==="bezahlt") src.status="erstellt"; }
      src.updatedAt=nowISO();
    }
    if(b.appliedPaymentId) data.payments=(data.payments||[]).filter(p=>p.id!==b.appliedPaymentId);
    b.appliedSourceKey=""; b.appliedPaymentId=null; b.appliedAmount=0;
    if(b.customerId) refreshCustomerStage(b.customerId);
  }
  if(sourceSel && sourceSel!==b.appliedSourceKey){
    if(b.type!=="Einnahme") return; // nur positive Kundenzahlung automatisch zuordnen
    const amt=Math.abs(Number(b.signedAmount||b.amount||0));
    if(amt<=0) return;
    const [pt,pid]=sourceSel.split(":");
    const src=pt==="invoice"?(data.invoices||[]).find(i=>i.id===pid):(data.offers||[]).find(o=>o.id===pid);
    if(!src) return;
    if(!b.customerId){ b.customerId=src.customerId||""; const cc=data.customers.find(x=>x.id===b.customerId); b.customerName=cc?cc.name:b.customerName; }
    applyPaymentToSource(pt,pid,amt);
    const rec=recordPayment({customerId:b.customerId||src.customerId||"", amount:amt, method:"Bank/CSV",
      appliesTo:payType||"general", sourceType:pt, sourceId:pid, note:"Aus Buchung: "+(b.partner||""), date:b.date||today(), bookingId:b.id});
    addTimeline(b.customerId||src.customerId, "Buchung zugeordnet", money(amt)+" → "+(pt==="invoice"?"Rechnung":"Angebot")+" "+(src.number||""), {type:pt,id:pid});
    b.appliedSourceKey=sourceSel; b.appliedPaymentId=rec.id; b.appliedAmount=amt;
    refreshCustomerStage(b.customerId||src.customerId);
  }
}

function importBankCsvFiles(files){
  let total=0,dup=0,toCheck=0;
  const byType={};
  const arr=Array.from(files||[]);if(!arr.length)return;
  let done=0;
  arr.forEach(f=>{const r=new FileReader();r.onload=e=>{
    const res=parseCSVText(e.target.result,f.name);
    total+=res.count; dup+=res.duplicates; toCheck+=(res.toCheck||0);
    Object.entries(res.byType||{}).forEach(([k,v])=>{ byType[k]=(byType[k]||0)+v; });

      saveAll(false);

/* ---- Pflichtfunktion: offene Positionen aus mehreren Quellen zusammenführen ---- */
function getOpenPositionsSummary(){
  rebuildOpenItems(); // immer frisch aus der zentralen Basis ableiten
  const DONE=["bezahlt","storniert","erledigt"];
  const items=(data.openItems||[]).filter(o=>Number(o.open||0)>0 && !DONE.includes(String(o.status||"").toLowerCase()));
  const cust=data.customers||[], bookings=data.bookings||[], payments=data.payments||[];
  const offers=data.offers||[], invoices=data.invoices||[];
  const positions=items.map(o=>{
    const c = cust.find(x=>x.id===o.customerId)
           || (o.customerName?cust.find(x=>String(x.name||"").toLowerCase()===String(o.customerName).toLowerCase()):null)
           || null;
    const src = o.sourceType==="invoice" ? invoices.find(i=>i.id===o.sourceId) : offers.find(f=>f.id===o.sourceId);
    const project = (src && (src.project||src.serviceType)) || "";
    // Zahlungsabgleich aus zentraler Buchhaltung
    const firstName = c ? String(c.name||"").toLowerCase().split(" ")[0] : "";
    const matchPays = payments.filter(p=> (p.customerId&&p.customerId===o.customerId) && (!p.sourceKey||p.sourceKey===o.sourceKey));
    const incBookings = bookings.filter(b=> b.type==="Einnahme" && firstName && String(b.partner||"").toLowerCase().includes(firstName));
    const paySum = r2(matchPays.reduce((s,p)=>s+Number(p.amount||0),0) + incBookings.reduce((s,b)=>s+Number(b.amount||0),0));
    const tl=(data.timeline||[]).filter(t=>c&&t.customerId===c.id).sort((a,b)=>String(b.date||"").localeCompare(String(a.date||"")));
    const lastContact = tl[0]?{date:tl[0].date, action:tl[0].action}:null;
    const disc=[];
    if(o.paid>0 && paySum>0 && Math.abs(paySum-o.paid)>0.01) disc.push("Erfasste Zahlungseingänge ("+money(paySum)+") weichen vom hinterlegten Bezahlt-Betrag ("+money(o.paid)+") ab.");
    if(o.paid>0 && paySum===0) disc.push("Bezahlt-Betrag hinterlegt, aber kein passender Zahlungseingang in der Buchhaltung gefunden.");
    return { sourceKey:o.sourceKey, customerId:o.customerId, kunde:(o.customerName||(c&&c.name)||"Unbekannt"),
      open:Number(o.open||0), total:Number(o.total||0), paid:Number(o.paid||0),
      due:o.dueDate||"", status:o.status||"offen", label:o.label||"", reference:o.reference||"",
      project, customer:c, lastContact, paySum, discrepancies:disc };
  });
  const totalOpen=r2(positions.reduce((s,p)=>s+p.open,0));
  return { positions, totalOpen, count:positions.length };
}
function nxNextStep(p){
  if(p.discrepancies.length) return "Zahlungseingang prüfen (Unstimmigkeit gefunden).";
  if(p.paySum>0 && p.paySum>=p.total-0.01 && p.total>0) return "Zahlung scheint vollständig – nach Prüfung als bezahlt markieren (nur nach Bestätigung).";
  if(!p.customer || (!p.customer.phone && !p.customer.email)) return "Kontaktdaten in der Kundenakte ergänzen, dann freundlich erinnern.";
  return "Freundliche Zahlungserinnerung vorbereiten oder Zahlungseingang prüfen.";
}

  out+="\n\nGesamtsumme offen: "+money(s.totalOpen)+".\nSoll ich eine Zahlungserinnerung als Entwurf vorbereiten – oder einen Posten als bezahlt markieren? (Markieren nur nach Bestätigung.)";
  return out;

function nxTryMarkPaid(text, context){
  const s=getOpenPositionsSummary();

  const l=String(text||"").toLowerCase();

  if(!target && context && context.activeCustomerId) target=s.positions.find(p=>p.customerId===context.activeCustomerId);
  if(!target && s.count===1) target=s.positions[0];

const nexusVoiceState = {
  get globalListening(){ return _nxGlobalOn; }, set globalListening(v){ _nxGlobalOn=!!v; },
  get isSpeaking(){ return _nxSpeaking; }, set isSpeaking(v){ _nxSpeaking=!!v; },

function nxNorm(s){ return String(s||"").toLowerCase().replace(/[^a-z0-9äöüß ]/g," ").replace(/\s+/g," ").trim(); }
/* Eigene TTS-Ausgabe nicht als Befehl werten */
function nxSelfEcho(t){
  const a=nxNorm(t), b=nxNorm(nexusVoiceState.lastSpokenText||"");
  if(!a||!b) return false;
  if(b.includes(a) || a.includes(b)) return true;
  const wa=a.split(" ").filter(Boolean), wb=new Set(b.split(" "));
  if(wa.length<3) return false;
  const common=wa.filter(w=>wb.has(w)).length;
  return common/wa.length > 0.6;
}
function nxEnterAwaiting(){

function nxClearAwaiting(){
  nexusVoiceState.awaitingCommandAfterWake=false;
  if(nexusVoiceState.awaitTimer){ clearTimeout(nexusVoiceState.awaitTimer); nexusVoiceState.awaitTimer=null; }

function handleNexusCommand(commandText, context){
  context=context||{};
  const raw=String(commandText||"").trim(); if(!raw) return "";
  const l=raw.toLowerCase();
  _nxLastRecognized=raw; _nxLastKind="Info"; _nxLastContext=context;
  const YES=/\b(ja|jap|jawohl|bestätige|bestaetige|bestätigen|ok|okay|mach das|mach|ausführen|ausfuehren|genau|speichern|passt)\b/;
  const NO=/\b(nein|ne|nö|noe|abbrechen|abbruch|verwerfen|brich ab|brechen|nicht|stopp?|lass es)\b/;

  // 0) geführter Dialog (z. B. neuer Kunde)
  if(_nxFlow){ return nxFlowStep(raw,l); }

  // 1) offene Bestätigungen (bezahlt / Buchung) haben Vorrang
  if(_nxPendingPaid){
    _nxLastKind="Bestätigung";
    if(YES.test(l)){ const sk=_nxPendingPaid; _nxPendingPaid=null; const o=oiFind(sk); if(!o) return "Der Posten ist nicht mehr vorhanden."; const nm=o.customerName||"", lbl=o.label||""; return nxDoMarkPaid(sk)?("✓ Erledigt: „"+nm+(lbl?(" · "+lbl):"")+"“ wurde als bezahlt markiert."):"Konnte den Posten nicht markieren."; }
    if(NO.test(l)){ _nxPendingPaid=null; return "Okay – ich habe nichts verändert."; }
    return "Bitte mit „Nexus ja“ oder „Nexus nein“ bestätigen: Posten als bezahlt markieren?";
  }
  if(_nxPendingBooking){
    _nxLastKind="Bestätigung";
    if(YES.test(l)){ const b=nxCommitBooking(_nxPendingBooking); _nxPendingBooking=null; return "✓ "+b.type+" über "+money(b.amount)+(b.partner?(" – "+b.partner):"")+" gespeichert. (Bereich „Buchhaltung“.)"; }
    if(NO.test(l)){ _nxPendingBooking=null; return "Okay – Buchung verworfen, nichts gespeichert."; }
    return "Bitte mit „Nexus ja“ oder „Nexus nein“ bestätigen, ob ich die Buchung speichern soll.";
  }

  // 2) STOP / Interrupt – Sprachausgabe stoppen (Vorrang)
  if(/^(stop|stopp|still|sei still|schweig|hör auf|hoer auf|ruhe|leise|ausgabe stoppen)\b/.test(l) || /ausgabe stoppen|hör auf zu sprechen/.test(l)){ nxStopSpeaking(); _nxLastKind="Aktion"; return "🔇 Ausgabe gestoppt."; }
  if(/^(abbrechen|brich ab|verwerfen|abbruch)\b/.test(l)){ _nxFlow=null; _nxLastKind="Aktion"; return "Abgebrochen."; }

  // 3) Direkte Systembefehle
  if(/youtube/.test(l)){ try{ window.open("https://youtube.com","_blank"); }catch(e){} _nxLastKind="Aktion"; return "YouTube geöffnet."; }
  if(/(sparmodus|eco[\s-]?modus|spar[\s-]?modus|performance reduzier)/.test(l)){ _nxPerf=true; const d=byId("nxDeck"); if(d)d.classList.add("nx-eco"); nxStatusRefresh(); _nxLastKind="Aktion"; return "⚡ Sparmodus aktiviert."; }
  if(/(normalmodus|normal[\s-]?modus|normale ansicht|performance.*(deaktivier|aus))/.test(l)){ _nxPerf=false; const d=byId("nxDeck"); if(d)d.classList.remove("nx-eco"); nxStatusRefresh(); _nxLastKind="Aktion"; return "Normalmodus aktiviert."; }
  if(/(showmodus|show[\s-]?modus)/.test(l)){ _nxPerf=false; _nxAutoSpeak=true; nxStatusRefresh(); _nxLastKind="Aktion"; return "🎬 Showmodus aktiviert (Vorlesen an)."; }
  if(/(stimme test|test stimme|sprachtest|teste die stimme|sprich.*testsatz)/.test(l)){ _nxLastKind="Aktion"; nxSpeak("Hallo Justus, hier spricht dein Assistent. Die Sprachausgabe funktioniert."); return "🔊 Sprachtest läuft."; }
  if(/(mikro\w*\s*(starten|aktivier)|zuhören aktivier|zuhoeren aktivier|globales zuhören an)/.test(l)){ _nxLastKind="Aktion"; const ok=startGlobalNexusListener(); return ok?"🎤 Globales Zuhören aktiviert.":"Mikrofon konnte nicht aktiviert werden."; }
  if(/(mikro\w*\s*(stopp?en|deaktivier)|zuhören deaktivier|zuhoeren deaktivier|globales zuhören aus)/.test(l)){ _nxLastKind="Aktion"; stopGlobalNexusListener(); return "🛑 Globales Zuhören deaktiviert."; }
  if(/(vollbild verlassen|verlasse vollbild|vollbild beenden|schließe nexus deck|schliesse nexus deck)/.test(l)){ _nxLastKind="Aktion"; nxExitFull(); return "Vollbild verlassen."; }
  if(/(vollbild|vollbildmodus)/.test(l)){ _nxLastKind="Aktion"; if(currentSection!=="nexus") navigateTo("nexus"); setTimeout(()=>{ if(!_nxFull) nxToggleFull(); },60); return "🖥️ NEXUS Vollbild."; }
  if(/(zurück zum cockpit|zurueck zum cockpit|zurück ins cockpit|raus aus nexus)/.test(l)){ _nxLastKind="Aktion"; nxExitFull(); navigateTo("dashboard"); return "Zurück zum Cockpit."; }
  if(/(backup|json backup|daten exportieren|sicherung erstellen)/.test(l)){ _nxLastKind="Aktion"; try{ if(typeof doExport==="function") doExport(); }catch(e){} return "📦 Backup wird erstellt/heruntergeladen."; }
  if(/(daten speichern|^speicher|^save|nexus speicher)/.test(l) && !/buchung|kunde|posten/.test(l)){ _nxLastKind="Aktion"; try{ saveAll(false); }catch(e){} return "💾 Daten gespeichert."; }
  if(/(was kann ich sagen|zeige (befehle|hilfe)|^hilfe|sprachbefehle|^befehle$|welche befehle|zeige befehle)/.test(l)){ _nxLastKind="Info"; return nxHelpText(); }

  // 4) Neuen Kunden anlegen (ggf. mit direktem Namen)
  if(/(neue[nr]?\s+kunde|kunde[n]?\s+anlegen|lege\s+.*kunde|kunde\s+erfassen|kundenakte\s+(für|fuer)|erstelle\s+kundenakte)/.test(l)){
    _nxLastKind="Aktion";
    const mc=raw.match(/(?:neuer?\s+kunde|kundenakte\s+(?:für|fuer)|erstelle\s+kundenakte\s+(?:für|fuer))\s+(.+)$/i);
    const nm=(mc&&mc[1]?mc[1].trim().replace(/^kunde\s+/i,""):"");
    if(nm && nm.length>=2){ _nxFlow={type:"newCustomer",step:"phone",data:{name:nm}}; return "Neuer Kunde „"+nm+"“. Telefonnummer? (oder „überspringen“)"; }
    _nxFlow={type:"newCustomer",step:"name",data:{}}; return "Neuer Kunde – wie heißt der Kunde? (oder „abbrechen“)";
  }

  // 5) Buchung -> Entwurf + Bestätigung (kritisch)
  let mb=raw.match(/(?:neue?|buche|trage|speichere)\s+(?:eine\s+)?(einnahme|ausgabe|zahlung)\b[^0-9]*?(\d+(?:[.,]\d+)?)/i);
  if(mb){
    _nxLastKind="Aktion";
    const type=/ausgabe/i.test(mb[1])?"Ausgabe":"Einnahme";
    const amount=parseFloat(mb[2].replace(",","."));
    let partner=""; const pm=raw.match(/(?:von|für|fuer)\s+(?:kunde\s+|lieferant\s+)?(.+)$/i); if(pm) partner=pm[1].trim().replace(/\s+ein$/i,"");
    let category="Manuell"; if(/benzin|fahrt|sprit|diesel|tank/i.test(raw))category="Fahrtkosten"; else if(/werkzeug|material/i.test(raw))category="Material"; else if(/werbung|anzeige|marketing/i.test(raw))category="Werbung"; else if(type==="Einnahme")category="Kundenzahlung";
    _nxPendingBooking={type,amount,partner,category,note:raw,date:today()};
    return "Ich habe eine "+type+" über "+money(amount)+(partner?(" "+(type==="Ausgabe"?"für":"von")+" "+partner):"")+" erkannt (Kategorie: "+category+", Datum: heute). Soll ich diese Buchung speichern? Ja/Nein.";
  }

  // 6) als bezahlt markieren (inkl. „Rechnung X bezahlt“, „Zahlung von X eingegangen“)
  if(/(als bezahlt|auf bezahlt|markiere.*bezahlt|bezahlt markier|ist bezahlt|wurde bezahlt|hat bezahlt|abhaken|rechnung.*bezahlt|zahlung.*(eingegangen|erhalten)|hat (ge)?zahlt)/.test(l)){
    _nxLastKind="Aktion"; return nxTryMarkPaid(raw, context);
  }

  // 7) „öffne offene Posten/Positionen“ -> Seite öffnen
  if(/(öffne|oeffne)\s+offen\w*\s+(posten|position)/.test(l)){ _nxLastKind="Navigation"; navigateTo("openitems"); return "Öffne im Cockpit: Offene Posten."; }

  // 8) Offene Positionen / Restzahlungen / wer schuldet (Report-Pflichtfunktion)
  if(/(offen\w*\s+(position|posten|rechnung|forderung)|wer schuldet|schuldet mir|noch nicht bezahlt|nicht bezahlt|was ist (noch )?offen|restzahlung|restbetr|außenst|aussenst|wer muss noch zahlen|welche kunden.*(zahl|bezahlt))/.test(l)){
    _nxLastKind="Abfrage"; const ans=nxFormatOpenPositions();
    if(/lies|vorlesen|vorles|sprich|sag mir|nenne/.test(l)) nxSpeak(ans);
    return ans;
  }

  // 9) Vorlese-Befehle: Finanzen
  if(/(lies|vorlesen|sag mir|nenne mir|sprich)\b[\s\S]*?(finanz|buchhaltung|einnahmen|ausgaben|gewinn)/.test(l)){
    _nxLastKind="Abfrage"; const t=nxFinanceText(); nxSpeak(t); return t;
  }
  // 10) Vorlese freier Text: „lies X vor“
  let mr=raw.match(/^lies\s+(?:mir\s+)?(.+?)\s+vor$/i);
  if(mr){ _nxLastKind="Aktion"; const t=mr[1].trim(); nxSpeak(t); return "🔊 „"+t+"“"; }

  // 11) Finanzfragen
  if(/(wie steht.*buchhaltung|wie hoch.*(einnahmen|ausgaben)|wie viel gewinn|finanzübersicht|finanzubersicht|prüfe buchhaltung|pruefe buchhaltung|unstimmigkeit|wie viel.*offen|zeige (einnahmen|ausgaben|finanz))/.test(l)
     || (/(buchhaltung|finanz|gewinn|einnahmen|ausgaben|umsatz)/.test(l) && !/^(öffne|oeffne|gehe|wechsle|zeige mir die seite)/.test(l) && !/öffne|oeffne/.test(l))){
    _nxLastKind="Abfrage"; return nxFinanceText();
  }

  // 12) KI-Agent per Name/Rolle öffnen
  const ag=nxMatchAgent(l);
  if(ag){
    _nxLastKind="Navigation"; navigateTo("agents");
    const cap=ag.charAt(0).toUpperCase()+ag.slice(1);
    try{ if(typeof nxAgentSelect==="function" && (NX_AGENTS||[]).some(a=>a.id===ag)) nxAgentSelect(ag); }catch(e){}
    return "Öffne KI-Mitarbeiter: "+cap+". (Bereich „KI-Mitarbeiter“.)";
  }

  // 13) Kunden-Spezial
  if(/wie viele kunden/.test(l)){ _nxLastKind="Abfrage"; return "Im CRM sind aktuell "+((data.customers||[]).filter(c=>!(c.archived||c.deletedAt)).length)+" Kunden hinterlegt."; }
  let msrch=raw.match(/such\w*\s+kunde[n]?\s+(.+)$/i) || raw.match(/kundenkarte?\s+von\s+(.+)$/i);
  if(msrch){ _nxLastKind="Abfrage"; const q=msrch[1].trim().toLowerCase(); const hits=(data.customers||[]).filter(c=>String(c.name||"").toLowerCase().includes(q)); navigateTo("crm"); return hits.length?("Gefunden: "+hits.slice(0,5).map(c=>c.name).join(", ")+". (Kunden-CRM geöffnet.)"):("Kein Kunde mit „"+msrch[1].trim()+"“ gefunden."); }
  if(/(zeige|öffne|oeffne).*(aktive|heiße|heisse|abgeschlossene)\s+kunden/.test(l)){ _nxLastKind="Navigation"; navigateTo("crm"); return "Kunden-CRM geöffnet – dort nach Status filtern."; }

  // 14) Navigation generisch
  if(/^(öffne|oeffne|zeige|geh(e)? zu|wechsle zu|navigiere|starte)\b/.test(l) || nxNavTarget(l)){
    const sec=nxNavTarget(l);
    if(sec){ _nxLastKind="Navigation"; navigateTo(sec); return "Öffne im Cockpit: "+nxSecName(sec)+"."; }
  }

  // 15) Lokale Themen-Antworten / Fallback
  if(/(kunde|crm)/.test(l)){ _nxLastKind="Abfrage"; return "Im CRM sind "+((data.customers||[]).length)+" Kunden. Sage „öffne Kunden“ oder „lege neuen Kunden an“."; }
  if(/(performance|langsam|ruckelt|flüssig|fluessig)/.test(l)){ _nxLastKind="Info"; return "Sage „Nexus Sparmodus“ für eine ressourcenschonende Ansicht oder „Nexus Normalmodus“."; }
  if(/(angebot|preis|rechnung|kalkulation)/.test(l)){ _nxLastKind="Info"; return "Für Angebote/Preise: „öffne Preisrechner“. Orientierungswert – verbindliches Angebot erst nach Prüfung/Fotos/Aufmaß. Gemäß §19 UStG keine Umsatzsteuer."; }
  if(/(ki|mitarbeiter|nexus team|agent)/.test(l)){ _nxLastKind="Info"; navigateTo("agents"); return "KI-Mitarbeiter geöffnet."; }
  return "Dazu habe ich im Cockpit noch keine gespeicherten Daten. Du kannst sagen: „öffne Buchhaltung“, „nenne mir alle offenen Positionen“, „neue Einnahme 300 Euro von Müller“ oder „lege neuen Kunden an“.";
}

/* Geführter „Neuer Kunde“-Dialog */
function nxFlowStep(raw,l){
  if(/^(abbrechen|abbruch|stop|stopp|nein danke)$/.test(l)){ _nxFlow=null; return "Abgebrochen – kein Kunde angelegt."; }
  const f=_nxFlow; const skip=/^(überspringen|ueberspringen|-|keine|keins|kein)$/.test(l);
  if(f.type==="newCustomer"){
    if(f.step==="name"){ if(!raw){ return "Bitte einen Namen nennen (oder „abbrechen“)."; } f.data.name=raw; f.step="phone"; return "Telefonnummer? (oder „überspringen“)"; }
    if(f.step==="phone"){ if(!skip) f.data.phone=raw; f.step="email"; return "E-Mail? (oder „überspringen“)"; }
    if(f.step==="email"){ if(!skip) f.data.email=raw; f.step="address"; return "Adresse / Projektadresse? (oder „überspringen“)"; }
    if(f.step==="address"){ if(!skip) f.data.address=raw; f.step="confirm";
      return "Kunde anlegen: "+f.data.name+(f.data.phone?(" · ☎ "+f.data.phone):"")+(f.data.email?(" · ✉ "+f.data.email):"")+(f.data.address?(" · "+f.data.address):"")+". Speichern? Ja/Nein"; }
    if(f.step==="confirm"){
      if(/\b(ja|ok|okay|speichern|jap|genau)\b/.test(l)){ const c=nxAddCustomer(f.data); _nxFlow=null; return "✓ Kunde „"+c.name+"“ angelegt. Sage „öffne Kunden“, um ihn zu sehen."; }
      if(/\b(nein|ne|abbrechen|nicht)\b/.test(l)){ _nxFlow=null; return "Verworfen – kein Kunde angelegt."; }
      return "Bitte mit Ja oder Nein bestätigen.";
    }
  }
  _nxFlow=null; return "Dialog beendet.";
}

/* ---- Stimme (lokal, Browser) ---- Listener läuft WEITER (Barge-in „Nexus“) ---- */
function nxSpeak(text){
  try{
    if(!("speechSynthesis" in window)) return;
    let spoken=String(text||"").replace(/[*#_`>•]/g,"");
    spoken=spoken.replace(/\bnexus\b/ig,"").replace(/\s{2,}/g," ").trim().slice(0,600); // eigenes Wake-Word nicht aussprechen
    nexusVoiceState.lastSpokenText=spoken.toLowerCase();
    _nxSpeaking=true; nexusVoiceState.mode="SPEAKING"; nxStatusRefresh();
    // Listener weiterlaufen lassen (für Barge-in) bzw. starten
    if(_nxGlobalOn && !_nxGlobalRecog) _nxStartRecogInstance();
    const u=new SpeechSynthesisUtterance(spoken); u.lang="de-DE";
    const v=(window.speechSynthesis.getVoices()||[]).find(x=>/de(-|_)/i.test(x.lang));
    if(v) u.voice=v;
    const done=()=>{ _nxSpeaking=false; if(nexusVoiceState.mode==="SPEAKING") nexusVoiceState.mode = nexusVoiceState.awaitingCommandAfterWake?"COMMAND_CAPTURE":"IDLE_LISTENING"; nxStatusRefresh(); };
    u.onend=done; u.onerror=done;
    window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);
  }catch(e){ _nxSpeaking=false; }
}
function nxToggleSpeak(){ _nxAutoSpeak=!_nxAutoSpeak; const b=byId("nxSpeakBtn"); if(b){ b.textContent=_nxAutoSpeak?"🔊 Vorlesen: AN":"🔊 Vorlesen: AUS"; b.classList.toggle("primary",_nxAutoSpeak);} }

/* ==========================================================
   GLOBALE NEXUS-STEUERZENTRALE
   Wake-Word, cockpitweiter Listener mit Auto-Restart, Command-Bus,
   globales Antwort-Overlay, Mic-Status-Chip. Nutzt zentrale Cockpit-Daten.
   ========================================================== */
/* Kontext für den Command-Bus */
function nxBuildContext(source, rawTranscript){
  return {
    currentPage:(typeof currentSection!=="undefined")?currentSection:null,
    activeCustomerId:(typeof currentDetailId!=="undefined")?currentDetailId:null,
    activeProjectId:(window._nxActiveProject||null),
    cockpitState:data,
    source:source||"text",
    rawTranscript:rawTranscript||""
  };
}
/* Wake-Word-Parser – erkennt „Nexus“, „Hey/Okay/Ok Nexus“, bloßes „Nexus“ */
/* Wake-Word-Parser – „Nexus“ wird von der Browser-Erkennung oft anders
   verstanden (Lexus, Nexis, next us …), daher tolerante Varianten. */
const NX_WAKE_RE=/^\s*(?:hey\s+|okay\s+|ok\s+|hallo\s+|he\s+|hi\s+)?(?:nexus|nexxus|nexis|nexos|nexius|neksus|nekus|neksis|nexar|nexa|nexius|lexus|lexis|next us|necks us|nex us|nägus|nexen)\b[\s,:;.!\-]*(.*)$/i;
function parseWakeWord(transcript){
  const raw=String(transcript||"").trim();
  const m=raw.match(NX_WAKE_RE);
  if(m){ const cmd=(m[1]||"").trim(); return { isWakeCommand:true, commandText:cmd, isWakeOnly:(cmd===""), rawTranscript:raw }; }
  return { isWakeCommand:false, commandText:"", isWakeOnly:false, rawTranscript:raw };
}
function nxRecogSupported(){ return !!(window.SpeechRecognition||window.webkitSpeechRecognition); }
function nxSetMic(state){ _nxMicState=state; nxStatusRefresh(); }
/* Status-Label aus der Voice-State-Machine */
function nxMicLabel(){
  if(!_nxGlobalOn) return "🎙️ Zuhören aus";
  if(_nxMicState==="err") return "⚠ Mikrofon-Fehler – Neustart…";
  if(_nxSpeaking) return "🔊 NEXUS spricht – sage „Nexus“ zum Stoppen";
  if(nexusVoiceState.awaitingCommandAfterWake) return "🟡 Befehl erwartet …";
  return "🟢 Warte auf Wake-Word „Nexus“";
}
function nxStatusRefresh(){
  nxRenderChip();
  const vs=byId("nxVoiceStatus"); if(vs) vs.textContent=nxMicLabel();
  const mm=byId("nxMicMid"); if(mm) mm.textContent=nxMicLabel();
  const ms=byId("nxModeStatus"); if(ms) ms.textContent=nexusVoiceState.mode;
  const hd=byId("nxHeard"); if(hd) hd.textContent = _nxLastHeard ? ("🗣️ gehört: „"+_nxLastHeard+"“") : "";
  const c=byId("nxChip"); if(c && _nxLastHeard) c.title="zuletzt gehört: "+_nxLastHeard;
}

let _nxStarting=false;      // verhindert überlappende start()-Aufrufe
let _nxErrCount=0;          // Fehlerzähler -> Backoff/Abbruch
let _nxRestartTimer=null;
let _nxPermPending=false;   // läuft gerade eine Berechtigungs-Anfrage?
let _nxPermDenied=false;    // Mikrofon dauerhaft blockiert -> kein Auto-Restart
/* Sicherer Kontext: https und http://localhost/127.0.0.1 sind zuverlässig.
   file:// ist je nach Chrome-Version eingeschränkt – wir lassen den Versuch zu,
   der getUserMedia-Preflight entscheidet. Für zuverlässiges Mikrofon: Starter nutzen. */
function nxSecureOK(){
  try{
    const p=location.protocol, h=location.hostname;
    if(p==="https:") return true;
    if(p==="http:" && (h==="localhost" || h==="127.0.0.1" || h==="[::1]")) return true;
    if(p==="file:") return true; // Versuch erlauben (Fallback-Meldung verweist auf Starter)
    return false;
  }catch(e){ return false; }
}
function nxIsFileProtocol(){ try{ return location.protocol==="file:"; }catch(e){ return false; } }
/* Einheitlicher Hinweis auf den Doppelklick-Starter (kein Python-Befehl nötig). */
const VV_MIC_LAUNCHER_HINT = "\n\nFür ein zuverlässiges Mikrofon: diese Datei schließen und das Cockpit über den Starter öffnen –\n  • Windows: „Cockpit starten (mit Mikrofon).bat“\n  • Mac: „Cockpit starten.command“\nDann läuft das Cockpit über http://localhost und Chrome erlaubt das Mikrofon.";
function nxPermBlocked(){
  _nxPermDenied=true; _nxGlobalOn=false; _nxStarting=false; _nxPermPending=false;
  try{ localStorage.setItem("VV_NX_LISTEN","0"); }catch(e){}
  if(_nxRestartTimer){ clearTimeout(_nxRestartTimer); _nxRestartTimer=null; }
  if(_nxGlobalRecog){ try{ _nxGlobalRecog.onend=null; _nxGlobalRecog.onerror=null; _nxGlobalRecog.onresult=null; (_nxGlobalRecog.abort||_nxGlobalRecog.stop).call(_nxGlobalRecog); }catch(e){} _nxGlobalRecog=null; }
  _nxMicState="err"; nexusVoiceState.mode="ERROR_RESTARTING"; nxStatusRefresh(); nxUpdatePanels();
}
function startGlobalNexusListener(){
  if(!nxRecogSupported()){ alert("Spracherkennung wird von diesem Browser nicht unterstützt. Bitte Chrome/Edge nutzen und über http://localhost öffnen."); return false; }
  if(!nxSecureOK()){ alert("Das Mikrofon funktioniert nur in einem sicheren Kontext (https oder http://localhost)."+VV_MIC_LAUNCHER_HINT); return false; }
  if(_nxPermPending) return false; // keine doppelte Anfrage
  let noticed=false; try{ noticed=localStorage.getItem("VV_NX_NOTICE")==="1"; }catch(e){}
  if(!noticed){
    const ok=confirm("NEXUS hört ab jetzt LOKAL in deinem Browser auf das Wake-Word „Nexus“.\n\n• Es werden keine Daten gesendet (alles bleibt lokal).\n• NEXUS reagiert nur auf Sätze, die mit „Nexus“ beginnen.\n• Normale Gespräche lösen nichts aus und werden nicht gespeichert.\n\nGlobales Zuhören aktivieren?");
    if(!ok) return false;
    try{ localStorage.setItem("VV_NX_NOTICE","1"); }catch(e){}
  }
  _nxErrCount=0; _nxPermDenied=false;
  // file:// -> getUserMedia-Vorabcheck ist dort unzuverlaessig/blockiert.
  // Wie der funktionierende NEXUS-Modus: SpeechRecognition DIREKT im Klick
  // starten (fragt selbst nach Mikrofon-Erlaubnis). Bei echter Ablehnung
  // meldet sich onerror "not-allowed" mit Starter-Hinweis.
  if(nxIsFileProtocol()){
    _nxGlobalOn=true; try{ localStorage.setItem("VV_NX_LISTEN","1"); }catch(e){}
    _nxStartRecogInstance(); nxUpdatePanels();
    return true;
  }
  // Permission-Preflight: EINMAL über getUserMedia abfragen, dann Tracks sofort stoppen.
  const md = (navigator&&navigator.mediaDevices&&navigator.mediaDevices.getUserMedia) ? navigator.mediaDevices : null;
  if(md){
    _nxPermPending=true; _nxMicState="on"; nexusVoiceState.mode="COMMAND_CAPTURE"; nxStatusRefresh();
    md.getUserMedia({audio:true}).then(stream=>{
      try{ stream.getTracks().forEach(t=>t.stop()); }catch(e){}
      _nxPermPending=false;
      _nxGlobalOn=true; try{ localStorage.setItem("VV_NX_LISTEN","1"); }catch(e){}
      _nxStartRecogInstance(); nxUpdatePanels();
    }).catch(err=>{
      _nxPermPending=false;
      // Nicht hart blockieren: SpeechRecognition hat eine eigene Erlaubnis-Logik.
      // Direkt versuchen; bei echter Ablehnung greift onerror "not-allowed".
      _nxGlobalOn=true; try{ localStorage.setItem("VV_NX_LISTEN","1"); }catch(e){}
      _nxStartRecogInstance(); nxUpdatePanels();
    });
    return true;
  }
  // Fallback ohne mediaDevices: direkt starten (Recognition fragt selbst nach)
  _nxGlobalOn=true; try{ localStorage.setItem("VV_NX_LISTEN","1"); }catch(e){}
  _nxStartRecogInstance(); nxUpdatePanels();
  return true;
}
function stopGlobalNexusListener(){
  _nxGlobalOn=false; try{ localStorage.setItem("VV_NX_LISTEN","0"); }catch(e){}
  if(_nxRestartTimer){ clearTimeout(_nxRestartTimer); _nxRestartTimer=null; }
  if(_nxGlobalRecog){ try{ _nxGlobalRecog.onend=null; _nxGlobalRecog.onerror=null; _nxGlobalRecog.onresult=null; _nxGlobalRecog.abort?_nxGlobalRecog.abort():_nxGlobalRecog.stop(); }catch(e){} _nxGlobalRecog=null; }
  _nxStarting=false; _nxPermPending=false; nxSetMic("off"); nxUpdatePanels();
}
function restartGlobalNexusListener(){ if(!_nxGlobalOn) return; if(_nxGlobalRecog){ try{ _nxGlobalRecog.onend=null; _nxGlobalRecog.stop(); }catch(e){} _nxGlobalRecog=null; } nxScheduleRestart(400); }
function nxToggleGlobalListen(){ if(_nxGlobalOn) stopGlobalNexusListener(); else startGlobalNexusListener(); }
/* Auto-Restart NUR wenn: aktiv, keine Permission-Anfrage offen, keine Instanz,
   nicht gerade startend, nicht dauerhaft verweigert. */
function nxCanRestart(){ return _nxGlobalOn && !_nxPermPending && !_nxPermDenied && !_nxStarting && _nxGlobalRecog===null; }
function nxScheduleRestart(delay){
  if(!nxCanRestart()) return;
  if(_nxRestartTimer) return;            // bereits geplant
  _nxRestartTimer=setTimeout(()=>{ _nxRestartTimer=null; if(nxCanRestart()) _nxStartRecogInstance(); }, Math.max(400, delay||600));
}

function _nxStartRecogInstance(){
  if(!_nxGlobalOn || _nxPermPending || _nxPermDenied) return; // läuft AUCH während _nxSpeaking weiter (Barge-in)
  if(_nxStarting || _nxGlobalRecog) return; // kein überlappender Start
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition; if(!SR) return;
  _nxStarting=true;
  let r;
  try{
    r=new SR(); r.lang="de-DE"; r.continuous=true; r.interimResults=false; r.maxAlternatives=1;
    r.onstart=()=>{ _nxStarting=false; _nxErrCount=0; if(_nxGlobalOn){ _nxMicState="on"; nxStatusRefresh(); } };
    r.onresult=ev=>{
      _nxErrCount=0;
      for(let i=ev.resultIndex;i<ev.results.length;i++){
        if(!ev.results[i] || !ev.results[i].isFinal) continue;
        handleNexusVoiceTranscript(ev.results[i][0].transcript||"");
      }
    };
    r.onerror=e=>{
      _nxStarting=false; const err=(e&&e.error)||"";
      if(err==="not-allowed"||err==="service-not-allowed"){
        var emsg = nxIsFileProtocol()
          ? ("Mikrofon-Zugriff ist beim Öffnen per Datei (file://) blockiert."+VV_MIC_LAUNCHER_HINT)
          : ("Mikrofon-Zugriff ist blockiert.\n\nSo wieder freigeben (Chrome/Edge):\n1) Schloss-Symbol links in der Adressleiste anklicken\n2) „Mikrofon“ auf „Zulassen“ setzen (bzw. Berechtigung zurücksetzen)\n3) Seite neu laden");
        alert(emsg);
        nxPermBlocked(); return;            // dauerhaft aus, KEIN Neustart
      }
      if(err==="aborted"){ return; }        // meist eigener stop() – kein Neustart-Sturm
      // no-speech / audio-capture / network: entzerrt neu starten, mit Limit
      _nxErrCount++; _nxMicState="err"; nexusVoiceState.mode="ERROR_RESTARTING"; nxStatusRefresh();
      if(_nxErrCount>8){ _nxGlobalOn=false; nxSetMic("off"); nxUpdatePanels(); return; } // dauerhafte Probleme -> stoppen
      _nxGlobalRecog=null; nxScheduleRestart(1000*Math.min(_nxErrCount,5));
    };
    r.onend=()=>{ _nxStarting=false; _nxGlobalRecog=null; if(_nxGlobalOn) nxScheduleRestart(600); };
    _nxGlobalRecog=r; r.start(); _nxMicState="on";
  }catch(e){
    _nxStarting=false; _nxGlobalRecog=null;
    // InvalidStateError (bereits gestartet) o. ä. -> ruhig, nicht spammen
    if(_nxGlobalOn) nxScheduleRestart(900);
  }
}

/* ---- Zentrale Transcript-Verarbeitung (Voice-State-Machine) ---- */
function handleNexusVoiceTranscript(transcript){
  const t=String(transcript||"").trim(); if(!t) return;
  nexusVoiceState.lastTranscript=t; _nxLastHeard=t;
  nxStatusRefresh(); // „gehört“-Anzeige live aktualisieren (auch ohne Wake-Word)
  const w=parseWakeWord(t);

  // (A) NEXUS spricht gerade -> nur Wake-Word unterbricht; alles andere ignorieren
  if(_nxSpeaking){
    if(nxSelfEcho(t)) return;          // eigene Ausgabe ignorieren
    if(!w.isWakeCommand) return;       // ohne „Nexus“: weiter sprechen, keine Aktion
    nxStopSpeaking();                   // Barge-in: TTS sofort stoppen
    nexusVoiceState.mode="INTERRUPTED";
    if(w.isWakeOnly){ nxEnterAwaiting(); return; }   // „Nexus“ allein -> warten auf Befehl
    nxRunVoiceCommand(w.commandText, w.rawTranscript); return;  // „Nexus <Befehl>“ -> ausführen
  }

  // (B) Wartemodus nach bloßem „Nexus“ -> nächster Satz gilt als Befehl (auch ohne Wake-Word)
  if(nexusVoiceState.awaitingCommandAfterWake){
    const cmd = w.isWakeCommand ? (w.isWakeOnly ? "" : w.commandText) : t;
    if(!cmd){ nxEnterAwaiting(); return; }   // erneut „Nexus“ -> Fenster verlängern
    nxClearAwaiting();
    nxRunVoiceCommand(cmd, t); return;
  }

  // (C) Normalzustand -> nur mit Wake-Word reagieren
  if(!w.isWakeCommand) return;          // normale Gespräche lösen nichts aus
  if(w.isWakeOnly){ nxEnterAwaiting(); return; }   // „Nexus“ allein -> warten
  nxRunVoiceCommand(w.commandText, w.rawTranscript);
}
function nxRunVoiceCommand(cmd, rawTranscript){
  nexusVoiceState.mode="PROCESSING"; nexusVoiceState.lastCommand=cmd; _nxLastRecognized=cmd;
  _nxLastWake.unshift({text:cmd, at:Date.now()}); if(_nxLastWake.length>8) _nxLastWake.pop();
  const ctx=nxBuildContext("voice", rawTranscript);
  _nxChat.push({role:"user",text:cmd});
  if(currentSection==="nexus") nxDrawChat();
  const finish=(ans)=>{
    _nxChat.push({role:"nexus",text:ans});
    if(_nxChat.length>60) _nxChat=_nxChat.slice(-60);
    if(currentSection==="nexus"){ nxDrawChat(); nxUpdatePanels(); }
    else { nxShowOverlay(cmd, ans); }
    nxSpeak(ans); // Vorlesen (Listener läuft weiter -> „Nexus“ kann erneut unterbrechen)
  };
  nxProcessCommand(cmd, ctx).then(finish).catch(e=>finish("Es ist ein Fehler aufgetreten."));
}
/* Rückwärtskompatibler Alias */
function nxOnTranscript(t){ return handleNexusVoiceTranscript(t); }
function nxExecuteVoiceCommand(cmd, raw){ return nxRunVoiceCommand(cmd, raw); }

/* Erkennung initialisieren (einmalig, wiederverwendbar) */
/* DEAKTIVIERT: Alt-Voice-System. Erzeugt KEINE eigene SpeechRecognition mehr –
   die einzige aktive Instanz ist _nxGlobalRecog (globaler NEXUS-Listener). */
function voiceInitRecognition(){ return null; }
/* Start: Dauerbetrieb */
/* Alt-Voice-Start/-Stop -> leiten auf den EINZIGEN globalen NEXUS-Listener um. */
function startVoice(){ return startGlobalNexusListener(); }
function stopVoice(){ return stopGlobalNexusListener(); }

/* Text aufbereiten: klein, umlaut-tolerant, ohne Satzzeichen, ohne Frau/Herr */
function normalizeVoiceText(t){
  t=String(t||"").toLowerCase();
  t=t.replace(/ä/g,"a").replace(/ö/g,"o").replace(/ü/g,"u").replace(/ß/g,"ss");
  t=t.replace(/[^a-z0-9 ]/g," ");
  t=t.replace(/\b(frau|herr|hr|fr)\b/g," ");
  t=t.replace(/\s+/g," ").trim();
  return t;
}
function voiceMatchSection(t){
  if(/\bdashboard\b|ubersicht|startseite/.test(t)) return "dashboard";
  if(/offene[nr]?\s+posten|offene[nr]?\s+forderung|forderungen|offene[nr]?\s+rechnungen/.test(t)) return "openitems";
  if(/kundenkartei|kundenliste|\bcrm\b|\bkunden\b/.test(t)) return "crm";
  if(/kundenakte|\bakte\b/.test(t)) return "akte";
  if(/aufmass|aufmas/.test(t)) return "aufmass";
  if(/buchhaltung/.test(t)) return "bookkeeping";
  if(/\bbank\b|\bcsv\b/.test(t)) return "banksync";
  if(/materialrechner|materialberechnung/.test(t)) return "materialcalc";
  if(/preisrechner|kalkulation|\brechner\b/.test(t)) return "calculator";
  if(/\bangebote\b|\bangebot\b/.test(t)) return "angebote";
  if(/\brechnungen\b|\brechnung\b/.test(t)) return "rechnungen";
  if(/backup|sicherung/.test(t)) return "backup";
  if(/marketing/.test(t)) return "marketing";
  if(/agents|\bagent\b|\bki\b/.test(t)) return "agents";
  if(/voice|sprach|voicesteuerung/.test(t)) return "voice";
  if(/einstellungen|firmendaten|settings/.test(t)) return "settings";
  if(/fahrtenbuch/.test(t)) return "mileage";
  if(/fixkosten|abos/.test(t)) return "recurring";
  if(/baustelle|projekt/.test(t)) return "projekte";
  if(/checkliste/.test(t)) return "checkliste";
  if(/leads|anfragen/.test(t)) return "leads";
  if(/material|werkzeug/.test(t)) return "materials";
  return null;
}
const VOICE_STOPWORDS = new Set(("erstelle erstellen erzeuge erzeugen neues neue neu mach machen anlegen offne oeffne open zeige zeig zeigen suche such suchen finde nenne mir alle gehe geh zu zum zur kunde kunden kundenakte kundenkartei kundenliste akte angebot angebote rechnung rechnungen offene offenen offen posten forderung forderungen zahlung anzahlung erfasse erfassen bitte von fur fuer und die der das den dem ein eine einen mein meine "+
  "dashboard ubersicht buchhaltung preisrechner kalkulation rechner backup sicherung marketing agents agent ki crm aufmass aufmas bank csv materialrechner materialberechnung material werkzeug fahrtenbuch fixkosten abos baustelle projekt checkliste leads anfragen einstellungen firmendaten settings voice sprache voicesteuerung").split(" "));
function extractCustomerName(t){
  let s=t;
  const m=s.match(/\b(?:von|fur|fuer)\s+(.+)$/);
  if(m) s=m[1];
  const toks=s.split(" ").filter(w=>w && !VOICE_STOPWORDS.has(w));
  return toks.join(" ").trim();
}
function findCustomerByVoiceName(name){
  const q=normalizeVoiceText(name); if(!q) return [];
  const parts=q.split(" ").filter(Boolean);
  return (data.customers||[]).filter(c=>!(c.archived||c.deletedAt)).filter(c=>{
    const cn=normalizeVoiceText(c.name||"");
    return parts.every(p=>cn.includes(p));
  });
}
function parseVoiceCommand(raw){
  const t=normalizeVoiceText(raw);
  if(/\bzuruck\b|\bzuruek\b|\bback\b|vorherige/.test(t)) return {intent:"back",norm:t,raw};
  const createVerb=/\b(erstelle|erstellen|erzeuge|erzeugen|neues|neue|neu|mach|machen|anlegen)\b/.test(t);
  const name=extractCustomerName(t);
  if(t.includes("angebot") && (createVerb||/\b(von|fur|fuer)\b/.test(t))) return {intent:"createOffer",name,norm:t,raw};
  if(t.includes("rechnung") && (createVerb||/\b(von|fur|fuer)\b/.test(t))) return {intent:"createInvoice",name,norm:t,raw};
  if(/\b(zahlung|anzahlung)\b/.test(t) && name) return {intent:"payment",name,norm:t,raw};
  if(/offene[nr]?\s+posten|offene[nr]?\s+forderung|forderungen/.test(t) && name) return {intent:"openItemsCustomer",name,norm:t,raw};
  if((/\b(kunde|kundenakte|akte|offne|oeffne|open|zeige|zeig|suche|such|finde)\b/.test(t)) && name && !voiceMatchSection(name)) return {intent:"openCustomer",name,norm:t,raw};
  const sec=voiceMatchSection(t);
  if(sec) return {intent:"navigate",section:sec,norm:t,raw};
  return {intent:"unknown",norm:t,raw};
}
function voiceIntentLabel(i){ return {navigate:"Navigation",back:"Zurück",openCustomer:"Kunde öffnen",openItemsCustomer:"Offene Posten (Kunde)",createOffer:"Angebot erstellen",createInvoice:"Rechnung erstellen",payment:"Zahlung erfassen",unknown:"Unbekannt"}[i]||i; }
function voiceShow(recognized, intent, action, type){
  const el=byId("voiceOut");
  const color=type==="err"?"#ff8070":type==="warn"?"var(--gold)":"var(--green2)";
  const html=`<div><b>Erkannter Text:</b> ${esc(recognized||"–")}</div>
    <div><b>Absicht:</b> ${esc(intent||"–")}</div>
    <div style="color:${color};margin-top:4px"><b>Aktion:</b> ${action||"–"}</div>`;
  if(el) el.innerHTML=html; else if(type==="warn"||type==="err") alert(String(action).replace(/<[^>]+>/g," "));
}
function voiceFeedback(message, type){ voiceShow(window._lastVoiceRaw||"", window._lastVoiceIntent||"–", message, type); }
function voiceRun(){
  const raw=val("voiceInput");
  if(!raw){ voiceShow("","–","Bitte einen Befehl eingeben.","warn"); return; }
  const cmd=parseVoiceCommand(raw);
  window._lastVoiceRaw=raw; window._lastVoiceIntent=voiceIntentLabel(cmd.intent);
  voiceShow(raw, voiceIntentLabel(cmd.intent), "wird ausgeführt …");
  executeVoiceCommand(cmd);
}
function executeVoiceCommand(cmd){
  const label=voiceIntentLabel(cmd.intent);
  if(cmd.intent==="back"){ voiceShow(cmd.raw,label,"Gehe zur vorherigen Ansicht."); goBack(); return; }
  if(cmd.intent==="navigate"){ voiceShow(cmd.raw,label,"Öffne Bereich."); showSection(cmd.section); return; }
  if(cmd.intent==="unknown"){
    const ai=getAISettings();
    if(ai.mode==="ollama"){ voiceAskOllama(cmd.raw); return; }
    voiceShow(cmd.raw,label,"Befehl nicht verstanden. Bitte anders formulieren oder einen Beispielbefehl nutzen.","warn"); return;
  }
  if(!cmd.name){ voiceShow(cmd.raw,label,"Kein Kundenname erkannt.","warn"); return; }
  const matches=findCustomerByVoiceName(cmd.name);
  if(matches.length===0){ voiceShow(cmd.raw,label,"Kein Kunde gefunden für „"+esc(cmd.name)+"“.","warn"); return; }
  if(matches.length>1){
    const list=matches.slice(0,10).map(c=>`<button class="btn sm" style="margin:2px" onclick="voicePick('${c.id}','${cmd.intent}')">${esc(c.name)}</button>`).join(" ");
    voiceShow(cmd.raw,label,"Mehrere Kunden gefunden – bitte wählen:<br>"+list,"warn"); return;
  }
  voiceExecuteForCustomer(cmd.intent, matches[0]);
}
function voicePick(id,intent){ const c=data.customers.find(x=>x.id===id); if(c) voiceExecuteForCustomer(intent,c); }
function voiceExecuteForCustomer(intent, c){
  if(intent==="openCustomer"){ voiceShow("","Kunde öffnen","Öffne Kundenakte: "+esc(c.name)); openAkte(c.id); return; }
  if(intent==="openItemsCustomer"){ _oiCustomerFilter=c.id; voiceShow("","Offene Posten","Zeige offene Posten von "+esc(c.name)); showSection("openitems"); return; }
  if(intent==="payment"){ currentDetailId=c.id; _akteTab="zahlungen"; voiceShow("","Zahlung erfassen","Öffne Zahlungen für "+esc(c.name)+" – bitte Betrag im Formular prüfen."); showSection("crm_detail"); return; }
  if(intent==="createOffer"){
    const pcs=(data.priceCalculations||[]).filter(p=>p.customerId===c.id);
    if(!pcs.length){ voiceShow("","Angebot erstellen","Für „"+esc(c.name)+"“ ist noch keine Preiskalkulation vorhanden. Bitte zuerst Preiskalkulation erstellen.","warn"); return; }
    const latest=pcs.slice().sort((a,b)=>String(b.createdAt||b.date).localeCompare(String(a.createdAt||a.date)))[0];
    voiceShow("","Angebot erstellen","Angebotsformular für „"+esc(c.name)+"“ aus neuester Kalkulation vorbereitet – bitte prüfen und speichern.");
    offerFromPriceCalc(latest.id);
    return;
  }
  if(intent==="createInvoice"){
    const accepted=(data.offers||[]).filter(o=>o.customerId===c.id && o.status==="Angenommen" && !(data.invoices||[]).some(i=>i.offerId===o.id));
    if(!accepted.length){ voiceShow("","Rechnung erstellen","Es gibt kein angenommenes Angebot für „"+esc(c.name)+"“.","warn"); return; }
    if(accepted.length>1){
      const list=accepted.map(o=>`<button class="btn sm" style="margin:2px" onclick="if(confirm('Rechnung aus Angebot ${esc(o.number)} erstellen?')){invoiceFromOffer('${o.id}');}">${esc(o.number)} · ${money(o.total)}</button>`).join(" ");
      voiceShow("","Rechnung erstellen","Mehrere angenommene Angebote – bitte wählen:<br>"+list,"warn"); return;
    }
    if(confirm("Rechnung aus angenommenem Angebot "+accepted[0].number+" für "+c.name+" erstellen?")) invoiceFromOffer(accepted[0].id);
    else voiceShow("","Rechnung erstellen","Abgebrochen.","warn");
    return;
  }
}

/* Optional: unklaren Sprachbefehl lokal von Ollama als JSON-Intent deuten lassen.
   Führt NUR sichere Aktionen aus (Navigation, Kunde/offene Posten öffnen) – niemals Löschen. */
const VOICE_AI_SECTIONS = ["dashboard","crm","akte","openitems","bookkeeping","banksync","calculator","materialcalc","angebote","rechnungen","backup","marketing","agents","settings","voice","mileage","recurring","projekte","checkliste","leads","materials","aufmass"];
function voiceAskOllama(raw){
  voiceShow(raw,"KI-Deutung (Ollama)","Frage lokale KI nach der Absicht …");
  const sys = `Du bist ein Intent-Parser für ein deutsches Handwerker-Cockpit. Antworte AUSSCHLIESSLICH mit einem JSON-Objekt, ohne Erklärung, im Format:
{"intent":"open_section|open_customer|open_items|unknown","section":"<einer von: ${VOICE_AI_SECTIONS.join(",")} oder null>","customerName":"<name oder null>","confidence":0.0}
Wähle open_section für Navigations-Wünsche, open_customer zum Öffnen einer Kundenakte, open_items für offene Posten eines Kunden. Niemals löschen.`;
  callOllama("Sprachbefehl: "+raw, {system:sys, timeout:30000}).then(txt=>{
    let j=null; try{ const m=String(txt).match(/\{[\s\S]*\}/); j=JSON.parse(m?m[0]:txt); }catch{}
    if(!j||!j.intent || j.intent==="unknown"){ voiceShow(raw,"KI-Deutung","Konnte den Befehl auch mit lokaler KI nicht sicher deuten. Bitte tippen.","warn"); return; }
    const conf = (typeof j.confidence==="number")?(" · Konfidenz "+Math.round(j.confidence*100)+"%"):"";
    if(j.intent==="open_section" && j.section && VOICE_AI_SECTIONS.includes(j.section)){
      voiceShow(raw,"KI: Navigation","Öffne „"+esc(j.section)+"“"+conf); showSection(j.section); return;
    }
    if((j.intent==="open_customer"||j.intent==="open_items") && j.customerName){
      const matches=findCustomerByVoiceName(j.customerName);
      if(matches.length===1){
        if(j.intent==="open_items"){ _oiCustomerFilter=matches[0].id; voiceShow(raw,"KI: Offene Posten","Zeige offene Posten von "+esc(matches[0].name)+conf); showSection("openitems"); }
        else { voiceShow(raw,"KI: Kunde","Öffne Kundenakte: "+esc(matches[0].name)+conf); openAkte(matches[0].id); }
        return;
      }
      voiceShow(raw,"KI: Kunde", matches.length?("Mehrere Kunden gefunden – bitte präzisieren."):("Kein Kunde gefunden für „"+esc(j.customerName)+"“."),"warn"); return;
    }
    voiceShow(raw,"KI-Deutung","Keine sichere Aktion erkannt.","warn");
  }).catch(err=>{ voiceShow(raw,"KI-Deutung", ollamaErrorText(err),"err"); });
}

function toggleGroup(header){
  header.classList.toggle("open");
  const items=header.nextElementSibling;
  if(items) items.classList.toggle("open");
}

/* ==========================================================
   INIT
   ========================================================== */
function render(id){ showSection(id||currentSection); }

document.addEventListener("DOMContentLoaded",()=>{
  // Nav-Buttons
  document.querySelectorAll(".navbtn[data-sec]").forEach(b=>{
    b.addEventListener("click",()=>{ showSection(b.dataset.sec); if(window.innerWidth<=900){ document.querySelector(".sidebar").classList.remove("mobile-open"); } });
  });
  // Mobile-Menu sichtbar machen
  if(window.innerWidth<=900){ byId("mobileMenu").style.display="inline-flex"; }
  // Drop-Zone
  document.addEventListener("DOMContentLoaded",()=>{});

  loadAll(); loadSettingsFields();
  showSection("dashboard");
  try{ nxInjectGlobal(); }catch(e){} // globaler Mic-Chip + Antwort-Overlay (Zuhören erst nach Klick)
  try{ nxTryLoadLocalConfig(); }catch(e){} // optionale lokale Startkonfiguration (nur über http, nie überschreibend)
  // Live Bank-Table wenn section aktiv
  const obs=new MutationObserver(()=>{ if(currentSection==="bookkeeping") renderBkTable(); });
  obs.observe(byId("main"),{childList:true});
});
