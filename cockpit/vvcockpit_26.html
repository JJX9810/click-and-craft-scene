function akteNewOffer(id){ window._offerPrefillCustomer=id; currentDetailId=id; showSection("angebote"); }
function akteInvoiceFromOffer(id){
  const accepted=(data.offers||[]).filter(o=>o.customerId===id && o.status==="Angenommen" && !(data.invoices||[]).some(i=>i.offerId===o.id));
  if(!accepted.length){ alert("Kein angenommenes Angebot ohne Rechnung vorhanden."); return; }
  invoiceFromOffer(accepted[0].id);
}
function akteOpenItems(id){ currentDetailId=id; _akteTab="zahlungen"; showSection("crm_detail"); }

function renderCRMDetail(id){
  const c=data.customers.find(x=>x.id===id);
  if(!c) return `<div class="panel"><p>Kunde nicht gefunden.</p><button class="btn" onclick="showSection('akte')">Zurück</button></div>`;
  const tabs=[["uebersicht","Übersicht"],["aufmass","Aufmaß & Fotos"],["angebote","Angebote"],["rechnungen","Rechnungen"],["zahlungen","Zahlungen & offene Posten"],["verlauf","Verlauf"]];
  const ms=data.measurements.filter(m=>m.customerId===id);
  const mcs=(data.materialCalcs||[]).filter(m=>m.customerId===id);
  const pcs=(data.priceCalculations||[]).filter(p=>p.customerId===id);
  const os=data.offers.filter(o=>o.customerId===id);
  const is=data.invoices.filter(i=>i.customerId===id);
  const pays=customerPayments(id);
  const ois=(data.openItems||[]).filter(o=>o.customerId===id);
  const openOI=ois.filter(o=>Number(o.open)>0 && !OI_DONE_STATUS.includes(o.status));
  const next=computeNextStep(id);

  // kontextbezogener Aktions-Button für den nächsten Schritt
  const nextBtnMap={
    "Aufmaß erstellen":`<button class="btn primary" onclick="akteNewAufmass('${id}')">📐 Aufmaß erstellen</button>`,
    "Materialberechnung erstellen":`<button class="btn primary" onclick="akteMaterial('${id}')">🧮 Materialberechnung erstellen</button>`,
    "Preiskalkulation erstellen":`<button class="btn primary" onclick="akteCalc('${id}')">🔢 Preiskalkulation erstellen</button>`,
    "Angebot erstellen":`<button class="btn primary" onclick="akteNewOffer('${id}')">📋 Angebot erstellen</button>`,
    "Angebot nachfassen":`<button class="btn primary" onclick="_akteTab='angebote';showSection('crm_detail')">📋 Angebote ansehen</button>`,
    "Rechnung erstellen":`<button class="btn primary" onclick="akteInvoiceFromOffer('${id}')">🧾 Rechnung aus Angebot</button>`,
    "Zahlung erfassen":`<button class="btn primary" onclick="akteOpenItems('${id}')">€ Zahlung erfassen</button>`,
    "Auftrag abschließen":`<button class="btn green" onclick="closeCustomer('${id}')">✓ Auftrag abschließen</button>`
  };
  const nextBtn=nextBtnMap[next]||"";

  let body="";
  if(_akteTab==="uebersicht") body=`
    <div style="background:rgba(212,161,90,.08);border:1px solid var(--gold3);border-radius:var(--r2);padding:12px;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
        <div><span style="color:var(--muted);font-size:12px">Nächster Schritt</span><div style="font-size:18px;font-weight:900;color:var(--gold2)">➡ ${esc(next)}</div></div>
        <div>${nextBtn}</div>
      </div>
      <div style="color:var(--muted);font-size:12px;margin-top:6px">Letzte Aktion: ${esc(lastAction(id))}</div>
    </div>
    <div class="fg c2">
      <div><div class="info-row"><span class="lk">Telefon</span>${esc(c.phone||"–")}</div>
        <div class="info-row"><span class="lk">E-Mail</span>${esc(c.email||"–")}</div>
        <div class="info-row"><span class="lk">Adresse</span>${esc(c.address||"–")}</div>
        <div class="info-row"><span class="lk">Dienstleistung</span>${esc(c.service||"–")}</div>
        <div class="info-row"><span class="lk">Status</span><span class="pill ${c.status==="abgeschlossen"?"gr":c.status==="aktiv"?"gd":"gy"}">${esc(c.status||"neu")}</span></div>
        <div class="info-row"><span class="lk">Quelle</span>${esc(c.source||"–")}</div>
      </div>
      <div><div class="info-row"><span class="lk">Notiz</span>${esc(c.note||"–")}</div>
        <div class="info-row"><span class="lk">Offen gesamt</span><b style="color:var(--gold)">${money(openOI.reduce((s,o)=>s+Number(o.open||0),0))}</b></div>
      </div>
    </div>
    <h3>Alle Schritte</h3>
    <div class="btn-row">
      <button class="btn" onclick="akteNewAufmass('${id}')">📐 Neues Aufmaß</button>
      <button class="btn" onclick="akteMaterial('${id}')">🧮 Materialberechnung</button>
      <button class="btn" onclick="akteCalc('${id}')">🔢 Preiskalkulation</button>
      <button class="btn" onclick="akteNewOffer('${id}')">📋 Angebot</button>
      <button class="btn" onclick="akteInvoiceFromOffer('${id}')">🧾 Rechnung aus Angebot</button>
      <button class="btn" onclick="akteOpenItems('${id}')">€ Zahlung / offene Posten</button>
      <button class="btn green" onclick="closeCustomer('${id}')">✓ Kunde abschließen</button>
      <button class="btn ghost" onclick="openCrmForm(data.customers.find(x=>x.id==='${id}'));showSection('crm')">Stammdaten bearbeiten</button>
      ${isArchived(c)?`<button class="btn" onclick="unarchiveCustomer('${id}')">♻️ Reaktivieren</button>`:`<button class="btn" onclick="archiveCustomer('${id}')">📦 Archivieren</button>`}
      <button class="btn red" onclick="customerDeleteChoice('${id}')">🗑️ Kunde löschen</button>
    </div>
    <div id="custActionArea"></div>
    <div class="fg c4" style="margin-top:12px">
      <div class="kpi"><div class="k">Aufmaße</div><div class="v">${ms.length}</div></div>
      <div class="kpi"><div class="k">Materialberech.</div><div class="v">${mcs.length}</div></div>
      <div class="kpi"><div class="k">Kalkulationen</div><div class="v">${pcs.length}</div></div>
      <div class="kpi"><div class="k">Angebote</div><div class="v">${os.length}</div></div>
    </div>
    ${mcs.length?`<h3>Materialberechnungen</h3><div class="tablewrap"><table><thead><tr><th>Datum</th><th>Fläche</th><th>Bodenbedarf</th><th>Materialkosten</th></tr></thead><tbody>${mcs.slice().reverse().map(m=>`<tr><td>${esc(m.date||"")}</td><td>${(Number(m.totalArea??m.area)||0).toFixed(2)} m²</td><td>${(Number(m.floorNeed??m.need)||0).toFixed(2)} m²</td><td><b>${money((m.totalMaterialCosts??m.total)||0)}</b></td></tr>`).join("")}</tbody></table></div>`:""}
    ${pcs.length?`<h3>Preiskalkulationen</h3><div class="tablewrap"><table><thead><tr><th>Datum</th><th>Dienstleistung</th><th>Pos.</th><th>Arbeit</th><th>Material</th><th>Entsorgung</th><th>Gesamt</th><th>Aktionen</th></tr></thead><tbody>${pcs.slice().sort((a,b)=>String(b.createdAt||b.date).localeCompare(String(a.createdAt||a.date))).map(p=>{const aufm=(data.measurements||[]).find(m=>m.id===p.measurementId);return `<tr><td>${esc(p.date||"")}</td><td>${esc(p.serviceType||"–")}${aufm?`<br><span style="color:var(--muted);font-size:11px">Aufmaß ${fmtDate(aufm.createdAt)}</span>`:""}</td><td>${(p.calculationPositions||[]).length}</td><td>${money((p.laborTotal??p.laborCost)||0)}</td><td>${money((p.materialTotal??p.materialCost)||0)}</td><td>${money((p.disposalTotal??p.disposalCost)||0)}</td><td><b>${money(p.total||0)}</b></td><td style="white-space:nowrap"><button class="btn sm" onclick="openPriceCalc('${p.id}')">Öffnen/Bearbeiten</button> <button class="btn sm primary" onclick="offerFromPriceCalc('${p.id}')">Angebot</button></td></tr>`;}).join("")}</tbody></table></div>`:""}
    ${akteBelegeHTML(id)}`;
  else if(_akteTab==="aufmass") body=ms.length?ms.map(m=>`
    <div style="border:1px solid var(--line);border-radius:var(--r2);padding:13px;margin:8px 0;background:#0d0a07">
      <b>Aufmaß vom ${fmtDate(m.createdAt)}</b> · ${m.totalArea?.toFixed(2)||0} m² · ${m.totalSkirting?.toFixed(2)||0} lfm
      <button class="btn sm" style="margin-left:8px" onclick="akteMaterial('${id}')">→ Materialberechnung</button>
      ${(m.rooms||[]).map(r=>`
        <div style="margin:8px 0 4px;padding-left:10px;border-left:2px solid var(--gold3)">
          <b>${esc(r.name||"Raum")}</b> – ${((r.areaOverride??r.areaAuto)||0).toFixed(2)} m² – ${(r.skirtingLfm||0)} lfm
          ${r.notes?`<span style="color:var(--muted)"> · ${esc(r.notes)}</span>`:""}
          ${(r.photos||[]).length?`<div class="thumbs">${(r.photos||[]).map(p=>`<div class="thumb"><img src="${esc(p.dataUrl)}" loading="lazy"></div>`).join("")}</div>`:""}
        </div>`).join("")}
    </div>`).join("") : `<p style="color:var(--muted)">Kein Aufmaß. <button class="btn sm primary" onclick="akteNewAufmass('${id}')">Aufmaß anlegen</button></p>`;
  else if(_akteTab==="angebote") body=`<div class="btn-row" style="margin-bottom:8px"><button class="btn primary" onclick="akteNewOffer('${id}')">+ Neues Angebot</button><button class="btn" onclick="openLegacyOfferForm('${id}')">+ Bestehendes Angebot erfassen</button><button class="btn green" onclick="byId('docUp_offer').click()">📎 Angebots-Datei hochladen</button></div>`+(os.length?`<div class="tablewrap"><table><thead><tr><th>Nr.</th><th>Kunde</th><th>Datum</th><th>Gesamt</th><th>Status</th><th>Aktionen</th></tr></thead><tbody>${offerTableHTML(os)}</tbody></table></div><div id="offerFormArea"></div>`:'<p style="color:var(--muted)">Keine Angebote.</p><div id="offerFormArea"></div>')+customerDocsHTML(id,"offer");
  else if(_akteTab==="rechnungen") body=`<div class="btn-row" style="margin-bottom:8px"><button class="btn" onclick="akteInvoiceFromOffer('${id}')">Rechnung aus angenommenem Angebot</button><button class="btn" onclick="openLegacyInvoiceForm('${id}')">+ Bestehende Rechnung erfassen</button><button class="btn green" onclick="byId('docUp_invoice').click()">📎 Rechnungs-Datei hochladen</button></div>`+(is.length?`<div class="tablewrap"><table><thead><tr><th>Nr.</th><th>Kunde</th><th>Datum</th><th>Gesamt</th><th>Offen</th><th>Status</th><th>Aktionen</th></tr></thead><tbody>${invoiceTableHTML(is)}</tbody></table></div><div id="invFormArea"></div>`:'<p style="color:var(--muted)">Keine Rechnungen.</p><div id="invFormArea"></div>')+customerDocsHTML(id,"invoice");
  else if(_akteTab==="zahlungen") body=`
    <h3>Offene Posten</h3>
    ${openOI.length?`<div class="tablewrap"><table><thead><tr><th>Beleg</th><th>Position</th><th>Soll</th><th>Bezahlt</th><th>Offen</th><th>Aktionen</th></tr></thead><tbody>${
      openOI.map(o=>`<tr><td>${esc(o.reference||"")}</td><td>${esc(o.label||"")}</td><td>${money(o.due)}</td><td>${money(o.paid)}</td><td><b>${money(o.open)}</b></td>
        <td><button class="btn sm primary" onclick="oiPaymentFromAkte('${o.sourceKey}')">€ Zahlung</button> <button class="btn sm green" onclick="oiMarkPaid('${o.sourceKey}')">✓ Bezahlt</button></td></tr>`).join("")
    }</tbody></table></div>`:'<p style="color:var(--muted)">Keine offenen Posten.</p>'}
    <div id="oiEditArea"></div>
    <h3>Zahlungen</h3>
    ${pays.length?`<div class="tablewrap"><table><thead><tr><th>Datum</th><th>Betrag</th><th>Art</th><th>Zuordnung</th><th>Notiz</th></tr></thead><tbody>${
      pays.map(p=>`<tr><td>${esc(p.date||"")}</td><td><b>${money(p.amount)}</b></td><td>${esc(p.method||"")}</td><td>${esc(p.appliesTo||"")}</td><td>${esc(p.note||"")}</td></tr>`).join("")
    }</tbody></table></div>`:'<p style="color:var(--muted)">Noch keine Zahlungen erfasst.</p>'}`;
  else body=(()=>{ const tl=customerTimeline(id); return tl.length?`<div class="tablewrap"><table><thead><tr><th>Datum/Uhrzeit</th><th>Aktion</th><th>Beschreibung</th></tr></thead><tbody>${tl.map(t=>`<tr><td style="white-space:nowrap">${esc(fmtDT(t.date))}</td><td><b>${esc(t.action)}</b></td><td>${esc(t.desc||"")}</td></tr>`).join("")}</tbody></table></div>`:'<p style="color:var(--muted)">Noch kein Verlauf.</p>'; })();

  return `<div class="panel">
    <button class="btn ghost sm" onclick="showSection('akte')">← Kundenkartei</button>
    <h2 style="margin-top:10px">${esc(c.name)} <span class="pill ${c.status==="abgeschlossen"?"gr":c.status==="aktiv"?"gd":"gy"}" style="vertical-align:middle">${esc(c.status||"neu")}</span></h2>
    <p class="sub">Kunde seit ${fmtDate(c.createdAt)} · Nächster Schritt: <b style="color:var(--gold2)">${esc(next)}</b></p>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin:10px 0">
      ${tabs.map(([tid,tl])=>`<button class="btn ${_akteTab===tid?"primary":"ghost"} sm" onclick="_akteTab='${tid}';showSection('crm_detail')">${tl}</button>`).join("")}
    </div>
    ${body}
  </div>`;
}

function renderAufmass(){

  const svc=afmDraft.serviceType||"Bodenverlegung";

  const totalLabel2=svc==="Entrümpelung & Entsorgung"?"Räume":svc==="Küchenmontage"?"Bereiche":"Sockelleisten (lfm)";
  return `<div class="panel">
    <h2>📐 Aufmaß-Tool</h2>
    <p class="sub">Räume/Bereiche erfassen, Fotos aufnehmen → Backup exportieren → am PC importieren.</p>

      <div><label class="lbl">… oder neuer Kundenname</label><input id="afmNewName" value="${esc(afmDraft.newName||"")}" oninput="afmDraft.newName=this.value" placeholder="Name eintragen"></div>
    </div>
    <div style="margin-bottom:12px">
      <label class="lbl">Leistungsart</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${["Bodenverlegung","Küchenmontage","Entrümpelung & Entsorgung"].map(s=>`
          <label style="display:flex;align-items:center;gap:7px;padding:9px 14px;border:1px solid ${svc===s?"var(--gold)":"var(--line)"};border-radius:10px;cursor:pointer;background:${svc===s?"rgba(212,161,90,.12)":"transparent"};font-weight:${svc===s?"900":"400"}">
            <input type="radio" name="afmSvc" value="${s}" ${svc===s?"checked":""} style="width:auto" onchange="changeServiceType(this.value)"> ${s}</label>`).join("")}
      </div>
    </div>
  </div>
  <!-- Leistungs-spezifische Felder -->
  <div id="svcSpecific">${renderSvcSpecific()}</div>
  <!-- Räume/Bereiche -->
  <div class="panel">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px" id="roomsHeader">
      <h3 style="margin:0">Räume / Bereiche <span class="svc-badge">${esc(svc)}</span></h3>
      <button class="btn sm primary" onclick="addRoom()">+ Bereich / Raum</button>
    </div>
    <div id="afmRooms"></div>
    ${afmDraft.rooms.length===0?`<p style="color:var(--muted);margin-top:8px">Noch keine Räume/Bereiche. „+ Bereich / Raum" klicken.</p>`:""}
    <div class="divider"></div>
    <div class="fg c2" style="margin-top:4px">
      <div><span style="color:var(--muted);font-size:12px">${totalLabel}</span><div style="font-size:26px;font-weight:900;color:#f4ede4" id="afmTotalArea">0,00</div></div>
      <div><span style="color:var(--muted);font-size:12px">${totalLabel2}</span><div style="font-size:26px;font-weight:900;color:#f4ede4" id="afmTotalSkirt">0,00</div></div>
    </div>
    <div class="btn-row">
      <button class="btn ghost" onclick="if(confirm('Aufmaß verwerfen?')){resetAfmDraft();showSection('aufmass');}">Verwerfen</button>
      <button class="btn primary" onclick="saveAfmass()">✓ Aufmaß speichern</button>

    <td><span class="pill ${o.status==="Angenommen"?"gr":o.status==="Abgelehnt"?"rd":"gd"}">${esc(o.status||"Entwurf")}</span></td>
    <td style="white-space:nowrap"><button class="btn sm ghost" onclick="printOffer('${o.id}')">PDF</button>

        <button class="btn sm" onclick="setOfferStatus('${o.id}','Gesendet')">Gesendet</button>
        <button class="btn sm green" onclick="acceptOffer('${o.id}')">✓ Angenommen</button>
        <button class="btn sm" onclick="setOfferStatus('${o.id}','Abgelehnt')">Abgelehnt</button>
        <button class="btn sm red" onclick="deleteOffer('${o.id}')">×</button></td></tr>`).join("");
}
function offerDepositFieldsHTML(o){
  const s=getSettings();
  o=o||{};
  const mode=o.depositMode||"percent";
  const pct=o.depositPercent!=null?o.depositPercent:s.defaultDepositPercent;
  return `<h3>Anzahlung &amp; Konditionen</h3>
    <div class="fg c3">
      <div><label class="lbl">Anzahlungsart</label><select id="of_depmode" onchange="offerDepPreview()">
        <option value="percent" ${mode==="percent"?"selected":""}>Prozent</option>
        <option value="amount" ${mode==="amount"?"selected":""}>Fester Betrag</option>
      </select></div>
      <div><label class="lbl">Anzahlung %</label><input id="of_deppct" inputmode="decimal" value="${esc(pct)}" oninput="offerDepPreview()"></div>
      <div><label class="lbl">Anzahlungsbetrag (€)</label><input id="of_depamount" inputmode="decimal" value="${o.depositAmount!=null?esc(o.depositAmount):""}" oninput="offerDepPreview()" placeholder="auto aus %"></div>
    </div>
    <div class="fg c3">
      <div><label class="lbl">Zahlungsziel Anzahlung</label><input id="of_depdue" type="date" value="${esc(o.depositDueDate||"")}"></div>
      <div><label class="lbl">Zahlungsziel Restzahlung</label><input id="of_restdue" type="date" value="${esc(o.restDueDate||"")}"></div>
      <div><label class="lbl">Gültigkeit (Tage)</label><input id="of_validity" inputmode="decimal" value="${o.validityDays!=null?esc(o.validityDays):30}"></div>
    </div>
    <p id="of_deppreview" style="color:var(--muted);font-size:12px;margin-top:4px"></p>`;
}
function offerDepPreview(){
  const total=sumItems(getItems("of_items"));
  const mode=val("of_depmode"); let dep;
  if(mode==="amount") dep=parseNum(val("of_depamount"));
  else dep=r2(total*parseNum(val("of_deppct"))/100);
  if(dep>total) dep=total;
  const el=byId("of_deppreview");
  if(el) el.textContent=`Auftrag gesamt ${money(total)} → Anzahlung ${money(dep)} · Restzahlung ${money(r2(total-dep))}`;
}

function fmtSize(n){ n=Number(n||0); if(n<1024)return n+" B"; if(n<1048576)return (n/1024).toFixed(0)+" KB"; return (n/1048576).toFixed(1)+" MB"; }
function readAsDataURL(file){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=()=>rej(r.error||new Error("Lesefehler")); r.readAsDataURL(file); }); }

    ${list}

async function uploadCustomerDoc(cid,type,files){
  const arr=Array.from(files||[]); if(!arr.length) return;
  const c=data.customers.find(x=>x.id===cid);
  const num=val("docNum_"+type), tot=val("docTotal_"+type), dat=val("docDate_"+type);
  let added=0;
  for(const f of arr){
    let dataUrl;
    try{
      if(/^image\//.test(f.type)) { try{ dataUrl=await compressImage(f,1600,0.7); }catch{ dataUrl=await readAsDataURL(f); } }
      else dataUrl=await readAsDataURL(f);
    }catch(err){ alert("Datei „"+(f.name||"")+"“ konnte nicht gelesen werden."); continue; }
    const size=Math.round((String(dataUrl).length*3)/4);
    if(size>6*1024*1024){ if(!confirm("Die Datei „"+(f.name||"")+"“ ist groß ("+fmtSize(size)+"). Im lokalen Speicher kann das Probleme verursachen. Trotzdem speichern?")) continue; }
    data.documents.push({id:uid(), customerId:cid, customerName:c?c.name:"", type, fileName:f.name||"Datei", name:f.name||"Datei",
      mime:f.type||"", dataUrl, size, number:num, total:(tot===""?"":r2(parseNum(tot))), date:dat||today(), notes:"", createdAt:nowISO(), updatedAt:nowISO()});
    added++;
  }
  if(added){
    addTimeline(cid, (type==="invoice"?"Rechnungs":"Angebots")+"-Datei hochgeladen", added+" Datei(en)");
    saveAll(false);
  }
  showSection("crm_detail");
}
function openDocFile(id){
  const d=(data.documents||[]).find(x=>x.id===id); if(!d) return;
  const w=window.open(""); if(!w){ alert("Bitte Pop-ups erlauben, um die Datei zu öffnen. Alternativ „⬇“ zum Herunterladen nutzen."); return; }
  if(/pdf/i.test(d.mime)) w.document.write('<title>'+esc(d.fileName||"Dokument")+'</title><iframe src="'+d.dataUrl+'" style="border:0;position:fixed;inset:0;width:100%;height:100%"></iframe>');
  else if(/image/i.test(d.mime)) w.document.write('<title>'+esc(d.fileName||"Bild")+'</title><img src="'+d.dataUrl+'" style="max-width:100%;height:auto">');
  else { w.document.write('<title>'+esc(d.fileName||"Datei")+'</title><a href="'+d.dataUrl+'" download="'+esc(d.fileName||"datei")+'">Datei herunterladen</a>'); }
  w.document.close();
}
function downloadDocFile(id){
  const d=(data.documents||[]).find(x=>x.id===id); if(!d) return;
  const a=document.createElement("a"); a.href=d.dataUrl; a.download=d.fileName||"dokument"; a.style.display="none";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function saveOffer(){

function acceptOffer(id){
  const o=data.offers.find(x=>x.id===id);if(!o)return;
  o.status="Angenommen"; o.updatedAt=nowISO();
  const c=data.customers.find(x=>x.id===o.customerId);
  if(c){ if(c.status!=="abgeschlossen") c.status="aktiv"; }
  addTimeline(o.customerId,"Angebot angenommen", o.number+" · "+money(o.total)+(o.depositAmount?(" · Anzahlung "+money(o.depositAmount)):""), {type:"offer",id:o.id});
  if(o.customerId){ const cc=data.customers.find(x=>x.id===o.customerId); if(cc&&cc.status!=="abgeschlossen") cc.nextStep="Anzahlung prüfen / Rechnung erstellen"; }
  rebuildOpenItems(); saveAll(false);
  showSection(currentSection==="crm_detail"?"crm_detail":"angebote");
}
function setOfferStatus(id, status){
  const o=data.offers.find(x=>x.id===id);if(!o)return;
  if(status==="Angenommen"){ return acceptOffer(id); }
  o.status=status; o.updatedAt=nowISO();
  if(status==="Gesendet"){
    addTimeline(o.customerId,"Angebot gesendet", o.number, {type:"offer",id:o.id});
    if(o.customerId) refreshCustomerStage(o.customerId);
  }
  if(status==="Abgelehnt"){
    addTimeline(o.customerId,"Angebot abgelehnt", o.number, {type:"offer",id:o.id});
    rebuildOpenItems(); // abgelehnt erzeugt keine offenen Posten mehr
    const c=data.customers.find(x=>x.id===o.customerId);
    if(c && c.status!=="abgeschlossen"){ c.nextStep="Nachfassen oder archivieren"; c.updatedAt=nowISO(); }
  }
  saveAll(false); showSection(currentSection==="crm_detail"?"crm_detail":"angebote");
}

/* editorial-qa: catch-problems QA vor Veröffentlichung (Pflichtchecks) */
function mkEditorialQA(d){
  const checks=[];
  const body=(d.body||""), all=(d.title+" "+body+" "+(d.callToAction||""));
  const region=(getCampaign(d.campaignId)||{}).targetRegion||getAutopilot().targetRegion||"";
  checks.push({ ok:!!body.trim(), label:"Inhalt vorhanden" });
  checks.push({ ok:!!(d.callToAction||"").trim(), label:"Genau ein CTA" });
  checks.push({ ok:mkScanRisks(all).length===0, label:"Keine riskanten Aussagen (brand-voice)" });
  const avoid=VV_BRAND.avoidWords.map(w=>w.replace(/[^a-zA-Z0-9äöüÄÖÜ]/g,"")).filter(w=>w.length>=2);
  checks.push({ ok:!avoid.some(w=>new RegExp(w,"i").test(all)), label:"Keine verbotenen Begriffe" });
  if(d.platform==="kleinanzeigen") checks.push({ ok:!!(d.title||"").trim(), label:"Titel gesetzt" });
  if(d.platform==="instagram") checks.push({ ok:(d.mediaUrls&&d.mediaUrls.length>0), label:"Medium vorhanden (IG-Pflicht)" });
  if(d.platform==="facebook") checks.push({ ok:body.length>=40, label:"Text ausreichend lang" });
  if(d.platform==="google_business") checks.push({ ok:body.length<=1500, label:"Länge im GBP-Rahmen" });
  const passed=checks.filter(c=>c.ok).length;
  return { checks, passed, total:checks.length, ok:passed===checks.length };
}

   Die Sicherheitsregeln werden zusätzlich im System-Prompt erzwungen UND nach
   der Antwort per mkScanRisks() geprüft – Guardrails halten also auch dann,
   wenn das Modell sie ignoriert.
   ============================================================ */
/* Lazy: VV_AI_SYSTEM wird erst weiter unten als const deklariert –
   daher als Funktion, damit hier keine Temporal-Dead-Zone entsteht. */
function mkAiSystem(){ return VV_AI_SYSTEM + `

ZUSÄTZLICHE REGELN FÜR MARKETING-TEXTE (strikt einhalten):
- Niemals als „Meisterbetrieb" auftreten.
- Keine erfundenen Bewertungen, Sterne oder Referenzen.
- Keine garantierten Google-Rankings oder Top-Platzierungen versprechen.
- Keine Elektroarbeiten/Starkstrom anbieten (nur über zugelassene Fachfirma).
- Keine Superlative wie „beste/r" oder „Nr. 1".
- Sachlich, ehrlich, handwerklich. Preise immer „nach Aufmaß/Besichtigung".`
  + vvBrandPromptBlock(); }

function mkApiKey(){ const a=getApiSettings(); return (a&&a.anthropic)?a.anthropic:""; }
function mkAiReady(){ return !!mkApiKey(); }

/* Schickt einen Prompt an Claude und erwartet reines JSON zurück.
   Wirft bei Fehler (Aufrufer fällt dann auf die lokale Vorlage zurück). */
async function mkClaudeJSON(userPrompt){
  const key=mkApiKey();
  if(!key) throw new Error("no-key");
  const j=await callClaudeRaw(key, [{role:"user",content:userPrompt}], mkAiSystem());
  let txt=claudeTextFromResponse(j)||"";
  // Code-Fences entfernen und erstes JSON-Objekt herausschneiden
  txt=txt.replace(/```json/gi,"```").replace(/```/g,"").trim();
  const a=txt.indexOf("{"), b=txt.lastIndexOf("}");
  if(a<0||b<0||b<a) throw new Error("no-json");
  return JSON.parse(txt.slice(a,b+1));
}

/* ============================================================
   PLATTFORM-ADAPTER  (entspricht den geforderten Provider-Dateien:
   facebookProvider / instagramProvider / googleBusinessProvider /
   kleinanzeigenProvider). Hier als Module-Objekte in einer Datei.
   Alle Provider sind standardmäßig DISABLED.
   Schnittstelle: provider, isEnabled(), validatePayload(p), publish(p)
   ============================================================ */
function getPublishingSettings(){
  const s=getSettings();
  return (s.publishing&&typeof s.publishing==="object")?s.publishing:{};
}
function getProviderConfig(name){
  const cfg=getPublishingSettings()[name]||{};
  return Object.assign({ enabled:false, accountRef:"", pageId:"", igUserId:"", locationId:"", accountId:"" }, cfg);
}
function savePublishingProvider(name, patch){
  let cur={}; try{ cur=JSON.parse(localStorage.getItem("VV_SETTINGS_2026")||"{}")||{}; }catch{}
  const pub=(cur.publishing&&typeof cur.publishing==="object")?cur.publishing:{};
  pub[name]=Object.assign({}, pub[name]||{}, patch||{});
  cur.publishing=pub;
  localStorage.setItem("VV_SETTINGS_2026", JSON.stringify(cur));
  return pub[name];
}
/* Hat der Provider die nötigen (NICHT geheimen) Account-Referenzen? */
function providerHasRefs(name){
  const c=getProviderConfig(name);
  if(name==="facebook")        return !!c.pageId;
  if(name==="instagram")       return !!c.igUserId;
  if(name==="google_business") return !!(c.accountId && c.locationId);
  if(name==="kleinanzeigen")   return false; // bewusst gesperrt bis offizielle API bestätigt
  return false;
}
/* Status-Enum: disabled | credentials_missing | auth_required | permission_missing | ready | error */
function providerStatus(name){
  const c=getProviderConfig(name);
  if(name==="kleinanzeigen") return "permission_missing"; // keine offizielle Publishing-API
  if(!c.enabled) return "disabled";
  if(!providerHasRefs(name)) return "credentials_missing";
  // Account-Refs vorhanden, aber kein echtes OAuth/Token im Frontend -> noch nicht „ready“
  return "auth_required";
}
const MK_PROVIDER_STATUS_LABEL = {
  disabled:"Deaktiviert", credentials_missing:"Account-Daten fehlen",
  auth_required:"OAuth-Anmeldung nötig", permission_missing:"Berechtigung/offizielle API fehlt",
  ready:"Bereit", error:"Fehler"
};

/* Validierung pro Plattform-Payload -> { valid, warnings, errors } */
function mkValidate(platform, p){
  const errors=[], warnings=[];
  const need=(v,name)=>{ if(!v||!String(v).trim()) errors.push("Pflichtfeld fehlt: "+name); };
  if(platform==="facebook"){
    need(p.text,"Text/Message");
    if(!p.accountRef && !(p.metadata&&p.metadata.pageId)) warnings.push("Keine Page-ID hinterlegt.");
  } else if(platform==="instagram"){
    need(p.text,"Caption");
    if(!(p.metadata&&p.metadata.mediaType)) warnings.push("Medientyp (image/video/reel/carousel) nicht gesetzt.");
    if(!p.mediaUrls||!p.mediaUrls.length) warnings.push("Instagram benötigt mindestens ein Medium (Bild/Video).");
  } else if(platform==="google_business"){
    need(p.text,"Summary");
    if(!(p.metadata&&p.metadata.locationId)) warnings.push("Keine Location-ID hinterlegt.");
  } else if(platform==="kleinanzeigen"){
    need(p.title,"Titel"); need(p.text,"Beschreibung");
    warnings.push("Kleinanzeigen: keine offizielle Publishing-API – Veröffentlichung bleibt manuell.");
  }
  // Risikoprüfung über den Text
  mkScanRisks((p.title||"")+" "+(p.text||"")+" "+(p.callToAction||"")).forEach(h=>warnings.push("Risiko: "+h));
  return { valid: errors.length===0, warnings, errors };
}

/* Gemeinsame Provider-Fabrik (eine „Datei“ je Plattform) */
function makeProvider(name){
  return {
    provider:name,
    isEnabled(){ return getProviderConfig(name).enabled===true && name!=="kleinanzeigen"; },
    validatePayload(p){ return mkValidate(name, p); },
    /* publish(): bricht kontrolliert ab, solange kein echter API-Zugang besteht.
       Es findet NIE eine echte Veröffentlichung statt. */
    async publish(p){
      const st=providerStatus(name);
      const base={ success:false, provider:name, externalPostId:null, publishedAt:null };
      if(st==="disabled")          return Object.assign(base,{ errorCode:"provider_disabled",   errorMessage:"Provider ist deaktiviert." });
      if(st==="permission_missing")return Object.assign(base,{ errorCode:"permission_missing",   errorMessage:"Keine offizielle Publishing-API/Berechtigung." });
      if(st==="credentials_missing")return Object.assign(base,{ errorCode:"credentials_missing", errorMessage:"Account-Referenzen fehlen." });
      if(st==="auth_required")     return Object.assign(base,{ errorCode:"auth_required",        errorMessage:"OAuth/Token nötig – serverseitig zu ergänzen." });
      const v=this.validatePayload(p);
      if(!v.valid)                 return Object.assign(base,{ errorCode:"invalid_payload",      errorMessage:v.errors.join("; ") });
      // ===== Hier später echte API-Logik einsetzen (serverseitig/OAuth) =====
      return Object.assign(base,{ errorCode:"api_not_implemented", errorMessage:"Echte API-Anbindung folgt (serverseitig)." });
    }
  };
}

    hashtags=baseTags;
    imageIdea="Reel (15–30 s): Arbeitsschritte im Zeitraffer + Ergebnis.";

/* ---- PublishingPayload (generisch + plattformspezifisch in metadata) ---- */
function buildPublishingPayload(draft){
  const p=draft.platform, cfg=getProviderConfig(p);
  const media = Array.isArray(draft.mediaUrls)?draft.mediaUrls.slice():[];
  const ap = getAutopilot();
  const common = {
    platform:p, accountRef:"", contentType:"post",
    text:draft.body||"", title:draft.title||"",
    mediaUrls:media, callToAction:draft.callToAction||"",
    targetUrl:(ap.defaultTargetUrl||getSettings().web||""), scheduledAt:draft.plannedPublishDate||null, metadata:{}
  };
  if(p==="facebook"){
    common.accountRef=cfg.pageId||"";
    common.metadata={ pageId:cfg.pageId||"", message:draft.body||"", link:common.targetUrl||"", mediaUrls:media, scheduledPublishTime:draft.plannedPublishDate||null };
  } else if(p==="instagram"){
    common.accountRef=cfg.igUserId||"";
    common.contentType="media";
    common.metadata={ igUserId:cfg.igUserId||"", caption:draft.body||"", mediaType:(media.length>1?"carousel":"image"), mediaUrls:media, hashtags:draft.hashtags||[] };
  } else if(p==="google_business"){
    common.accountRef=cfg.locationId||"";
    common.metadata={ accountId:cfg.accountId||"", locationId:cfg.locationId||"", summary:draft.body||"", topicType:"STANDARD", callToAction:draft.callToAction||"", mediaUrls:media, targetUrl:common.targetUrl||"", keywords:(draft.keywords||[]) };
  } else if(p==="kleinanzeigen"){
    common.contentType="classified";
    common.metadata={ title:draft.title||"", description:draft.body||"", category:"Dienstleistungen", location:getSettings().region||"Wilhelmshaven", imageUrls:media, keywords:(draft.keywords||[]), priceMode:"VB", contactMethod:"Telefon/Nachricht", status:"blocked_no_official_api" };
  }
  return common;
}

function mkSetApproval(id, status){
  const d=getDraft(id); if(!d) return;
  if(status==="approved"){
    const risks=mkScanRisks(d.title+" "+d.body+" "+d.callToAction);
    if(risks.length && !confirm("Achtung – Prüfhinweise vorhanden:\n\n• "+risks.join("\n• ")+"\n\nTrotzdem freigeben?")) return;
  }
  d.approvalStatus=status;
  // zugehörige offene Genehmigungsanfrage(n) mitziehen
  (data.approvalRequests||[]).filter(a=>a.draftId===id && a.status==="pending").forEach(a=>{
    a.status = (status==="approved") ? "approved" : (status==="rejected" ? "rejected" : a.status);
    a.decidedAt = nowISO();
  });
  mkTouch(d);
  if(status==="approved"){
    // Nach Freigabe automatisch veröffentlichen (gesperrt -> Protokoll/Status)
    saveAll(false);
    mkExecutePublish(d).then(()=>{ saveAll(false); showSection("mkagents"); });
    return;
  }
  saveAll(false); showSection("mkagents");
}

/* ---- Veröffentlichung simulieren (Dry-Run, immer erlaubt ab „freigegeben“) ---- */
function mkSimulate(id){
  const d=getDraft(id); if(!d) return;
  if(d.approvalStatus!=="approved"){ alert("Bitte zuerst freigeben, dann simulieren."); return; }
  const payload=d.publishingPayload||buildPublishingPayload(d);
  const v=mkValidate(d.platform, payload);
  const entry={ id:uid(), draftId:id, platform:d.platform, mode:"simulation",
    success:v.valid, provider:d.platform, externalPostId:v.valid?("SIMULATED-"+Date.now().toString(36)):null,
    errorCode:v.valid?null:"invalid_payload", errorMessage:v.valid?"Simulierte Veröffentlichung – nichts wurde gesendet.":v.errors.join("; "),
    at:nowISO() };
  data.publishLog.unshift(entry);
  saveAll(false);
  alert(v.valid?("✓ Simulation erfolgreich – KEIN echter Post gesendet.\nPayload wäre an "+MK_PLATFORMS[d.platform].label+" gegangen."):("Simulation: Payload unvollständig.\n"+v.errors.join("\n")));
  _mkTab="protokoll"; showSection("mkagents");
}

/* ---- Echte Veröffentlichung – 8 Bedingungen (laut Spezifikation) ---- */
function mkCanPublish(d){
  const reasons=[];
  if(!d) return { ok:false, reasons:["Kein Entwurf."] };
  const prov=PUBLISHING_PROVIDERS[d.platform];
  const payload=d.publishingPayload||buildPublishingPayload(d);
  const v=mkValidate(d.platform, payload);
  if(!d.body) reasons.push("Kein Entwurf/Inhalt vorhanden.");                 // 1 Entwurf vorhanden
  if(!v.valid) reasons.push("Entwurf nicht validiert: "+v.errors.join("; ")); // 2 validiert
  if(!mkDraftHasApproval(d.id)) reasons.push("Keine Genehmigungsanfrage erstellt."); // 3 Anfrage erstellt
  if(d.approvalStatus!=="approved") reasons.push("Nutzer hat nicht freigegeben (Status ≠ approved)."); // 4 freigegeben
  if(mkProviderBlocked(d.platform)) reasons.push("Provider gesperrt – keine offizielle Schnittstelle.");
  if(!prov.isEnabled()) reasons.push("Provider ist nicht aktiv.");            // 5 Provider aktiv
  if(!providerHasRefs(d.platform)) reasons.push("Credentials/Account-Daten fehlen."); // 6 Credentials
  if(providerStatus(d.platform)!=="ready") reasons.push("API-Status ist nicht „ready“."); // 7 ready
  // 8 Payload gültig = bereits über v.valid abgedeckt
  return { ok:reasons.length===0, reasons, validation:v };
}
function mkPublishNow(id){
  const d=getDraft(id); if(!d) return;
  const gate=mkCanPublish(d);
  if(!gate.ok){
    alert("Veröffentlichung blockiert:\n\n• "+gate.reasons.join("\n• ")+"\n\n(Es wurde nichts gesendet – Status wird gesetzt und protokolliert.)");
    mkExecutePublish(d).then(()=>{ saveAll(false); _mkTab="protokoll"; showSection("mkagents"); });
    return;
  }
  if(!confirm("Wirklich JETZT auf "+MK_PLATFORMS[d.platform].label+" veröffentlichen?\n\nNur fortfahren, wenn du das ausdrücklich freigibst.")) return;
  mkExecutePublish(d).then(res=>{
    saveAll(false);
    alert(res&&res.success?"Veröffentlicht.":("Nicht veröffentlicht: "+((res&&res.errorMessage)||(res&&res.reasons&&res.reasons.join("; "))||"blockiert")));
    _mkTab="protokoll"; showSection("mkagents");
  });
}

  content_generated: { label:"Content erstellt",   color:"var(--gold2)" },
  media_required:    { label:"Medien nötig",       color:"var(--gold2)" },
  approval_requested:{ label:"Freigabe angefragt",  color:"var(--gold)"  },
  approved:          { label:"Freigegeben",        color:"var(--green2)"},
  rejected:          { label:"Abgelehnt",          color:"var(--red2)"  },
  scheduled:         { label:"Geplant",            color:"var(--gold2)" },
  publishing:        { label:"Veröffentlicht…",    color:"var(--gold)"  },
  published:         { label:"Veröffentlicht",     color:"var(--green2)"},
  publish_failed:    { label:"Fehlgeschlagen",     color:"var(--red2)"  },
  provider_blocked:  { label:"Provider gesperrt",   color:"var(--red2)"  },
  archived:          { label:"Archiviert",         color:"var(--muted)" }
};
const MK_SERVICES = ["Bodenverlegung","Küchenmontage","Entrümpelung","Preisrechner","Allgemeines Branding"];
const MK_FREQ = { taeglich:"täglich", "3xwoche":"3× pro Woche", woechentlich:"wöchentlich", manuell:"manuell" };

const MK_TONES = ["sachlich-handwerklich","freundlich-nahbar","kurz & knackig","seriös-informativ"];
const MK_LEGAL = ["normal","hoch","maximal"];
function mkSlug(s){ return String(s).replace(/[^a-zA-Z]/g,""); }
function mkMediaRequired(d){ return d.platform==="instagram" && (!d.mediaUrls || !d.mediaUrls.length); }
/* nur Kleinanzeigen ist gesperrt (keine offizielle Publishing-API) */
function mkProviderBlocked(name){ return name==="kleinanzeigen"; }
function mkDraftHasApproval(id){ return (data.approvalRequests||[]).some(a=>a.draftId===id); }
function mkPendingApproval(id){ return (data.approvalRequests||[]).some(a=>a.draftId===id && a.status==="pending"); }
/* Lebenszyklus aus approval-/publish-Status + Medien ableiten */
function mkComputeStatus(d){
  if(!d) return "idea_generated";
  if(d.approvalStatus==="archived") return "archived";
  if(d.publishStatus==="published") return "published";
  if(d.publishStatus==="provider_blocked") return "provider_blocked";
  if(d.publishStatus==="publish_failed") return "publish_failed";
  if(d.publishStatus==="publishing") return "publishing";
  if(d.publishStatus==="scheduled") return "scheduled";
  if(d.approvalStatus==="rejected") return "rejected";
  if(d.approvalStatus==="approved") return "approved";
  if(mkPendingApproval(d.id)) return "approval_requested";
  if(mkMediaRequired(d)) return "media_required";
  if(d.body) return "content_generated";
  return "idea_generated";
}
function mkStatusBadge(d){ const s=MK_STATUS[mkComputeStatus(d)]||MK_STATUS.idea_generated; return `<span style="font-size:11px;font-weight:800;color:${s.color};border:1px solid ${s.color};border-radius:8px;padding:1px 7px">${esc(s.label)}</span>`; }

/* ============================================================
   KI-PROVIDER-SYSTEM  (gemeinsame Schnittstelle wie gefordert:
   provider/type/isEnabled()/generate() -> AIResult). Cloud- und lokale
   Provider sind vorbereitet; ohne aktiven Provider greift templateProvider.
   KEINE Secrets im Frontend – Cloud-Keys nur über die KI-Einstellungen
   bzw. serverseitig.
   ============================================================ */
function mkAIResult(provider, model, prompt, response, warnings){
  return { provider, model:model||"", prompt:prompt||"", response:response||"", generatedAt:nowISO(), warnings:warnings||[] };
}
const AI_PROVIDERS_REG = {
  anthropic: { provider:"anthropic", type:"cloud", label:"Claude / Anthropic",
    isEnabled(){ return !!mkApiKey(); },
    async generate(prompt){ const j=await callClaudeRaw(mkApiKey(), [{role:"user",content:prompt}], mkAiSystem()); return mkAIResult("anthropic", CLAUDE_MODEL, prompt, claudeTextFromResponse(j)); } },
  openai: { provider:"openai", type:"cloud", label:"OpenAI",
    isEnabled(){ return false; }, // vorbereitet – nur serverseitig/Proxy, kein Frontend-Key
    async generate(){ throw new Error("openai-not-configured (serverseitig vorbereiten)"); } },
  googleai: { provider:"googleai", type:"cloud", label:"Google AI / Gemini",
    isEnabled(){ return false; },
    async generate(){ throw new Error("googleai-not-configured (serverseitig vorbereiten)"); } },
  ollama: { provider:"ollama", type:"local", label:"Ollama (lokal)",
    isEnabled(){ return getAISettings().mode==="ollama"; },
    async generate(prompt){ const txt=await callOllama(prompt, {system:mkAiSystem()}); return mkAIResult("ollama", getAISettings().ollamaModel, prompt, txt); } },
  lmstudio: { provider:"lmstudio", type:"local", label:"LM Studio (lokal)",
    isEnabled(){ return false; },
    async generate(){ throw new Error("lmstudio-not-configured"); } },
  localai: { provider:"localai", type:"local", label:"LocalAI (lokal)",
    isEnabled(){ return false; },
    async generate(){ throw new Error("localai-not-configured"); } },
  template: { provider:"template", type:"template", label:"Lokale Vorlage",
    isEnabled(){ return true; }, // immer verfügbar = Fallback
    async generate(prompt){ return mkAIResult("template","lokal",prompt,"",["Template-Fallback: deterministische lokale Vorlage."]); } }
};
const MK_AI_ORDER = ["anthropic","ollama","openai","googleai","lmstudio","localai","template"];
function mkActiveAIProvider(){
  const mode=getAISettings().mode;
  if(mode==="ollama" && AI_PROVIDERS_REG.ollama.isEnabled()) return AI_PROVIDERS_REG.ollama;
  if(AI_PROVIDERS_REG.anthropic.isEnabled()) return AI_PROVIDERS_REG.anthropic;
  for(const k of MK_AI_ORDER){ if(AI_PROVIDERS_REG[k].isEnabled()) return AI_PROVIDERS_REG[k]; }
  return AI_PROVIDERS_REG.template;
}
function mkAnyAI(){ return mkActiveAIProvider().provider!=="template"; }
/* Prompt -> JSON über den aktiven KI-Provider (wirft bei Template/Fehler) */
async function mkAIJSON(prompt){
  const p=mkActiveAIProvider();
  if(p.provider==="template") throw new Error("template-only");
  const r=await p.generate(prompt);
  let txt=(r&&r.response)||""; if(!txt) throw new Error("empty");
  txt=txt.replace(/```json/gi,"```").replace(/```/g,"").trim();
  const a=txt.indexOf("{"), b=txt.lastIndexOf("}"); if(a<0||b<0||b<a) throw new Error("no-json");
  const obj=JSON.parse(txt.slice(a,b+1)); obj.__provider=r.provider; return obj;
}

/* requestApproval() an die Publishing-Provider-Schnittstelle anhängen */
Object.keys(PUBLISHING_PROVIDERS).forEach(name=>{
  PUBLISHING_PROVIDERS[name].requestApproval = function(draft){ return Promise.resolve(mkCreateApprovalRequest(draft)); };
});

/* ============================================================
   GENEHMIGUNGS-WORKFLOW  (ApprovalRequest)
   ============================================================ */
function mkCreateApprovalRequest(draft){
  if(!draft) return null;
  const ex=(data.approvalRequests||[]).find(a=>a.draftId===draft.id && a.status==="pending");
  if(ex) return ex;
  const req={ id:uid(), draftId:draft.id, platform:draft.platform,
    previewTitle:draft.title||"", previewBody:draft.body||"",
    mediaPreview:(draft.mediaUrls&&draft.mediaUrls[0])||draft.imageIdea||"",
    plannedPublishDate:draft.plannedPublishDate||"", riskNotes:(draft.riskNotes||[]).slice(),
    status:"pending", createdAt:nowISO(), decidedAt:null };
  data.approvalRequests.push(req);
  if(draft.approvalStatus==="draft") draft.approvalStatus="needs_review";
  mkTouch(draft);
  return req;
}
function mkRequestApproval(id){ const d=getDraft(id); if(!d){return;} if(mkMediaRequired(d)){ if(!confirm("Instagram benötigt mindestens ein Medium. Trotzdem Genehmigung anfragen?")) return; } mkCreateApprovalRequest(d); saveAll(false); _mkTab="approvals"; showSection("mkagents"); }
function mkApprovalDecide(reqId, decision){
  const r=(data.approvalRequests||[]).find(x=>x.id===reqId); if(!r||r.status!=="pending") return;
  const d=getDraft(r.draftId);
  if(decision==="approve"){ if(d) return mkSetApproval(d.id, "approved"); r.status="approved"; r.decidedAt=nowISO(); }
  else if(decision==="reject"){ r.status="rejected"; r.decidedAt=nowISO(); if(d){ d.approvalStatus="rejected"; mkTouch(d); } }
  saveAll(false); showSection("mkagents");
}
function mkApprovalRegenerate(reqId){
  const r=(data.approvalRequests||[]).find(x=>x.id===reqId); if(!r) return;
  mkRegenerateDraft(r.draftId, ()=>{ const d=getDraft(r.draftId); if(d){ r.previewTitle=d.title; r.previewBody=d.body; r.riskNotes=(d.riskNotes||[]).slice(); } });
}
/* Entwurf lokal neu erzeugen (deterministisch) */
function mkRegenerateDraft(id, after){
  const d=getDraft(id); if(!d) return;
  const camp=getCampaign(d.campaignId)||{ serviceType:"allgemein", targetRegion:getAutopilot().targetRegion, startDate:today() };
  const fresh=mkContentAgent(camp, d.platform);
  d.title=fresh.title; d.body=fresh.body; d.hashtags=fresh.hashtags;
  d.callToAction=fresh.callToAction; d.imageIdea=fresh.imageIdea;
  d.riskNotes=fresh.riskNotes; d.aiProvider="template";
  d.publishingPayload=buildPublishingPayload(d); mkTouch(d);
  if(after) after();
  saveAll(false); showSection("mkagents");
}

/* ============================================================
   PUBLISHING-KERN  (8-Bedingungen-Gate + Ausführung/Protokoll)
   ============================================================ */
function mkExecutePublish(d){
  if(!d) return Promise.resolve({success:false});
  const gate=mkCanPublish(d);
  if(!gate.ok){
    d.publishStatus = mkProviderBlocked(d.platform) ? "provider_blocked"
      : (d.publishStatus==="scheduled" ? "scheduled" : (d.approvalStatus==="approved" ? "approved" : d.publishStatus));
    data.publishLog.unshift({ id:uid(), draftId:d.id, platform:d.platform, mode:"auto",
      success:false, provider:d.platform, externalPostId:null, errorCode:"blocked",
      errorMessage:gate.reasons.join("; "), at:nowISO() });
    mkTouch(d);
    return Promise.resolve({ success:false, blocked:true, reasons:gate.reasons });
  }
  d.publishStatus="publishing"; mkTouch(d);
  return PUBLISHING_PROVIDERS[d.platform].publish(d.publishingPayload||buildPublishingPayload(d)).then(res=>{
    const ok=!!res.success;
    d.publishStatus = ok ? "published" : (mkProviderBlocked(d.platform) ? "provider_blocked" : "publish_failed");
    if(ok) d.publishedAt = res.publishedAt||nowISO();
    data.publishLog.unshift({ id:uid(), draftId:d.id, platform:d.platform, mode:"auto",
      success:ok, provider:res.provider, externalPostId:res.externalPostId||null,
      errorCode:res.errorCode||null, errorMessage:res.errorMessage||"", at:nowISO() });
    mkTouch(d); return res;
  });
}

function getAutopilot(){
  let s={}; try{ s=getSettings(); }catch{ s={}; }
  const a=(s.autopilot&&typeof s.autopilot==="object")?s.autopilot:{};
  return Object.assign({
    enabled:false, frequency:"woechentlich",
    activePlatforms:["facebook","instagram","google_business"],
    prioritizedServices:["Bodenverlegung","Küchenmontage"],
    targetRegion:(s.region||"Wilhelmshaven"),
    defaultCTA:"Jetzt kostenlose Besichtigung anfragen",
    defaultTargetUrl:(s.web||""), approvalMode:"each", maxPostsPerWeek:3,
    preferredPublishTimes:"10:00, 17:00", toneOfVoice:"sachlich-handwerklich",
    legalSafetyLevel:"hoch", lastRunAt:null
  }, a);
}
function saveAutopilotObj(ap){ let cur={}; try{cur=JSON.parse(localStorage.getItem("VV_SETTINGS_2026")||"{}")||{};}catch{} cur.autopilot=ap; localStorage.setItem("VV_SETTINGS_2026", JSON.stringify(cur)); }
function saveAutopilotPatch(patch){ saveAutopilotObj(Object.assign({}, getAutopilot(), patch)); }
function mkAutopilotSave(){
  const ap=getAutopilot();
  ap.enabled = byId("ap_enabled")?byId("ap_enabled").checked:ap.enabled;
  ap.frequency = val("ap_freq")||ap.frequency;
  ap.activePlatforms = MK_PLATFORM_KEYS.filter(k=>byId("ap_pf_"+k)&&byId("ap_pf_"+k).checked);
  ap.prioritizedServices = MK_SERVICES.filter(s=>byId("ap_sv_"+mkSlug(s))&&byId("ap_sv_"+mkSlug(s)).checked);
  ap.targetRegion = val("ap_region")||ap.targetRegion;
  ap.defaultCTA = val("ap_cta")||ap.defaultCTA;
  ap.defaultTargetUrl = val("ap_url")||ap.defaultTargetUrl;
  ap.approvalMode = val("ap_mode")||ap.approvalMode;
  ap.maxPostsPerWeek = Math.max(1, parseInt(val("ap_max"),10)||ap.maxPostsPerWeek);
  ap.preferredPublishTimes = val("ap_times")||ap.preferredPublishTimes;
  ap.toneOfVoice = val("ap_tone")||ap.toneOfVoice;
  ap.legalSafetyLevel = val("ap_legal")||ap.legalSafetyLevel;
  saveAutopilotObj(ap); alert("Autopilot-Einstellungen gespeichert."); showSection("mkagents");
}
function mkAutopilotToggle(on){ saveAutopilotPatch({enabled:!!on}); if(on && mkAutopilotDue()){ mkAutopilotRunCycle(false); } else { alert(on?"Autopilot aktiviert.":"Autopilot pausiert."); showSection("mkagents"); } }
function mkPostsThisWeek(){ const wk=7*864e5, now=Date.now(); return (data.contentDrafts||[]).filter(d=>d.autopilot && (now-new Date(d.createdAt).getTime())<wk).length; }
function mkAutopilotDue(ap){ ap=ap||getAutopilot(); if(!ap.enabled||ap.frequency==="manuell") return false; if(!ap.lastRunAt) return true; const days={taeglich:1,"3xwoche":2,woechentlich:7}[ap.frequency]||7; return (Date.now()-new Date(ap.lastRunAt).getTime())>=days*864e5-6e4; }
async function mkAutopilotAIDraft(camp, p, ap){
  const prompt=`Schreibe einen ${MK_PLATFORMS[p].label}-Beitrag für „${camp.serviceType}" in ${camp.targetRegion}.
Tonfall: ${ap.toneOfVoice}. Rechtliche Sicherheitsstufe: ${ap.legalSafetyLevel}. CTA: ${ap.defaultCTA}. Preise nach Aufmaß.
Antworte AUSSCHLIESSLICH als JSON:
{"title":"","body":"","callToAction":"","hashtags":["#..."],"imageIdea":""}`;
  const t=await mkAIJSON(prompt);
  const d=mkAiDraftFromText(camp, p, t); d.aiProvider=t.__provider||d.aiProvider; return d;
}
async function mkAutopilotRunCycle(manual){
  const ap=getAutopilot();
  if(!ap.enabled && !manual){ return; }
  const remaining=Math.max(0, (ap.maxPostsPerWeek||3) - mkPostsThisWeek());
  if(remaining<=0){ saveAutopilotPatch({lastRunAt:nowISO()}); alert("Autopilot: Wochenlimit ("+(ap.maxPostsPerWeek||3)+") erreicht – kein neuer Content."); showSection("mkagents"); return; }
  const plats=(ap.activePlatforms&&ap.activePlatforms.length)?ap.activePlatforms:["facebook"];
  const svcs=(ap.prioritizedServices&&ap.prioritizedServices.length)?ap.prioritizedServices:["Bodenverlegung"];
  const camp={ id:"autopilot", title:"Autopilot-Kampagne", serviceType:svcs[new Date().getDate()%svcs.length], targetRegion:ap.targetRegion, startDate:today() };
  let created=0, aiN=0;
  for(const p of plats){
    if(created>=remaining) break;
    let d;
    try{ if(mkAnyAI()){ d=await mkAutopilotAIDraft(camp, p, ap); aiN++; } else d=mkContentAgent(camp, p); }
    catch(e){ d=mkContentAgent(camp, p); }
    d.autopilot=true; d.campaignId=null;
    d.callToAction=ap.defaultCTA||d.callToAction;
    d.publishingPayload=buildPublishingPayload(d);
    data.contentDrafts.push(d); created++;
    // Freigabemodus anwenden
    if(ap.approvalMode==="risky"){
      if((d.riskNotes||[]).length || mkMediaRequired(d)){ mkCreateApprovalRequest(d); }
      else { d.approvalStatus="approved"; mkExecutePublish(d).then(()=>saveAll(false)); }
    } else {
      mkCreateApprovalRequest(d); // each / campaign -> Genehmigung anfragen
    }
  }
  saveAutopilotPatch({lastRunAt:nowISO()});
  saveAll(false);
  alert(`Autopilot-Zyklus abgeschlossen: ${created} Beitrag(e) erzeugt (${aiN} via KI). Offene Genehmigungen siehe „Genehmigungsanfragen“.`);
  _mkTab="approvals"; showSection("mkagents");
}

/* ==========================================================
   7c) PERSONALWESEN  (Angestellte & Subunternehmer)
   Single-file vanilla JS. Mit Onboarding-Checkliste (Angestellte) und
   Compliance-Check (Subunternehmer, u. a. §48b-Freistellungsbescheinigung).
   ========================================================== */
let _persTab = "angestellte";
let _persForm = null; // { kind:"employee"|"subcontractor", id?:string }

const PERS_EMP_STATUS = ["beworben","aktiv","inaktiv","gekündigt"];
const PERS_SUB_STATUS = ["angefragt","aktiv","inaktiv"];
const PERS_EMPLOYMENT = ["Vollzeit","Teilzeit","Minijob","Aushilfe","Azubi"];
const PERS_RATETYPE_EMP = ["Stundenlohn","Monatsgehalt"];
const PERS_RATETYPE_SUB = ["Stundensatz","Tagessatz","Pauschale"];
const PERS_ONBOARD = [
  ["vertrag","Arbeitsvertrag unterschrieben"],
  ["sv","SV-Anmeldung erfolgt"],
  ["arbeitsschutz","Arbeitsschutz-Einweisung"],
  ["psa","PSA ausgegeben"],
  ["zugang","Schlüssel/Zugang eingerichtet"]
];

function getStaff(id){ return (data.staff||[]).find(p=>p.id===id); }
function persName(p){ return p.kind==="subcontractor" ? (p.name||"Subunternehmer") : (p.name||"Mitarbeiter"); }
function persIsFreistellungValid(p){
  if(!p.freistellung) return false;
  if(!p.freistellungBis) return true; // vorhanden, ohne Datum als gültig werten
  const d=new Date(p.freistellungBis); return !isNaN(d.getTime()) && d>=new Date(today());
}
function persCompliance(p){
  const c=[
    { key:"freistellung", ok:persIsFreistellungValid(p), label:"§48b-Freistellungsbescheinigung gültig" },
    { key:"haftpflicht",  ok:!!p.haftpflicht,            label:"Betriebshaftpflicht nachgewiesen" },
    { key:"gewerbe",      ok:!!p.gewerbe,                label:"Gewerbeanmeldung/Handwerksrolle" },
    { key:"ustid",        ok:!!(p.ustId&&p.ustId.trim()),label:"USt-ID vorhanden" }
  ];
  return { checks:c, passed:c.filter(x=>x.ok).length, total:c.length, ok:c.every(x=>x.ok) };
}
function persOnboarding(p){
  const ob=p.onboarding||{};
  const c=PERS_ONBOARD.map(([k,l])=>({ key:k, ok:!!ob[k], label:l }));
  return { checks:c, passed:c.filter(x=>x.ok).length, total:c.length, ok:c.every(x=>x.ok) };
}

/* ---- CRUD ---- */
function persOpenForm(kind, id){ _persForm={ kind, id:id||null }; showSection("personal"); }
function persEdit(id){ const p=getStaff(id); if(p) persOpenForm(p.kind, id); }
function persCancelForm(){ _persForm=null; showSection("personal"); }
function persDelete(id){ if(!confirm("Eintrag wirklich löschen?"))return; data.staff=(data.staff||[]).filter(p=>p.id!==id); saveAll(false); showSection("personal"); }
function persSave(){
  const f=_persForm; if(!f) return;
  const kind=f.kind, isSub=kind==="subcontractor";
  const rec = f.id ? getStaff(f.id) : { id:uid(), kind, createdAt:nowISO() };
  if(!rec) return;
  rec.kind=kind;
  rec.name=val("pf_name"); rec.role=val("pf_role"); rec.status=val("pf_status");
  rec.phone=val("pf_phone"); rec.email=val("pf_email"); rec.address=val("pf_address");
  rec.startDate=val("pf_start"); rec.endDate=val("pf_end");
  rec.rate=parseNum(val("pf_rate")); rec.rateType=val("pf_ratetype");
  rec.notes=byId("pf_notes")?byId("pf_notes").value:"";
  if(isSub){
    rec.contactPerson=val("pf_contact"); rec.ustId=val("pf_ustid");
    rec.freistellung=byId("pf_cm_freistellung")?byId("pf_cm_freistellung").checked:false;
    rec.freistellungBis=val("pf_freibis");
    rec.haftpflicht=byId("pf_cm_haftpflicht")?byId("pf_cm_haftpflicht").checked:false;
    rec.gewerbe=byId("pf_cm_gewerbe")?byId("pf_cm_gewerbe").checked:false;
  } else {
    rec.employmentType=val("pf_emptype"); rec.taxId=val("pf_taxid"); rec.svNumber=val("pf_sv");
    rec.iban=val("pf_iban"); rec.qualifications=val("pf_qual"); rec.emergencyContact=val("pf_emergency");
    rec.onboarding={}; PERS_ONBOARD.forEach(([k])=>{ rec.onboarding[k]=byId("pf_ob_"+k)?byId("pf_ob_"+k).checked:false; });
  }
  rec.updatedAt=nowISO();
  if(!f.id) data.staff.push(rec);
  _persForm=null; saveAll(false);
  _persTab = isSub?"subunternehmer":"angestellte";
  showSection("personal");
}

function persCard(p){
  const isSub=p.kind==="subcontractor";

async function ollamaTags(url){
  const base=String(url||getAISettings().ollamaUrl).replace(/\/+$/,"");
  const ctrl=new AbortController(); const to=setTimeout(()=>ctrl.abort(),15000);
  try{
    const res=await fetch(base+"/api/tags",{method:"GET",signal:ctrl.signal});
    clearTimeout(to);
    if(!res.ok) throw new Error("HTTP "+res.status);
    const j=await res.json();
    return (j.models||[]).map(m=>m.name||m.model).filter(Boolean);
  }catch(err){ clearTimeout(to); if(err.name==="AbortError") throw new Error("timeout"); throw err; }

/* POST /api/chat – nicht streamend, mit Timeout */
async function callOllama(prompt, options){
  options=options||{};
  const ai=getAISettings();
  const base=String(options.url||ai.ollamaUrl).replace(/\/+$/,"");
  const model=options.model||ai.ollamaModel;
  const messages=[];
  if(options.system) messages.push({role:"system",content:options.system});
  messages.push({role:"user",content:String(prompt||"")});
  const ctrl=new AbortController(); const to=setTimeout(()=>ctrl.abort(), options.timeout||60000);
  try{
    const res=await fetch(base+"/api/chat",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model, messages, stream:false}), signal:ctrl.signal
    });
    clearTimeout(to);
    if(!res.ok){ const t=await res.text().catch(()=>""); throw new Error("HTTP "+res.status+(t?(": "+t.slice(0,180)):"")); }
    const j=await res.json();
    return (j.message&&j.message.content) || j.response || "(leere Antwort)";
  }catch(err){ clearTimeout(to); if(err.name==="AbortError") throw new Error("timeout"); throw err; }
}

}

/* Robuste JSON-Auswertung + Whitelist-Prüfung */
function parseOllamaIntentResponse(raw){
  let txt=String(raw||"").trim();
  txt=txt.replace(/<think>[\s\S]*?<\/think>/gi,"").trim();   // qwen3-Reasoning entfernen
  txt=txt.replace(/^```(?:json)?\s*/i,"").replace(/\s*```$/,"").trim();
  let obj=null;
  try{ obj=JSON.parse(txt); }catch(e){ const m=txt.match(/\{[\s\S]*\}/); if(m){ try{ obj=JSON.parse(m[0]); }catch(e2){} } }
  if(!obj||typeof obj!=="object") return {ok:false, error:"invalid_json", rawText:String(raw||"")};
  const intent=String(obj.intent||"unknown");
  const tool=String(obj.tool||"");
  let confidence=Number(obj.confidence); if(!isFinite(confidence)) confidence=0;
  if(confidence>1) confidence=confidence>100?1:(confidence/100);
  const entities=(obj.entities&&typeof obj.entities==="object")?obj.entities:{};
  if(NX_ALLOWED_INTENTS.indexOf(intent)<0) return {ok:false, error:"intent_not_allowed", intent, rawText:String(raw||"")};
  if(tool && NX_ALLOWED_TOOLS.indexOf(tool)<0) return {ok:false, error:"tool_not_allowed", tool, rawText:String(raw||"")};
  return {ok:true, intent, tool, confidence, requiresConfirmation: obj.requiresConfirmation===true,
    entities, spokenResponse: obj.spokenResponse!=null?String(obj.spokenResponse):"",
    clarifyingQuestion: obj.clarifyingQuestion!=null?String(obj.clarifyingQuestion):null };
}

/* Wandelt einen geprüften Intent in eine sichere lokale Aktion um.
   Kritische Aktionen erzeugen NUR Entwürfe + bestehende Ja/Nein-Bestätigung. */
function executeIntentResult(ir, context){
  context=context||{};
  if(!ir||!ir.ok) return {handled:false};
  // Unklar / niedrige Confidence -> Rückfrage statt falscher Aktion
  if(ir.intent==="unknown" || ir.tool==="askClarifyingQuestion")
    return {handled:true, kind:"Rückfrage", text: ir.clarifyingQuestion || ir.spokenResponse || nxClarifyFallback()};
  if(ir.confidence < NX_INTENT_CONF_MIN)
    return {handled:true, kind:"Rückfrage", text: ir.clarifyingQuestion || ("Ich bin mir nicht sicher (" + Math.round(ir.confidence*100) + "%). " + nxClarifyFallback())};
  const e=ir.entities||{};
  switch(ir.tool){
    case "navigateTo": {
      const sec=nxResolvePage(e.page) || nxNavTarget(String(e.page||ir.spokenResponse||"").toLowerCase());
      if(!sec) return {handled:false};
      navigateTo(sec); return {handled:true, kind:"Navigation", text: ir.spokenResponse || ("Öffne im Cockpit: "+nxSecName(sec)+".")};
    }
    case "getOpenPositionsSummary": return {handled:true, kind:"Abfrage", text: nxFormatOpenPositions()};
    case "getFinanceSummary": return {handled:true, kind:"Abfrage", text: nxFinanceText()};
    case "searchCustomer": {
      const q=String(e.customerName||"").toLowerCase().trim();
      if(!q) return {handled:true, kind:"Rückfrage", text:"Nach welchem Kunden soll ich suchen?"};
      const hits=(data.customers||[]).filter(c=>String(c.name||"").toLowerCase().includes(q));
      navigateTo("crm");
      return {handled:true, kind:"Abfrage", text: hits.length?("Gefunden: "+hits.slice(0,5).map(c=>c.name).join(", ")+". (Kunden-CRM geöffnet.)"):("Kein Kunde mit „"+(e.customerName||q)+"“ gefunden.")};
    }
    case "createBookingDraft": {
      const amount=nxParseAmount(e.amount);
      if(!(amount>0)) return {handled:true, kind:"Rückfrage", text:"Für die Buchung brauche ich einen Betrag in Euro. Wie viel?"};
      const type=nxGuessBookingType(e,ir);
      const partner=String(e.customerName||"").trim();
      let category=String(e.category||"").trim(); if(!category) category=(type==="Einnahme")?"Kundenzahlung":"Manuell";
      _nxPendingBooking={type, amount, partner, category, note:(ir.userText||ir.spokenResponse||""), date:today()};
      return {handled:true, kind:"Aktion", text:"Ich habe eine "+type+" über "+money(amount)+(partner?(" "+(type==="Ausgabe"?"für":"von")+" "+partner):"")+" erkannt (Kategorie: "+category+", Datum: heute). Soll ich diese Buchung speichern? Ja/Nein."};
    }
    case "createCustomerDraft": {
      const nm=String(e.customerName||"").trim();
      if(nm.length>=2){ _nxFlow={type:"newCustomer",step:"phone",data:{name:nm}}; return {handled:true, kind:"Aktion", text:"Neuer Kunde „"+nm+"“ (Entwurf). Telefonnummer? (oder „überspringen“)"}; }
      _nxFlow={type:"newCustomer",step:"name",data:{}}; return {handled:true, kind:"Aktion", text:"Neuer Kunde – wie heißt der Kunde? (oder „abbrechen“)"};
    }
    case "createOfferDraft": { navigateTo("calculator"); return {handled:true, kind:"Aktion", text: ir.spokenResponse || "Ich öffne den Preisrechner für einen Angebots-Entwurf. Verbindlich erst nach Aufmaß/Prüfung (Orientierungswert). Finalisierung nur nach deiner Bestätigung."}; }
    case "createInvoiceDraft": { navigateTo("rechnungen"); return {handled:true, kind:"Aktion", text: ir.spokenResponse || "Ich öffne den Bereich Rechnungen für einen Entwurf. Finalisieren nur nach deiner Bestätigung. Gemäß §19 UStG ohne Umsatzsteuer."}; }
    case "createMarketingDraft": { navigateTo("mkagents"); return {handled:true, kind:"Aktion", text: ir.spokenResponse || "Ich öffne Marketing & KI-Agenten für einen Entwurf. Veröffentlichen nur nach deiner Freigabe."}; }
    case "getProjectSummary": return {handled:true, kind:"Abfrage", text: nxProjectSummaryText(e.customerName)};
    case "openAgent": { const ag=nxMatchAgent(String(e.service||e.category||ir.spokenResponse||"").toLowerCase()); navigateTo("agents"); if(ag){ try{ nxAgentSelect(ag); }catch(_){}} return {handled:true, kind:"Navigation", text: ir.spokenResponse || ("KI-Mitarbeiter geöffnet"+(ag?(": "+ag.charAt(0).toUpperCase()+ag.slice(1)):"")+".")}; }
    case "stopSpeaking": nxStopSpeaking(); return {handled:true, kind:"Aktion", text:"🔇 Ausgabe gestoppt."};
    case "confirmPendingAction": return {handled:true, kind:"Bestätigung", text: handleNexusCommand("ja", context)};
    case "cancelPendingAction": return {handled:true, kind:"Aktion", text: handleNexusCommand("nein", context)};
    default: return {handled:false};
  }
}

/* Freundliche Fehlertexte für Cloud-APIs (Key wird NICHT angezeigt) */
function nxCloudErr(name, status, t){
  let h="";
  if(status===429) h=" – Kontingent/Rate-Limit überschritten";
  else if(status===401||status===403) h=" – API-Key ungültig oder keine Berechtigung";
  else if(status===400) h=" – ungültige Anfrage (Modellname prüfen?)";
  return name+" HTTP "+status+h+(t?(" :: "+String(t).replace(/\s+/g," ").slice(0,140)):"");
}

/* Gemini DIREKT aus dem Browser (Key wird lokal gespeichert). Nur für file://-Nutzung. */
async function classifyViaGeminiDirect(userText, context){
  const cfg=getNexusOllamaCfg();
  const key=cfg.geminiKey; if(!key) throw new Error("Kein Gemini API-Key hinterlegt.");
  const model=cfg.geminiModel||"gemini-2.0-flash";
  const url="https://generativelanguage.googleapis.com/v1beta/models/"+encodeURIComponent(model)+":generateContent?key="+encodeURIComponent(key);
  const body={ system_instruction:{parts:[{text:NX_INTENT_SYSTEM}]},
    contents:[{role:"user",parts:[{text:nxCloudUserMsg(userText,context)}]}],
    generationConfig:{temperature:0, responseMimeType:"application/json"} };
  const ctrl=new AbortController(); const to=setTimeout(()=>ctrl.abort(), cfg.timeout||15000);
  try{
    const res=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body),signal:ctrl.signal});
    clearTimeout(to);
    if(!res.ok){ const t=await res.text().catch(()=>""); throw new Error(nxCloudErr("Gemini",res.status,t)); }
    const j=await res.json();
    const parts=(j&&j.candidates&&j.candidates[0]&&j.candidates[0].content&&j.candidates[0].content.parts)||[];
    const text=parts.map(p=>p&&p.text?p.text:"").join("");
    const r=parseOllamaIntentResponse(text); if(r.ok) r.userText=String(userText||""); return r;
  }catch(err){ clearTimeout(to); if(err.name==="AbortError") throw new Error("timeout"); throw err; }
}
/* Groq DIREKT aus dem Browser (OpenAI-kompatibel, Key lokal gespeichert). */
async function classifyViaGroq(userText, context){
  const cfg=getNexusOllamaCfg();
  const key=cfg.groqKey; if(!key) throw new Error("Kein Groq API-Key hinterlegt.");
  const model=cfg.groqModel||"llama-3.3-70b-versatile";
  const body={ model, temperature:0, response_format:{type:"json_object"},
    messages:[{role:"system",content:NX_INTENT_SYSTEM},{role:"user",content:nxCloudUserMsg(userText,context)}] };
  const ctrl=new AbortController(); const to=setTimeout(()=>ctrl.abort(), cfg.timeout||15000);
  try{
    const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
      body:JSON.stringify(body),signal:ctrl.signal});
    clearTimeout(to);
    if(!res.ok){ const t=await res.text().catch(()=>""); throw new Error(nxCloudErr("Groq",res.status,t)); }
    const j=await res.json();
    const text=(j&&j.choices&&j.choices[0]&&j.choices[0].message&&j.choices[0].message.content)||"";
    const r=parseOllamaIntentResponse(text); if(r.ok) r.userText=String(userText||""); return r;
  }catch(err){ clearTimeout(to); if(err.name==="AbortError") throw new Error("timeout"); throw err; }
}

async function classifyViaGemini(userText, context){

  const url=cfg.geminiUrl.replace(/\/+$/,"")+"/intent";

    availableTools: NX_ALLOWED_TOOLS,

    customersCount: (data.customers||[]).filter(c=>!(c.archived||c.deletedAt)).length
  }};

/* Orchestrierung: lokal-zuerst (Bestätigung/Stop), dann Provider-Kette (Ollama/Gemini),
   dann bewährte lokale Befehlslogik. Reihenfolge je nach Einstellung. */
async function nxProcessCommand(commandText, context){
  context=context||{};
  const raw=String(commandText||"").trim(); if(!raw) return "";
  const l=raw.toLowerCase();
  // 1) Bestätigungen, geführter Dialog, Stop/Abbruch IMMER lokal (hängen nie an einer KI)
  if(_nxFlow || _nxPendingPaid || _nxPendingBooking || nxIsControlPhrase(l)) return handleNexusCommand(raw, context);

  // 2) Provider-Kette bestimmen: bevorzugte Cloud -> Ollama -> Fallback-Cloud
  const cfg=getNexusOllamaCfg();
  const providers=[];
  if(cfg.geminiMode==="preferred") providers.push("gemini");
  if(cfg.groqMode==="preferred")   providers.push("groq");
  if(cfg.enabled)                  providers.push("ollama");
  if(cfg.geminiMode==="fallback")  providers.push("gemini");
  if(cfg.groqMode==="fallback")    providers.push("groq");

  // 3) Kette durchlaufen: bei niedriger Confidence/Fehler -> nächster Provider
  let lastIr=null;
  for(let idx=0; idx<providers.length; idx++){
    const prov=providers[idx]; let ir=null;
    try{
      ir = (prov==="gemini") ? await classifyViaGemini(raw, context)
         : (prov==="groq")   ? await classifyViaGroq(raw, context)
         : await classifyNexusIntent(raw, context);
    }
    catch(err){ if(prov==="ollama") nxNoteOllamaError(err); else nxNoteProviderError(prov, err); continue; }
    if(!ir || !ir.ok){ lastIr=ir; continue; }   // ungültiges JSON / verworfenes Tool -> nächster Provider
    lastIr=ir;
    const isLast = (idx===providers.length-1);
    if(nxIntentIsConfident(ir) || isLast){
      const exec=executeIntentResult(ir, context);
      if(exec && exec.handled){ _nxOllamaErrNotified=false; if(exec.kind) _nxLastKind=exec.kind; return exec.text; }
      // nicht zuordenbar -> nächster Provider / Fallback
    }
    // sonst: zu unsicher und es gibt noch einen Provider -> weiter
  }

  // 4) Provider erschöpft -> lokale Befehlslogik (falls erlaubt) bzw. Rückfrage
  if(cfg.fallback || providers.length===0) return handleNexusCommand(raw, context);
  if(lastIr && lastIr.ok){ const ex=executeIntentResult(lastIr, context); if(ex&&ex.handled) return ex.text; }
  return "Ich habe den Befehl nicht eindeutig verstanden. Meintest du Buchhaltung, Kundenkartei, offene Posten oder NEXUS Deck?";
}

/* Optionale lokale Startkonfiguration (vom One-Click-Starter erzeugt).
   SICHER: nur über http(s), nie über file://; überschreibt bestehende
   NEXUS-Einstellungen NIEMALS – belegt sie nur beim allerersten Start vor. */
function nxNexusConfigured(){
  try{ const s=JSON.parse(localStorage.getItem("VV_SETTINGS_2026")||"{}"); return !!(s&&s.ai&&s.ai.nexus&&typeof s.ai.nexus==="object"); }
  catch(e){ return false; }
}
function nxTryLoadLocalConfig(){
  try{
    if(!/^https?:$/.test(location.protocol)) return;   // nicht über file://
    if(nxNexusConfigured()) return;                    // bestehende Einstellungen NIE anfassen
    fetch("/nexus-local-config.json",{cache:"no-store"})
      .then(r=>r.ok?r.json():null)
      .then(cfg=>{
        if(!cfg||typeof cfg!=="object") return;
        if(nxNexusConfigured()) return;                // doppelt absichern
        const patch={
          enabled:true,
          url:String(cfg.ollamaBaseUrl||"http://localhost:11434").replace(/\/+$/,""),
          model:String(cfg.ollamaModel||"llama3.2"),
          timeout:30000, fallback:true
        };
        if(cfg.geminiProxyUrl){ patch.geminiUrl=String(cfg.geminiProxyUrl).replace(/\/+$/,""); patch.geminiMode = cfg.geminiEnabled ? "fallback" : "off"; }
        saveNexusOllamaCfg(patch);
        _nxOllamaErrNotified=false;
        try{ if(currentSection==="settings") loadAiSettingsFields(); }catch(e){}
        try{ console.info("[NEXUS] Lokale Startkonfiguration übernommen (Ollama aktiviert)."); }catch(e){}
      })
      .catch(()=>{}); // keine Datei / kein Server -> still ignorieren
  }catch(e){}
}

/* Optionaler API-Aufruf – best effort, lokal. Wirft bei Fehler (inkl. CORS). */
async function callAIProvider(provider, key, prompt){
  if(provider==="openai"){
    const res=await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
      body:JSON.stringify({model:AI_PROVIDERS.openai.model,messages:[{role:"user",content:prompt}]})});
    if(!res.ok) throw new Error("HTTP "+res.status);
    const j=await res.json(); return j.choices?.[0]?.message?.content||"(leere Antwort)";
  }
  if(provider==="anthropic"){
    const j=await callClaudeRaw(key, [{role:"user",content:prompt}], VV_AI_SYSTEM);
    return claudeTextFromResponse(j) || "(leere Antwort)";
  }
  if(provider==="gemini"){
    const res=await fetch("https://generativelanguage.googleapis.com/v1beta/models/"+AI_PROVIDERS.gemini.model+":generateContent?key="+encodeURIComponent(key),{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
    if(!res.ok) throw new Error("HTTP "+res.status);
    const j=await res.json(); return j.candidates?.[0]?.content?.parts?.[0]?.text||"(leere Antwort)";
  }
  throw new Error("Unbekannter Anbieter");
}

/* ==========================================================
   CLAUDE DIREKT-CHAT (Anthropic API) – mit Claude arbeiten
   Modell: claude-opus-4-8 · adaptives Denken · System-Prompt = VV_AI_SYSTEM
   Key bleibt nur lokal im Browser. Achtung: Inhalte gehen an die Anthropic-Cloud.
   ========================================================== */
const CLAUDE_MODEL = AI_PROVIDERS.anthropic.model; // claude-opus-4-8
let _claudeChat = []; // [{role:"user"|"assistant", content:"..."}]

/* Roh-Aufruf der Messages-API (Browser, best effort). Wirft bei HTTP/CORS-Fehlern. */
async function callClaudeRaw(key, messages, system){
  const ctrl = (typeof AbortController!=="undefined") ? new AbortController() : null;
  const t = ctrl ? setTimeout(()=>ctrl.abort(), 120000) : null;
  let res;
  try{
    res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":key,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true"
      },
      signal: ctrl?ctrl.signal:undefined,
      body:JSON.stringify({
        model: CLAUDE_MODEL,
        max_tokens: 2048,
        thinking: { type:"adaptive" },
        system: system || VV_AI_SYSTEM,
        messages: messages
      })
    });
  } finally { if(t) clearTimeout(t); }
  if(!res.ok){
    let detail="";
    try{ const e=await res.json(); detail = (e&&e.error&&e.error.message)?(" – "+e.error.message):""; }catch{}
    throw new Error("HTTP "+res.status+detail);
  }
  return await res.json();
}
/* Nur die sichtbaren Text-Blöcke (thinking-Blöcke überspringen) */
function claudeTextFromResponse(j){
  if(!j || !Array.isArray(j.content)) return "";
  return j.content.filter(b=>b && b.type==="text" && b.text).map(b=>b.text).join("\n").trim();
}
/* Verständlicher Fehlertext für den Claude-Chat */
function claudeErrorText(err){
  const m=(err&&err.message)||String(err||"");
  if(/abort|timeout|zeit/i.test(m)) return "Zeitüberschreitung – Claude hat nicht rechtzeitig geantwortet. Bitte erneut versuchen.";
  if(/HTTP 401|invalid x-api-key|authentication/i.test(m)) return "Ungültiger oder fehlender API-Key. Bitte Key in den KI-Einstellungen prüfen.";
  if(/HTTP 429/i.test(m)) return "Rate Limit / Kontingent erreicht (HTTP 429). Bitte kurz warten und erneut versuchen.";
  if(/HTTP 400/i.test(m)) return "Ungültige Anfrage (HTTP 400). "+m;
  if(/failed to fetch|networkerror|load failed|cors/i.test(m) || m==="")
    return "Verbindung/CORS blockiert. Tipp: Cockpit über einen lokalen Server starten (python -m http.server 8000) und über http://localhost:8000/ öffnen. Ohne Internet ist kein Cloud-Zugriff möglich.";
  return "Claude-Fehler: "+m;
}

function calcAutoFromMeasurement(){
  const m=(data.measurements||[]).find(x=>x.id===_calcState.measurementId);
  return m&&m.serviceType?mapAfmServiceToCalc(m.serviceType):_calcState.serviceType;
}
function calcMeasurementOptions(){
  const list=(data.measurements||[]).filter(m=>!_calcState.customerId||m.customerId===_calcState.customerId);
  return `<option value="">– kein Aufmaß –</option>`+list.map(m=>`<option value="${m.id}" ${m.id===_calcState.measurementId?"selected":""}>${esc(m.serviceType||"Aufmaß")} · ${fmtDate(m.createdAt)} · ${(m.totalArea||0).toFixed(2)} m²</option>`).join("");
}
function changeCalcService(v){
  _calcState.serviceType = v==="__auto" ? calcAutoFromMeasurement() : v;
  _calcState._serviceLocked = v!=="__auto";
  _calcState.computed=false; _calcState.positions=[];
  showSection("calculator");
}
function calcCustomerPicked(v){ _calcState.customerId=v; showSection("calculator"); }
function calcMeasurementPicked(v){
  _calcState.measurementId=v;
  const m=(data.measurements||[]).find(x=>x.id===v);
  if(m){
    if(!_calcState._serviceLocked) _calcState.serviceType=mapAfmServiceToCalc(m.serviceType);
    if(m.customerId) _calcState.customerId=m.customerId;
    // Flächen/Sockel ins passende Feld übernehmen
    _calcState.vals.area = m.totalArea||_calcState.vals.area;
    _calcState.vals.skirt = m.totalSkirting||_calcState.vals.skirt;
    _calcState.vals.spachtelArea = m.totalArea||_calcState.vals.spachtelArea;
  }
  _calcState.computed=false; _calcState.positions=[];
  showSection("calculator");
}

function renderCalculator(){

  if(window._calcPrefillCustomer){ _calcState.customerId=window._calcPrefillCustomer; window._calcPrefillCustomer=null; }
  else if(_calcContext.customerId && !_calcState.customerId) _calcState.customerId=_calcContext.customerId;

    _calcState.serviceType="Bodenverlegung"; _calcState._serviceLocked=true;
    _calcState.vals.area=mp.area; _calcState.vals.skirt=mp.skirt; _calcState.vals.mat=mp.mat; _calcState.vals.matservice=true; _calcState.vals.spachtelArea=mp.area;

  const custOpts=`<option value="">– kein Kunde –</option>`+data.customers.slice().sort((a,b)=>(a.name||"").localeCompare(b.name||"")).map(c=>`<option value="${c.id}" ${c.id===_calcState.customerId?"selected":""}>${esc(c.name)}</option>`).join("");
  const svc=_calcState.serviceType;
  return `<div class="panel">

      <div><label class="lbl">Dienstleistung</label>

          <option value="__auto" ${!_calcState._serviceLocked&&_calcState.measurementId?"selected":""}>Automatisch aus Aufmaß</option>
          ${CALC_SERVICES.map(sv=>`<option value="${sv}" ${(_calcState._serviceLocked||!_calcState.measurementId)&&sv===svc?"selected":""}>${sv}</option>`).join("")}
        </select></div>
      <div><label class="lbl">Kunde (optional)</label><select id="calcCustomer" onchange="calcCustomerPicked(this.value)">${custOpts}</select></div>
      <div><label class="lbl">Aufmaß (optional)</label><select id="calcMeasurement" onchange="calcMeasurementPicked(this.value)">${calcMeasurementOptions()}</select></div>
